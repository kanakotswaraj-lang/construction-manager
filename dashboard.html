<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഡാഷ്‌ബോർഡ് - മെസ്ത്രി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-md mx-auto">
    <div id="user-info" class="mb-4">ലോഗിൻ പരിശോധിക്കുന്നു...</div>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg mb-4">ലോഗ് ഔട്ട് ചെയ്യുക</button>
    
    <a href="transactions.html" class="block w-full bg-blue-500 text-white p-4 text-center rounded-xl mb-4 font-bold">
        പുതിയ വരവ്/ചെലവ് ചേർക്കുക
    </a>

    <!-- കാർഡുകൾ - കൃത്യമായ ഐഡികൾ സഹിതം -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-600 text-white p-4 rounded-2xl text-center shadow-lg">
            <p class="text-xs opacity-80">ആകെ ലഭിച്ച തുക (വരവ്)</p>
            <h2 id="total-income" class="text-xl font-bold">₹0</h2>
        </div>
        <div class="bg-green-600 text-white p-4 rounded-2xl text-center shadow-lg">
            <p class="text-xs opacity-80">കയ്യിലുള്ളത്</p>
            <h2 id="balance" class="text-xl font-bold">₹0</h2>
        </div>
    </div>

    <div class="bg-red-50 p-4 rounded-2xl mb-6 shadow-sm border border-red-200">
        <p class="text-xs text-red-600 font-bold">ജീവനക്കാർക്ക് നൽകാനുള്ളത് (ബാധ്യത)</p>
        <h2 id="total-liability" class="text-xl font-bold text-red-700">₹0</h2>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl text-center shadow-sm border">
            <p class="text-xs text-gray-500">ആകെ വാടക ചെലവ്</p>
            <h2 id="total-rental-expense" class="text-xl font-bold text-gray-800">₹0</h2>
        </div>
        <div class="bg-white p-4 rounded-2xl text-center shadow-sm border">
            <p class="text-xs text-gray-500">ജീവനക്കാർക്ക് നൽകിയത്</p>
            <h2 id="total-given" class="text-xl font-bold text-gray-800">₹0</h2>
        </div>
    </div>

    <!-- മെനു ലിങ്കുകൾ -->
    <div class="space-y-3">
        <a href="staff.html" class="block w-full bg-white p-4 text-center rounded-xl shadow-sm font-bold text-gray-700 border">ജീവനക്കാർ</a>
        <a href="rentals.html" class="block w-full bg-white p-4 text-center rounded-xl shadow-sm font-bold text-gray-700 border">വാടക ഉപകരണങ്ങൾ</a>
        <a href="transactions.html" class="block w-full bg-white p-4 text-center rounded-xl shadow-sm font-bold text-gray-700 border">സെറ്റ് കണക്ക്</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    async function loadTransactions() {
        const querySnapshot = await getDocs(query(collection(db, "transactions"), orderBy("timestamp", "desc")));
        const rentalSnapshot = await getDocs(collection(db, "rentals"));
        const staffSnapshot = await getDocs(collection(db, "staff"));

        let totalIncome = 0;
        let totalGivenToStaff = 0;
        let totalWorkAmount = 0;
        let totalRentalExpense = 0;

        // 1. വാടക ചെലവ് മാത്രം കൂട്ടുന്നു
        rentalSnapshot.forEach((doc) => {
            const r = doc.data();
            let days = Math.max(1, Math.ceil((new Date() - new Date(r.startDate)) / (1000 * 60 * 60 * 24)));
            totalRentalExpense += (Number(r.qty || 0) * Number(r.rate || 0) * days);
        });

        // 2. ജീവനക്കാരുടെ കണക്ക്
        staffSnapshot.forEach((doc) => {
            const s = doc.data();
            totalWorkAmount += Number(s.workAmount || 0);
            totalGivenToStaff += Number(s.givenAmount || 0);
        });

        // 3. സൈറ്റിൽ നിന്ന് കിട്ടിയ യഥാർത്ഥ വരുമാനം (വരവ് / മുൻകൂർ)
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.type === "വരവ്" || data.type === "മുൻകൂർ") {
                totalIncome += Number(data.amount || 0);
            }
        });

        // ഫൈനൽ കണക്കുകൂട്ടലുകൾ
        let totalLiability = totalWorkAmount - totalGivenToStaff;
        // കയ്യിലുള്ളത് = ആകെ കിട്ടിയത് - ജീവനക്കാർക്ക് കൊടുത്തത് - വാടക ചെലവ്
        let finalBalance = totalIncome - totalGivenToStaff - totalRentalExpense;

        // കൃത്യമായ ബോക്സുകളിലേക്ക് ഡാറ്റ നൽകുന്നു
        document.getElementById("total-income").innerText = "₹" + totalIncome;
        document.getElementById("total-liability").innerText = "₹" + totalLiability;
        document.getElementById("total-rental-expense").innerText = "₹" + totalRentalExpense;
        document.getElementById("total-given").innerText = "₹" + totalGivenToStaff;
        document.getElementById("balance").innerText = "₹" + finalBalance;
    }

    window.logout = () => { signOut(auth).then(() => { window.location.href = "login.html"; }); };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("user-info").innerText = "ലോഗിൻ ചെയ്തു: " + user.email;
            loadTransactions();
        } else { window.location.href = "login.html"; }
    });
</script>
</body>
</html>
