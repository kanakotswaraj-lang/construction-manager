<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>സൈറ്റ് മാനേജർ</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 font-sans">

    <div class="max-w-md mx-auto">
        
        <!-- ലോഗിൻ ഹെഡർ -->
        <div class="bg-slate-800 text-white p-4 rounded-3xl shadow-sm mb-4 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div id="userAvatar" class="w-8 h-8 bg-yellow-400 text-slate-900 rounded-full flex items-center justify-center font-black text-sm uppercase">
                    ..
                </div>
                <div class="leading-none">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">മേസ്ത്രി</p>
                    <p id="displayUser" class="text-sm font-black text-yellow-400">ലോഡ് ചെയ്യുന്നു...</p>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] bg-red-600/20 hover:bg-red-600/30 text-red-400 px-3 py-2 rounded-xl font-bold transition">Logout</button>
        </div>

        <h1 class="text-3xl font-black mb-6 text-center text-slate-800 tracking-tight">സൈറ്റ് മാനേജർ</h1>

        <!-- പ്രധാന കാർഡുകൾ -->
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-md border border-blue-500">
                <p class="text-[10px] opacity-80 font-bold uppercase tracking-wider mb-1">ആകെ വരുമാനം</p>
                <p class="text-2xl font-black" id="totalIncome">₹0</p>
            </div>
            <div class="bg-emerald-600 text-white p-5 rounded-3xl shadow-md border border-emerald-500">
                <p class="text-[10px] opacity-80 font-bold uppercase tracking-wider mb-1">കയ്യിലുള്ളത്</p>
                <p class="text-2xl font-black" id="cashInHand">₹0</p>
            </div>
        </div>

        <!-- ആകെ ബാധ്യത കാർഡ് -->
        <div class="bg-rose-50 border border-rose-100 p-5 rounded-3xl mb-4 shadow-sm">
            <p class="text-[10px] text-rose-500 font-black uppercase tracking-wider mb-1">ആകെ ബാധ്യത (തുല്യം നൽകാനുള്ളത്)</p>
            <p class="text-2xl font-black text-rose-700" id="totalLiability">₹0</p>
        </div>

        <!-- വാടക വിവരം -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-100 border border-slate-200 p-5 rounded-3xl">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">ബാക്കി വാടക ചെലവ്</p>
                <p class="text-xl font-black text-slate-700" id="rentExpense">₹0</p>
            </div>
            <div class="bg-amber-50 border border-amber-100 p-5 rounded-3xl">
                <p class="text-[10px] text-amber-600 font-bold uppercase mb-1">ആകെ നൽകിയത്</p>
                <p class="text-xl font-black text-amber-800" id="totalPaid">₹0</p>
            </div>
        </div>

        <!-- പേജ് ലിങ്കുകൾ -->
        <div class="space-y-3">
            <a href="staff.html" class="block w-full bg-white border border-slate-200 p-5 rounded-3xl text-center font-bold text-slate-800 shadow-sm hover:bg-slate-50 transition text-base">ജീവനക്കാർ</a>
            <a href="rentals.html" class="block w-full bg-white border border-slate-200 p-5 rounded-3xl text-center font-bold text-slate-800 shadow-sm hover:bg-slate-50 transition text-base">വാടക ഉപകരണങ്ങൾ</a>
            <a href="accounts.html" class="block w-full bg-white border border-slate-200 p-5 rounded-3xl text-center font-bold text-slate-800 shadow-sm hover:bg-slate-50 transition text-base">സെറ്റ് കണക്ക്</a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
        measurementId: "G-J9Y5TW9D7T"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUserId = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            const userName = user.email.split('@')[0];
            document.getElementById("displayUser").innerText = userName;
            document.getElementById("userAvatar").innerText = userName.charAt(0).toUpperCase();
            
            calculateDashboard();
        } else {
            window.location.href = "login.html";
        }
    });

    function calculateDashboard() {
        // 1. ജീവനക്കാരുടെ കണക്കുകൾ എടുക്കുക
        const staffRef = ref(db, 'staff/' + currentUserId);
        onValue(staffRef, (snapshot) => {
            const data = snapshot.val() || {};
            let staffLiability = 0;

            Object.values(data).forEach(s => {
                let work = Number(s.workAmount || 0);
                let given = Number(s.givenAmount || 0);
                if (work > given) {
                    staffLiability += (work - given);
                }
            });

            // 2. വാടക ഉപകരണങ്ങളുടെ കണക്കുകൾ എടുക്കുക
            const rentRef = ref(db, 'rentals/' + currentUserId);
            onValue(rentRef, (rentSnapshot) => {
                const rentData = rentSnapshot.val() || {};
                let rentalLiability = 0;

                Object.values(rentData).forEach(r => {
                    let totalRent = Number(r.totalRent || 0);
                    let rentPaid = Number(r.rentPaid || 0);
                    if (totalRent > rentPaid) {
                        rentalLiability += (totalRent - rentPaid);
                    }
                });

                // 3. ജനറൽ എക്സ്പെൻസ്, വരുമാന കണക്കുകൾ എടുക്കുക
                const mainRef = ref(db, 'transactions/' + currentUserId);
                onValue(mainRef, (transSnapshot) => {
                    const transData = transSnapshot.val() || {};
                    let totalIncome = 0;
                    let generalPaid = 0;

                    Object.values(transData).forEach(t => {
                        let amount = Number(t.amount || 0);
                        if (t.type === 'income') {
                            totalIncome += amount;
                        } else if (t.type === 'expense') {
                            generalPaid += amount;
                        }
                    });

                    // ഫയർബേസ് വാടക കണക്ക് കാണാൻ (accounts പേജിലെ വാടകകൾ ഉണ്ടെങ്കിൽ)
                    let totalRentPaidFromAccounts = 0;
                    Object.values(transData).forEach(t => {
                        if (t.type === 'expense' && (t.description || '').includes('വാടക')) {
                            totalRentPaidFromAccounts += Number(t.amount || 0);
                        }
                    });

                    // എല്ലാ ജീവനക്കാർക്കും ആകെ കൊടുത്ത ശമ്പളം
                    let totalStaffPaid = Object.values(data).reduce((sum, s) => sum + Number(s.givenAmount || 0), 0);
                    
                    // എല്ലാ വാടകയ്ക്കും കൊടുത്ത തുക
                    let totalRentalPaid = Object.values(rentData).reduce((sum, r) => sum + Number(r.rentPaid || 0), 0);

                    // ആകെ കൊടുത്ത തുക (ശമ്പളം + വാടക + മറ്റ് ചെലവുകൾ)
                    let finalTotalPaid = totalStaffPaid + totalRentalPaid + generalPaid;

                    // കയ്യിലുള്ള തുക = ആകെ വരുമാനം - ആകെ കൊടുത്തത്
                    let finalCashInHand = totalIncome - finalTotalPaid;

                    // ആകെ ബാധ്യത = ജീവനക്കാർക്ക് കൊടുക്കാനുള്ളത് + വാടക കൊടുക്കാനുള്ളത്
                    let finalLiability = staffLiability + rentalLiability;

                    // സ്ക്രീനിൽ കാണിക്കുക
                    document.getElementById("totalIncome").innerText = "₹" + totalIncome;
                    document.getElementById("cashInHand").innerText = "₹" + finalCashInHand;
                    document.getElementById("totalLiability").innerText = "₹" + finalLiability;
                    document.getElementById("rentExpense").innerText = "₹" + rentalLiability;
                    document.getElementById("totalPaid").innerText = "₹" + finalTotalPaid;
                });
            });
        });
    }

    window.logout = function() {
        signOut(auth).then(() => {
            window.location.href = "login.html";
        });
    }
</script>
</body>
</html>
