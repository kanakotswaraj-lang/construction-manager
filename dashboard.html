<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesthri Pro - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap');
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col pb-24">

    <!-- TOP BAR (HEADER) -->
    <header class="bg-slate-900 text-white px-4 py-5 rounded-b-3xl shadow-lg flex justify-between items-center mx-3 mt-2">
        <div>
            <h1 class="text-2xl font-black tracking-wide text-amber-400">MESTHRI PRO</h1>
            <p class="text-xs text-slate-400 mt-1" id="dashDate">2026 ജൂലൈ 17</p>
        </div>
        
        <!-- USER PROFILE & LOGOUT SECTION -->
        <div class="flex items-center gap-3">
            <!-- പേരിന്റെ ആദ്യ അക്ഷരം കാണിക്കുന്ന വട്ടം (വലുതാക്കിയത്) -->
            <div id="userCircle" class="w-14 h-14 rounded-full bg-amber-500 text-slate-900 font-extrabold text-3xl flex items-center justify-center shadow-md overflow-hidden border-2 border-amber-400">
                മ
            </div>
            <!-- LOGOUT BUTTON -->
            <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-3 rounded-xl text-xs transition-all duration-200 flex items-center gap-1 active:scale-95 shadow-md">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>ലോഗ് ഔട്ട്</span>
            </button>
        </div>
    </header>

    <!-- MAIN DASHBOARD CONTENT -->
    <main class="flex-1 px-4 py-6 max-w-md mx-auto w-full space-y-6">

        <!-- CASH FLOW SUMMARY CARDS -->
        <div class="grid grid-cols-2 gap-4">
            <!-- INCOME CARD -->
            <div class="bg-gradient-to-br from-blue-700 to-blue-900 text-white p-5 rounded-2xl shadow-md border border-blue-600">
                <p class="text-xs font-bold text-blue-200 uppercase tracking-wider">ഈ മാസത്തെ വരവ്</p>
                <p class="text-3xl font-black mt-2 tracking-tight" id="dashIncome">₹0</p>
            </div>
            <!-- EXPENSE CARD -->
            <div class="bg-gradient-to-br from-amber-600 to-amber-800 text-white p-5 rounded-2xl shadow-md border border-amber-500">
                <p class="text-xs font-bold text-amber-200 uppercase tracking-wider">ഈ മാസത്തെ ചിലവ്</p>
                <p class="text-3xl font-black mt-2 tracking-tight" id="dashExpense">₹0</p>
            </div>
        </div>

        <!-- TOTAL SPENT CARD -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex justify-between items-center">
            <div>
                <p class="text-sm font-bold text-gray-500">തൊഴിലാളികൾക്ക് നൽകാനുള്ളത്</p>
                <p class="text-3xl font-black text-gray-900 mt-1" id="dashTotalSpent">₹0</p>
            </div>
            <div class="bg-red-50 p-3 rounded-xl text-red-600">
                <i class="fa-solid fa-wallet text-2xl"></i>
            </div>
        </div>

        <!-- QUICK LINKS / NAVIGATION BUTTONS -->
        <div class="space-y-4">
            <h2 class="text-lg font-bold text-gray-800 px-1">പ്രധാന സേവനങ്ങൾ</h2>
            
            <!-- Link 1: Workers -->
            <a href="workers.html" class="flex items-center justify-between bg-gradient-to-r from-purple-700 to-indigo-800 text-white p-5 rounded-2xl shadow-md hover:opacity-95 transition-all active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-xl text-xl w-12 h-12 flex items-center justify-center">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div>
                        <span class="text-lg font-bold block">ജീവനക്കാരുടെ ശമ്പളം</span>
                        <span class="text-xs text-purple-200">ഹാജരും ശമ്പള കണക്കുകളും</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-lg text-white/70"></i>
            </a>

            <!-- Link 2: Rentals -->
            <a href="rentals.html" class="flex items-center justify-between bg-gradient-to-r from-teal-700 to-emerald-800 text-white p-5 rounded-2xl shadow-md hover:opacity-95 transition-all active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-xl text-xl w-12 h-12 flex items-center justify-center">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                    </div>
                    <div>
                        <span class="text-lg font-bold block">വാടക ഉപകരണങ്ങൾ</span>
                        <span class="text-xs text-teal-200">മിക്സിംഗ് മെഷീൻ, ഷട്ടറിങ് തുടങ്ങിയവ</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-lg text-white/70"></i>
            </a>

            <!-- Link 3: Cash Book -->
            <a href="cash.html" class="flex items-center justify-between bg-gradient-to-r from-rose-700 to-pink-800 text-white p-5 rounded-2xl shadow-md hover:opacity-95 transition-all active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="bg-white/10 p-3 rounded-xl text-xl w-12 h-12 flex items-center justify-center">
                        <i class="fa-solid fa-chart-simple"></i>
                    </div>
                    <div>
                        <span class="text-lg font-bold block">വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</span>
                        <span class="text-xs text-rose-200">മറ്റ് നിർമ്മാണ ചിലവുകൾ</span>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-lg text-white/70"></i>
            </a>
        </div>

    </main>

    <!-- JAVASCRIPT FOR DATE & CALCULATIONS -->
    <script>
        // ലോഗ് ഔട്ട് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
        function handleLogout() {
            if(confirm("നിങ്ങൾക്ക് ലോഗ് ഔട്ട് ചെയ്യണോ മേസ്തിരി?")) {
                window.location.href = "index.html";
            }
        }

        // തീയതി കാണിക്കാൻ
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dashDate').innerText = new Date().toLocaleDateString('ml-IN', options);

        // പ്രൊഫൈൽ ഫോട്ടോയോ അക്ഷരമോ സെറ്റ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
        function setupUserProfile() {
            const container = document.getElementById('userCircle');
            
            let userPhoto = localStorage.getItem("mesthriPhoto"); 
            let userName = localStorage.getItem("mesthriName") || "മേസ്തിരി"; 

            if (userPhoto) {
                container.innerHTML = `<img src="${userPhoto}" class="w-full h-full object-cover" alt="Profile">`;
            } else {
                let firstLetter = userName.trim().charAt(0);
                container.innerText = firstLetter;
            }
        }

        // കണക്കുകൾ കൂട്ടി കാണിക്കാൻ
        function calculateCashFlow() {
            let totalIncome = 0;
            let totalExpense = 0;
            
            document.getElementById('dashIncome').innerText = '₹' + totalIncome;
            document.getElementById('dashExpense').innerText = '₹' + totalExpense;
            document.getElementById('dashTotalSpent').innerText = '₹' + totalExpense;
        }

        window.onload = function() {
            setupUserProfile();
            calculateCashFlow();
        };
    </script>
</body>
</html>
