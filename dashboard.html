<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesthri Pro</title>

<script>
    // ലോഗിൻ ചെയ്ത പേര് കാണിക്കാൻ
    window.onload = function() {
        const storedName = localStorage.getItem('userName');
        const userDiv = document.getElementById('userInitial');
        
        if (storedName) {
            userDiv.innerText = storedName.charAt(0).toUpperCase();
        } else {
            userDiv.innerText = 'മ'; 
        }
    };
</script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap');
        body { font-family: 'Manjari', sans-serif; background-color: #f3f4f6; }
        .card { border: 3px solid #000; border-radius: 20px; box-shadow: 5px 5px 0px #000; }
        .big-text { font-size: 1.5rem !important; font-weight: 900 !important; }
        .small-text { font-size: 1rem !important; font-weight: 700 !important; }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <header class="card bg-black text-white p-4 flex items-center justify-between mb-6">
        <div id="userInitial" class="w-14 h-14 bg-amber-400 rounded-full flex items-center justify-center text-black font-black text-2xl">മ</div>
        <h1 class="text-xl font-black text-amber-400 text-center">MESTHRI<br>PRO</h1>
        <button onclick="localStorage.clear(); window.location.href='index.html';" class="bg-red-600 px-3 py-2 rounded-xl text-sm font-bold">ലോഗ് ഔട്ട്</button>
    </header>

    <!-- Cards -->
    <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="card bg-blue-700 text-white p-4">
            <p class="small-text opacity-80">വരവ്</p>
            <p class="big-text" id="dashIncome">₹0</p>
        </div>
        <div class="card bg-orange-700 text-white p-4">
            <p class="small-text opacity-80">ചിലവ്</p>
            <p class="big-text" id="dashExpense">₹0</p>
        </div>
    </div>
    <div class="card bg-white p-4 mb-6">
        <p class="small-text text-gray-600">തൊഴിലാളികൾക്ക് നൽകാനുള്ളത്</p>
        <p class="big-text text-red-600" id="dashTotalSpent">₹0</p>
    </div>

    <!-- Links -->
    <div class="space-y-4">
        <a href="staff.html" class="card block bg-purple-700 text-white p-5">ജീവനക്കാരുടെ ശമ്പളം</a>
        <a href="rentals.html" class="card block bg-teal-700 text-white p-5">വാടക ഉപകരണങ്ങൾ</a>
        <a href="cash.html" class="card block bg-rose-700 text-white p-5">വരവ്-ചിലവ് രേഖപ്പെടുത്തുക</a>
    </div>

</body>
</html>
