<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>മെസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto">
        
        <!-- ഹെഡർ: മേസ്തിരിയുടെ ഫോട്ടോ, പേര്, ലോഗ് ഔട്ട്, ഡേറ്റ് -->
        <div class="bg-slate-900 p-6 rounded-3xl text-white mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <!-- ഇടതുവശം: മേസ്തിരിയുടെ ഫോട്ടോ (Placeholder) -->
                <div class="w-14 h-14 bg-slate-700 rounded-full flex items-center justify-center text-2xl">👷</div>
                <!-- വലതുവശം: ലോഗ് ഔട്ട് -->
                <a href="login.html" class="text-sm font-bold bg-slate-800 px-4 py-2 rounded-xl">Log Out ⇥</a>
            </div>
            
            <!-- സെൻറർ: മെസ്തിരി പ്രോ & സ്വാഗതം -->
            <div class="text-center mb-4">
                <h1 class="text-3xl font-black tracking-tight">MESHTRI PRO</h1>
                <p class="text-lg font-bold opacity-90">സ്വാഗതം, മേസ്തിരി</p>
            </div>
            
            <!-- ഇന്നത്തെ തീയതി -->
            <div class="text-center text-sm font-bold opacity-60 border-t border-slate-700 pt-3">
                ഇന്ന്: <span id="date"></span>
            </div>
        </div>

        <!-- പ്രധാന ബട്ടണുകൾ -->
        <div class="space-y-4">
            <a href="salary.html" class="bg-indigo-900 p-8 rounded-3xl shadow-lg flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <p class="text-4xl">👥</p>
                    <p class="text-xl font-black text-white">ജീവനക്കാരുടെ ശമ്പളം</p>
                </div>
                <p class="text-white text-2xl">→</p>
            </a>
            <a href="rentals.html" class="bg-emerald-900 p-8 rounded-3xl shadow-lg flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <p class="text-4xl">🏗️</p>
                    <p class="text-xl font-black text-white">വാടക ഉപകരണങ്ങൾ</p>
                </div>
                <p class="text-white text-2xl">→</p>
            </a>
            <a href="materials.html" class="bg-indigo-800 p-8 rounded-3xl shadow-lg flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <p class="text-4xl">🧱</p>
                    <p class="text-xl font-black text-white">മെറ്റീരിയൽസ്</p>
                </div>
                <p class="text-white text-2xl">→</p>
            </a>
            <a href="accounts.html" class="bg-rose-800 p-8 rounded-3xl shadow-lg flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <p class="text-4xl">📊</p>
                    <p class="text-xl font-black text-white">വരവ് - ചെലവ്</p>
                </div>
                <p class="text-white text-2xl">→</p>
            </a>
        </div>
    </div>

    <!-- തീയതി മാറാനുള്ള സ്ക്രിപ്റ്റ് -->
    <script>
        const date = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('date').innerText = date.toLocaleDateString('ml-IN', options);
    </script>
</body>
</html>
