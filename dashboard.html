<!DOCTYPE html>
<html lang="ml" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>മേസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- മനോഹരമായ മലയാളം ഫോണ്ട് -->
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        
        <!-- ഹെഡർ ബോക്സ് -->
        <div class="mx-4 mt-4 p-4 bg-gradient-to-r from-slate-900 to-indigo-950 rounded-2xl shadow-xl flex items-center justify-between border border-slate-800">
            <span class="text-amber-400 font-black text-sm tracking-wider">MESTHRI PRO</span>
            <span class="text-slate-400 text-xs font-bold" id="liveDate"></span>
        </div>

        <!-- പ്രധാന കണക്കുകൾ കാണിക്കുന്ന ബോക്സുകൾ (ഡിസൈൻ മാറാതെ) -->
        <div class="grid grid-cols-2 gap-4 mx-4 mt-6">
            <!-- ഈ മാസത്തെ വരവ് -->
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 p-4 rounded-3xl shadow-md text-white">
                <span class="text-xs font-bold opacity-80 block">ഈ മാസത്തെ വരവ്</span>
                <span class="text-2xl font-black block mt-1" id="dashIncome">₹0</span>
            </div>
            <!-- ഈ മാസത്തെ ചിലവ് -->
            <div class="bg-gradient-to-br from-orange-500 to-amber-600 p-4 rounded-3xl shadow-md text-white">
                <span class="text-xs font-bold opacity-80 block">ഈ മാസത്തെ ചിലവ്</span>
                <span class="text-2xl font-black block mt-1" id="dashExpense">₹0</span>
            </div>
        </div>

        <!-- ആകെ ബാധ്യത കാണിക്കുന്ന വലിയ ബോക്സ് -->
        <div class="mx-4 mt-4 p-5 bg-rose-50 border border-rose-100 rounded-3xl shadow-sm text-center">
            <span class="text-xs font-bold text-rose-800 uppercase tracking-wider block">തൊഴിലാളികൾക്ക് ആകെ കൊടുക്കാനുള്ളത്</span>
            <span class="text-3xl font-black text-rose-600 block mt-1" id="dashStaffBalance">₹0</span>
        </div>

        <!-- വാടക ഉപകരണങ്ങളുടെ കണക്ക് -->
        <div class="grid grid-cols-2 gap-4 mx-4 mt-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-[11px] font-bold text-slate-400 block">വാടകയിനത്തിൽ കൊടുക്കാനുള്ളത്</span>
                <span class="text-xl font-black text-slate-800 block mt-0.5" id="dashRentPending">₹16000</span>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-[11px] font-bold text-slate-400 block">ആകെ ചിലവായ തുക</span>
                <span class="text-xl font-black text-slate-800 block mt-0.5" id="dashTotalSpent">₹1500</span>
            </div>
        </div>

        <!-- മെനു ബട്ടണുകൾ (ലക്ഷ്വറി ഡിസൈൻ) -->
        <div class="mx-4 mt-8 space-y-4">
            
            <!-- ജീവനക്കാർ ബട്ടൺ -->
            <a href="staff.html" class="flex items-center justify-between p-5 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-2xl text-white shadow-md transition active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-2xl">👥</div>
                    <span class="text-lg font-bold">ജീവനക്കാർ</span>
                </div>
                <span class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-sm">→</span>
            </a>

            <!-- വാടക ഉപകരണങ്ങൾ ബട്ടൺ -->
            <a href="#" onclick="alert('ഈ ഫീച്ചർ അടുത്ത അപ്ഡേറ്റിൽ വരും മേസ്തിരി!')" class="flex items-center justify-between p-5 bg-gradient-to-r from-emerald-600 to-teal-600 rounded-2xl text-white shadow-md transition active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-2xl">🛠️</div>
                    <span class="text-lg font-bold">വാടക ഉപകരണങ്ങൾ</span>
                </div>
                <span class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-sm">→</span>
            </a>

            <!-- വരവ്-ചെലവ് രേഖപ്പെടുത്തുക ബട്ടൺ -->
            <a href="#" onclick="alert('ഈ ഫീച്ചർ അടുത്ത അപ്ഡേറ്റിൽ വരും മേസ്തിരി!')" class="flex items-center justify-between p-5 bg-gradient-to-r from-rose-500 to-pink-600 rounded-2xl text-white shadow-md transition active:scale-98">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-2xl">📊</div>
                    <span class="text-lg font-bold">വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</span>
                </div>
                <span class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-sm">→</span>
            </a>

            <!-- വാട്സാപ്പ് ഫീഡ്ബാക്ക് ബട്ടൺ -->
            <a href="https://wa.me/919495315236" class="flex items-center justify-center gap-2 p-4 bg-emerald-500 text-white font-bold rounded-2xl shadow-md transition active:scale-98 text-center text-sm">
                💬 അഭിപ്രായങ്ങൾ അറിയിക്കുക (WhatsApp)
            </a>

        </div>

    </div>

    <script>
        window.onload = function() {
            // തീയതി കാണിക്കാൻ
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveDate').innerText = new Date().toLocaleDateString('ml-IN', options);

            // ജീവനക്കാരുടെ കണക്കുകൾ ലോക്കൽ സ്റ്റോറേജിൽ നിന്ന് എടുത്ത് തുക കൂട്ടുന്നു
            calculateStaffBalance();
        };

        function calculateStaffBalance() {
            const staffMembers = JSON.parse(localStorage.getItem('mesthri_staff')) || [];
            let totalPendingToStaff = 0;

            staffMembers.forEach(member => {
                let earned = 0;
                let paid = 0;
                
                (member.history || []).forEach(h => {
                    if(h.type === 'attendance') {
                        earned += h.amount;
                    } else {
                        paid += h.amount;
                    }
                });

                let bal = earned - paid;
                // മേസ്തിരി ഇനി കൊടുക്കാനുള്ള പൈസ മാത്രം കൂട്ടുന്നു (തൊഴിലാളി കൂടുതൽ വാങ്ങിയത് കുറയ്ക്കില്ല)
                if (bal > 0) {
                    totalPendingToStaff += bal;
                }
            });

            // മെയിൻ ഡാഷ്‌ബോർഡിലെ ബോക്സിലേക്ക് തുക മാറ്റുന്നു
            document.getElementById('dashStaffBalance').innerText = '₹' + totalPendingToStaff;
        }
    </script>
</body>
</html>
