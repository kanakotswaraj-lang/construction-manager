<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        // ലോഗിൻ ചെയ്തിട്ടുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
        if (!localStorage.getItem('userName')) {
            window.location.href = "login.html";
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    <title>മെസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto">

<!-- ഹെഡർ ഭാഗം: ലേറ്റസ്റ്റ് മോഡൽ -->
<div class="bg-slate-900 p-6 rounded-[2rem] shadow-2xl text-white mb-6 border border-slate-700 relative overflow-hidden">
    
    <!-- ഫോട്ടോയും ലോഗ് ഔട്ടും -->
    <div class="flex justify-between items-center mb-6">
        <!-- ഫോട്ടോ അപ്‌ലോഡ് ഭാഗം -->
        <label for="photoUpload" class="cursor-pointer group">
            <div class="relative">
                <img id="profileImage" src="https://ui-avatars.com/api/?name=User" class="w-16 h-16 rounded-2xl border-2 border-slate-700 shadow-lg object-cover transition group-hover:opacity-75">
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                    <span class="text-[10px] font-bold bg-black/50 px-2 py-1 rounded">മാറ്റുക</span>
                </div>
            </div>
            <input type="file" id="photoUpload" class="hidden" accept="image/*" onchange="updateProfilePhoto(event)">
        </label>
        
        <button onclick="logoutUser()" class="w-10 h-10 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center font-bold hover:bg-red-500 hover:text-white transition">✕</button>
    </div>

    <!-- മെയിൻ ടൈറ്റിൽ -->
    <div class="text-center space-y-1">
        <h1 class="text-3xl font-black text-white tracking-tight">MESHTRI <span class="text-blue-500">PRO</span></h1>
        <!-- ഇവിടെയാണ് ലോഗിൻ ചെയ്ത ആളുടെ പേര് വരുന്നത് -->
        <p id="meshtriNameDisplay" class="text-blue-400 font-bold text-lg italic">സ്വാഗതം, മേസ്തിരി</p>
    </div>

    <!-- തീയതി ബോക്സ് -->
    <div class="mt-6 flex justify-center">
        <div class="bg-slate-800 border border-slate-700 px-6 py-2 rounded-full flex items-center gap-2 shadow-inner">
            <p id="currentDate" class="text-xs font-bold text-slate-300"></p>
        </div>
    </div>
</div>

<script>
    // പേജ് ലോഡ് ആകുമ്പോൾ പേരും ഫോട്ടോയും സെറ്റ് ചെയ്യുന്നു
    window.onload = function() {
        // 1. പേര് സെറ്റ് ചെയ്യുന്നു
        const userName = localStorage.getItem('userName');
        if (userName) {
            document.getElementById('meshtriNameDisplay').innerText = "സ്വാഗതം, " + userName;
        }

        // 2. തീയതി സെറ്റ് ചെയ്യുന്നു
        const today = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = "ഇന്ന്: " + today.toLocaleDateString('ml-IN', options);

        // 3. സേവ് ചെയ്ത ഫോട്ടോ ഉണ്ടെങ്കിൽ അത് കാണിക്കുന്നു
        const savedPhoto = localStorage.getItem('profilePhoto');
        if (savedPhoto) {
            document.getElementById('profileImage').src = savedPhoto;
        }
    };

    // ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുമ്പോൾ
    function updateProfilePhoto(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const imgElement = document.getElementById('profileImage');
            imgElement.src = reader.result;
            localStorage.setItem('profilePhoto', reader.result); // ഫോട്ടോ സേവ് ചെയ്യുന്നു
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // ലോഗ് ഔട്ട്
    function logoutUser() {
        localStorage.removeItem('userName');
        localStorage.removeItem('profilePhoto');
        window.location.href = "login.html";
    }
</script>

        <!-- ബട്ടണുകൾ -->
        <div class="space-y-4">
            <a href="staff.html" class="bg-indigo-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">👥 ജീവനക്കാരുടെ ശമ്പളം</p>
            </a>
            <a href="rentals.html" class="bg-emerald-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🏗️ വാടക ഉപകരണങ്ങൾ</p>
            </a>
            <a href="materials.html" class="bg-indigo-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🧱 മെറ്റീരിയൽസ്</p>
            </a>
            <a href="accounts.html" class="bg-rose-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">📊 വരവ് - ചെലവ്</p>
            </a>
        </div>

        <!-- വാട്സാപ്പ് സപ്പോർട്ട് -->
        <a href="https://wa.me/916238020523" class="mt-8 bg-emerald-600 text-white p-5 rounded-2xl flex items-center justify-center font-black shadow-lg">
            💬 വാട്സാപ്പിൽ ബന്ധപ്പെടുക (916238020523)
        </a>
    </div>

    <script>
        // ലോഗ് ഔട്ട് ഫംഗ്‌ഷൻ
        function logoutUser() {
            localStorage.removeItem('userName'); 
            window.location.href = "login.html";
        }

        const photoUpload = document.getElementById('photoUpload');
        const profileImage = document.getElementById('profileImage');

        photoUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImage.src = e.target.result;
                    localStorage.setItem('profilePhoto', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        window.onload = function() {
            const savedPhoto = localStorage.getItem('profilePhoto');
            if (savedPhoto) {
                profileImage.src = savedPhoto;
            }

            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const dateElement = document.getElementById('currentDate');
            if(dateElement) {
                dateElement.innerText = "ഇന്ന്: " + today.toLocaleDateString('ml-IN', options);
            }
        }
    </script>
</body>
</html>
