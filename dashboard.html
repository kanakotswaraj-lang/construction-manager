<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        // ലോഗിൻ ചെയ്തിട്ടുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
        if (!localStorage.getItem('userName')) {
            window.location.href = "login.html";
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    <title>മെസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto">

<!-- ഹെഡർ ഭാഗം: ചിത്രത്തിലുള്ളതുപോലെയുള്ള പെർഫെക്റ്റ് ലേഔട്ട് -->
<div class="bg-slate-900 rounded-[2.5rem] shadow-2xl text-white mb-6 border border-slate-700 relative overflow-hidden">
    
    <!-- കവർ ബാനർ ഭാഗം -->
    <div class="relative h-36 w-full bg-slate-800 group overflow-hidden">
        <label for="coverUpload" class="cursor-pointer block w-full h-full">
            <img id="coverImage" src="https://images.unsplash.com/photo-1541888946425-d0fbb18f17e2?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover transition duration-300 group-hover:opacity-75">
            <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                <span class="text-xs font-bold bg-black/60 px-3 py-1.5 rounded-full text-white backdrop-blur-sm">📷 കവർ മാറ്റുക</span>
            </div>
        </label>
        <input type="file" id="coverUpload" class="hidden" accept="image/*" onchange="updateCoverPhoto(event)">
        
        <!-- ലോഗ് ഔട്ട് ബട്ടൺ (വലതുവശത്ത് മുകളിൽ) -->
        <button onclick="logoutUser()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-slate-900/80 backdrop-blur-md text-red-400 border border-slate-700 flex items-center justify-center font-bold shadow-lg hover:bg-red-500 hover:text-white transition duration-300 z-10" title="ലോഗ് ഔട്ട്">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </div>

    <!-- പ്രൊഫൈൽ ഫോട്ടോയും വിവരങ്ങളും -->
    <div class="px-6 pb-6 pt-0 relative">
        <!-- പ്രൊഫൈൽ ഫോട്ടോ അപ്‌ലോഡ് ഭാഗം (കവറിലേക്ക് കയറിനിൽക്കുന്ന ഓവർലാപ്പ് ലുക്ക്) -->
        <label for="photoUpload" class="cursor-pointer group relative inline-block -mt-10 mb-4">
            <div class="relative p-1.5 bg-slate-900 rounded-3xl shadow-2xl border-2 border-slate-700">
                <img id="profileImage" src="https://ui-avatars.com/api/?name=User" class="w-24 h-24 rounded-2xl object-cover transition group-hover:opacity-75">
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded-2xl">
                    <span class="text-[10px] font-bold bg-black/80 px-2 py-1 rounded text-white backdrop-blur-sm">മാറ്റുക</span>
                </div>
            </div>
            <input type="file" id="photoUpload" class="hidden" accept="image/*" onchange="updateProfilePhoto(event)">
        </label>

        <!-- മെയിൻ ടൈറ്റിലും വിവരങ്ങളും (നടുവിലായി ക്രമീകരിച്ചത്) -->
        <div class="text-center space-y-1.5">
            <h1 class="text-4xl font-black text-white tracking-tight flex items-center justify-center gap-2">
                MESHTRI <span class="text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">PRO</span>
            </h1>
            <p class="text-xs font-semibold tracking-widest text-slate-400 uppercase">SMART SITE MANAGER</p>
            
            <!-- ലോഗിൻ ചെയ്ത ആളുടെ പേര് -->
            <p id="meshtriNameDisplay" class="text-blue-400 font-bold text-lg pt-1">സ്വാഗതം, മേസ്തിരി</p>
        </div>

        <!-- തീയതി ബോക്സ് -->
        <div class="mt-5 flex justify-center">
            <div class="bg-slate-800/80 border border-slate-700/80 px-5 py-2 rounded-full flex items-center gap-2 shadow-inner backdrop-blur-sm">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <p id="currentDate" class="text-xs font-bold text-slate-300"></p>
            </div>
        </div>
    </div>
</div>
<!-- ഹെഡർ ഭാഗം അവസാനിക്കുന്നു -->

<script>
    // പേജ് ലോഡ് ആകുമ്പോൾ പേരും ഫോട്ടോയും കവറും സെറ്റ് ചെയ്യുന്നു
    window.onload = function() {
        // 1. പേര് സെറ്റ് ചെയ്യുന്നു
        const userName = localStorage.getItem('userName');
        if (userName) {
            document.getElementById('meshtriNameDisplay').innerText = "സ്വാഗതം, " + userName;
        }

        // 2. തീയതി സെറ്റ് ചെയ്യുന്നു
        const today = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const dateElement = document.getElementById('currentDate');
        if(dateElement) {
            dateElement.innerText = "ഇന്ന്: " + today.toLocaleDateString('ml-IN', options);
        }

        // 3. സേവ് ചെയ്ത പ്രൊഫൈൽ ഫോട്ടോ ഉണ്ടെങ്കിൽ അത് കാണിക്കുന്നു
        const savedPhoto = localStorage.getItem('profilePhoto');
        if (savedPhoto) {
            document.getElementById('profileImage').src = savedPhoto;
        }

        // 4. സേവ് ചെയ്ത കവർ ഫോട്ടോ ഉണ്ടെങ്കിൽ അത് കാണിക്കുന്നു
        const savedCover = localStorage.getItem('coverPhoto');
        if (savedCover) {
            document.getElementById('coverImage').src = savedCover;
        }
    };

    // പ്രൊഫൈൽ ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുമ്പോൾ
    function updateProfilePhoto(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e){
                document.getElementById('profileImage').src = e.target.result;
                localStorage.setItem('profilePhoto', e.target.result);
            };
            reader.readAsDataURL(file);
        }
    }

    // കവർ ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുമ്പോൾ
    function updateCoverPhoto(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e){
                document.getElementById('coverImage').src = e.target.result;
                localStorage.setItem('coverPhoto', e.target.result);
            };
            reader.readAsDataURL(file);
        }
    }

    // ലോഗ് ഔട്ട്
    function logoutUser() {
        localStorage.removeItem('userName');
        localStorage.removeItem('profilePhoto');
        localStorage.removeItem('coverPhoto');
        window.location.href = "login.html";
    }
</script>

        <!-- ബട്ടണുകൾ -->
        <div class="space-y-4">

                <p class="text-xl font-black">👥 ജീവനക്കാരുടെ ശമ്പളം</p>

                <p class="text-xl font-black">🏗️ വാടക ഉപകരണങ്ങൾ</p>
            </a>
            <a href="materials.html" class="bg-indigo-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white hover:scale-[1.02] transition duration-200">
                <p class="text-xl font-black">🧱 മെറ്റീരിയൽസ്</p>
            </a>
            <a href="accounts.html" class="bg-rose-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white hover:scale-[1.02] transition duration-200">
                <p class="text-xl font-black">📊 വരവ് - ചെലവ്</p>
            </a>
        </div>

        <!-- വാട്സാപ്പ് സപ്പോർട്ട് -->

            💬 വാട്സാപ്പിൽ ബന്ധപ്പെടുക (916238020523)

    </div>
</body>
</html>
