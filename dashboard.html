<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഡാഷ്‌ബോർഡ് - മെസ്ത്രി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-md mx-auto">
    <div id="user-info" class="mb-4">ലോഗിൻ പരിശോധിക്കുന്നു...</div>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">ലോഗ് ഔട്ട് ചെയ്യുക</button>
    
    <hr class="my-6">
    
    <a href="transactions.html" class="block w-full bg-blue-500 text-white p-4 text-center rounded-xl mb-4 font-bold">
        പുതിയ വരവ്/ചെലവ് ചേർക്കുക
    </a>

    <!-- മൊത്തം തുക -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-green-600 text-white p-4 rounded-2xl text-center shadow-lg">
            <p class="text-xs opacity-80">ആകെ വരവ്</p>
            <h2 id="total-income" class="text-xl font-bold">₹0</h2>
        </div>
        <div class="bg-red-600 text-white p-4 rounded-2xl text-center shadow-lg">
            <p class="text-xs opacity-80">ആകെ ചെലവ്</p>
            <h2 id="total-expense" class="text-xl font-bold">₹0</h2>
        </div>
    </div>
<!-- സെർച്ച് & ഫിൽറ്റർ -->
<div class="mb-4 flex gap-2">
    <input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." class="p-2 border rounded-lg w-full">
    <select id="categoryFilter" class="p-2 border rounded-lg">
        <option value="എല്ലാം">എല്ലാം</option>
        <option value="സാധനങ്ങൾ">സാധനങ്ങൾ</option>
        <option value="കൂലി">കൂലി</option>
    </select>
</div>
    <h3 class="text-lg font-bold mb-4">കണക്കുകളുടെ പട്ടിക</h3>
    <div id="worksList" class="space-y-2"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

async function loadTransactions() {
    const querySnapshot = await getDocs(query(collection(db, "transactions"), orderBy("timestamp", "desc")));
    const rentalSnapshot = await getDocs(collection(db, "rentals"));

    let totalIncome = 0;
    let totalExpense = 0; // ഇവിടെയാണ് നമ്മൾ ആദ്യം വാടകച്ചെലവ് കൂട്ടാൻ പോകുന്നത്

    // 1. ആദ്യം വാടകച്ചെലവ് കണക്കാക്കി totalExpense-ലേക്ക് കൂട്ടുക
    rentalSnapshot.forEach((doc) => {
        const r = doc.data();
        let days = Math.max(1, Math.ceil((new Date() - new Date(r.startDate)) / (1000 * 60 * 60 * 24)));
        let totalRental = (Number(r.qty) * Number(r.rate) * days);
        totalExpense += totalRental; 
    });

    // 2. ബാക്കി വരവ്/ചെലവ് എൻട്രികൾ ലൂപ്പ് ചെയ്യുക
    const listDiv = document.getElementById("worksList");
    listDiv.innerHTML = "";
    
    const searchInput = document.getElementById("searchInput").value.toLowerCase();
    const categoryFilter = document.getElementById("categoryFilter").value;

    querySnapshot.forEach((doc) => {
        const data = doc.data();
        const category = data.category || "മറ്റ് ചെലവുകൾ";
        const matchesSearch = data.description.toLowerCase().includes(searchInput);
        const matchesCategory = (categoryFilter === "എല്ലാം" || category === categoryFilter);

        if (matchesSearch && matchesCategory) {
            const amount = Number(data.amount);
            
            // കൂലി എന്ന വിഭാഗം വരുമാനത്തിൽ കൂട്ടരുത് എന്ന് പറഞ്ഞതുകൊണ്ട്:
            if (data.type === "വരവ്") {
                totalIncome += amount;
            } else if (data.type === "ചെലവ്") {
                totalExpense += amount; // കൂലിയും മറ്റ് ചെലവുകളും ഇവിടെ വരും
            }

            listDiv.innerHTML += `... (നിങ്ങളുടെ പഴയ HTML കോഡ് ഇവിടെ നൽകുക) ...`;
        }
    });

    document.getElementById("total-income").innerText = "₹" + totalIncome;
    document.getElementById("total-expense").innerText = "₹" + totalExpense;
}

                listDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-sm border mb-2 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${data.description} <span class="text-[10px] bg-gray-200 px-1 rounded">${category}</span></p>
                            <p class="text-xs text-gray-500">${data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString('ml-IN') : 'N/A'}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <p class="font-bold ${data.type === 'വരവ്' ? 'text-green-600' : 'text-red-600'}">₹${amount}</p>
                            <button onclick="editTransaction('${doc.id}', '${data.description}', ${amount})" class="text-blue-500 px-2 font-bold">✎</button>
                            <button onclick="deleteTransaction('${doc.id}')" class="text-red-500 px-2 font-bold">X</button>
                        </div>
                    </div>
                `;
            }
        });
        incomeElement.innerText = "₹" + totalIncome;
        expenseElement.innerText = "₹" + totalExpense;
    }

    document.getElementById("searchInput").addEventListener("input", loadTransactions);
    document.getElementById("categoryFilter").addEventListener("change", loadTransactions);

    window.deleteTransaction = async (id) => {
        if (confirm("ഈ എൻട്രി നീക്കം ചെയ്യണോ?")) {
            await deleteDoc(doc(db, "transactions", id));
            loadTransactions();
        }
    };

    window.editTransaction = async (id, currentDesc, currentAmount) => {
        const newDesc = prompt("വിവരണം മാറ്റുക:", currentDesc);
        const newAmount = prompt("തുക മാറ്റുക:", currentAmount);
        if (newDesc !== null && newAmount !== null) {
            await updateDoc(doc(db, "transactions", id), { description: newDesc, amount: Number(newAmount) });
            loadTransactions();
        }
    };

    
</script>
</body>
</html>
