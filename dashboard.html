<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>മെസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-slate-900 p-6 rounded-3xl text-white mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <!-- ഫോട്ടോ അപ്‌ലോഡ് സെക്ഷൻ -->
                <label for="photoUpload" class="cursor-pointer">
                    <img id="preview" src="https://ui-avatars.com/api/?name=M" class="w-16 h-16 rounded-full border-2 border-slate-600 object-cover">
                    <input type="file" id="photoUpload" class="hidden" accept="image/*">
                </label>
                <a href="login.html" class="text-xs font-bold bg-slate-800 px-4 py-2 rounded-xl">Log Out →</a>
            </div>
            <h1 class="text-2xl font-black">MESHTRI PRO</h1>
            <p class="text-md font-bold opacity-90">സ്വാഗതം, മേസ്തിരി</p>
            <div class="text-center text-sm font-bold opacity-60 border-t border-slate-700 pt-3 mt-3">
                ഇന്ന്: 2026 ജൂലൈ 18
            </div>
        </div>

        <!-- ബട്ടണുകൾ -->
        <div class="space-y-4">
            <a href="salary.html" class="bg-indigo-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">👥 ജീവനക്കാരുടെ ശമ്പളം</p>
            </a>
            <a href="rentals.html" class="bg-emerald-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🏗️ വാടക ഉപകരണങ്ങൾ</p>
            </a>
            <a href="materials.html" class="bg-indigo-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🧱 മെറ്റീരിയൽസ്</p>
            </a>
            <a href="transactions.html" class="bg-rose-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">📊 വരവ് - ചെലവ്</p>
            </a>
        </div>

        <!-- വാട്സാപ്പ് സപ്പോർട്ട് -->
        <a href="https://wa.me/916238020523" class="mt-8 bg-emerald-600 text-white p-5 rounded-2xl flex items-center justify-center font-black shadow-lg">
            💬 വാട്സാപ്പിൽ ബന്ധപ്പെടുക (916238020523)
        </a>
    </div>

    <!-- ഫോട്ടോ അപ്‌ലോഡ് സ്ക്രിപ്റ്റ് -->
    <script>
        const photoUpload = document.getElementById('photoUpload');
        const preview = document.getElementById('preview');

        photoUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    localStorage.setItem('profilePhoto', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        window.onload = function() {
            const savedPhoto = localStorage.getItem('profilePhoto');
            if (savedPhoto) {
                preview.src = savedPhoto;
            }
        }
    </script>
</body>
</html>
