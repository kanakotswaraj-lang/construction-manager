<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        // ലോഗിൻ ചെയ്തിട്ടുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
        if (!localStorage.getItem('userName')) {
            window.location.href = "login.html";
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    <title>മെസ്തിരി പ്രോ - ഡാഷ്‌ബോർഡ്</title>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto">
        
<!-- ഹെഡർ ഭാഗം: പുതിയ സ്റ്റൈലിൽ -->
<div class="bg-slate-900 p-6 rounded-[2rem] shadow-2xl text-white mb-6 border border-slate-700 relative">
    
    <!-- മുകൾ ഭാഗം: പ്രൊഫൈൽ ഫോട്ടോയും ലോഗ് ഔട്ടും -->
    <div class="flex justify-between items-center mb-4">
        <label for="photoUpload" class="cursor-pointer">
            <img id="profileImage" src="https://ui-avatars.com/api/?name=M" class="w-12 h-12 rounded-full border-2 border-white object-cover">
            <input type="file" id="photoUpload" class="hidden" accept="image/*" onchange="previewImage(event)">
        </label>
        
        <!-- റൗണ്ട് ലോഗ് ഔട്ട് ബട്ടൺ -->
        <button onclick="logoutUser()" class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white font-bold shadow-lg hover:bg-red-700 transition">✕</button>
    </div>

    <!-- സെൻട്രൽ ഭാഗം: ടൈറ്റിലും സ്വാഗതവും -->
    <div class="text-center">
        <!-- തിളങ്ങുന്ന നീല നിറത്തിലുള്ള മെസ്തിരി പ്രോ -->
        <h1 class="text-4xl font-black text-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.8)] mb-1">
            MESHTRI PRO
        </h1>
        <p class="text-lg font-semibold text-slate-300">സ്വാഗതം, മേസ്തിരി</p>
    </div>

    <!-- തീയതി: നടുവിൽ -->
    <div class="mt-4 text-center">
        <p id="currentDate" class="text-sm font-bold text-blue-400 bg-blue-900/30 inline-block px-4 py-1 rounded-full"></p>
    </div>
</div>

        <!-- ബട്ടണുകൾ -->
        <div class="space-y-4">
            <a href="staff.html" class="bg-indigo-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">👥 ജീവനക്കാരുടെ ശമ്പളം</p>
            </a>
            <a href="rentals.html" class="bg-emerald-900 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🏗️ വാടക ഉപകരണങ്ങൾ</p>
            </a>
            <a href="materials.html" class="bg-indigo-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">🧱 മെറ്റീരിയൽസ്</p>
            </a>
            <a href="accounts.html" class="bg-rose-800 p-8 rounded-3xl shadow-lg flex items-center justify-between text-white">
                <p class="text-xl font-black">📊 വരവ് - ചെലവ്</p>
            </a>
        </div>

        <!-- വാട്സാപ്പ് സപ്പോർട്ട് -->
        <a href="https://wa.me/916238020523" class="mt-8 bg-emerald-600 text-white p-5 rounded-2xl flex items-center justify-center font-black shadow-lg">
            💬 വാട്സാപ്പിൽ ബന്ധപ്പെടുക (916238020523)
        </a>
    </div>

    <script>
        // ലോഗ് ഔട്ട് ഫംഗ്‌ഷൻ
        function logoutUser() {
            localStorage.removeItem('userName'); 
            window.location.href = "login.html";
        }

        const photoUpload = document.getElementById('photoUpload');
        const profileImage = document.getElementById('profileImage');

        photoUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImage.src = e.target.result;
                    localStorage.setItem('profilePhoto', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        window.onload = function() {
            const savedPhoto = localStorage.getItem('profilePhoto');
            if (savedPhoto) {
                profileImage.src = savedPhoto;
            }

            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const dateElement = document.getElementById('currentDate');
            if(dateElement) {
                dateElement.innerText = "ഇന്ന്: " + today.toLocaleDateString('ml-IN', options);
            }
        }
    </script>
</body>
</html>
