<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഡാഷ്‌ബോർഡ് - മെസ്ത്രി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .main-container { max-width: 500px; margin: auto; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="user-info" class="mb-4">ലോഗിൻ ചെയ്യുന്നു...</div>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">ലോഗ് ഔട്ട് ചെയ്യുക</button>
    
    <hr class="my-6">
    
    <a href="transactions.html" class="block w-full bg-blue-500 text-white p-4 text-center rounded-xl mb-4 font-bold">
        പുതിയ വരവ്/ചെലവ് ചേർക്കുക
    </a>

    <!-- മൊത്തം തുകയുടെ ബോക്സ് പട്ടികയ്ക്ക് മുകളിൽ -->
    <div class="bg-blue-600 text-white p-6 rounded-2xl mb-6 text-center shadow-lg">
        <p class="text-sm opacity-80">മൊത്തം ചെലവ്</p>
        <h2 id="total-amount" class="text-3xl font-bold">₹0</h2>
    </div>

    <h3 class="text-lg font-bold mb-4">കണക്കുകളുടെ പട്ടിക</h3>
    <div id="worksList" class="space-y-2"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("user-info").innerText = "ഹലോ, " + user.displayName;
            loadTransactions();
        } else {
            window.location.href = "login.html";
        }
    });

    window.logout = () => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };

    async function loadTransactions() {
        const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        const listDiv = document.getElementById("worksList");
        const totalElement = document.getElementById("total-amount");
        
        listDiv.innerHTML = "";
        let total = 0;

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const amount = Number(data.amount);
            total += amount;

            listDiv.innerHTML += `
                <div class="bg-white p-4 rounded-lg shadow-sm border flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800">${data.description}</p>
                        <p class="text-sm text-gray-600">${data.type}</p>
                    </div>
                    <p class="font-bold text-red-600">₹${amount}</p>
                </div>
            `;
        });
        totalElement.innerText = "₹" + total;
    }
</script>
</body>
</html>
