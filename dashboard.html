<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഡാഷ്‌ബോർഡ്</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 24px; }
        #user-info { margin: 20px 0; font-size: 18px; color: #555; }
        button { background-color: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #ff6b81; }
    </style>
</head>
<body>

    <div class="container">
    <h1>മേസ്തിരി ആപ്പ്</h1>
    <div id="user-info"></div>
    
    <!-- പുതിയ ലിങ്ക് ഇവിടെ ചേർക്കുക -->
    <a href="work-entry.html" style="text-decoration: none;">
        <button style="background-color: #28a745; margin-bottom: 10px; width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 16px;">
    </a>

 <div class="container">
    <h1>മേസ്തിരി ആപ്പ്</h1>
    <div id="user-info"></div>
    <a href="work-entry.html"><button>പുതിയ ജോലി ചേർക്കുക</button></a>
    
    <h3>ജോലികളുടെ ലിസ്റ്റ്</h3>
    <div id="worksList"></div> <!-- ഇവിടെയാണ് ജോലികൾ വരുന്നത് -->
    <style>
    /* നിലവിലുള്ള സ്റ്റൈലിനോടൊപ്പം ഇതും ചേർക്കുക */
    .container {
        max-width: 400px;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 10px;
        text-align: center;
        font-family: sans-serif;
    }
    button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
    }
    #worksList {
        text-align: left;
        margin-top: 15px;
    }
    .work-box {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        background-color: #f9f9f9;
    }
</style>
    <button onclick="logout()">ലോഗ് ഔട്ട് ചെയ്യുക</button>
</div>   

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
          authDomain: "mesthri-app.firebaseapp.com",
          projectId: "mesthri-app",
          storageBucket: "mesthri-app.firebasestorage.app",
          messagingSenderId: "1060617901864",
          appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
          measurementId: "G-J9Y5TW9D7T"
        };

        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("user-info").innerHTML = "സ്വാഗതം, <strong>" + user.displayName + "</strong>";
            } else {
                window.location.href = "login.html";
            }
        });

        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = "login.html";
            });
        }
        
    const worksList = document.getElementById('worksList');

    // ഡാറ്റാബേസിൽ നിന്ന് ജോലികൾ എടുക്കുന്നു
    db.collection("works").get().then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
            const work = doc.data();
            const div = document.createElement("div");
            div.style.border = "1px solid #ccc";
            div.style.padding = "10px";
            div.style.margin = "10px 0";
            div.innerHTML = `<strong>ജോലി:</strong> ${work.name} <br> <strong>തുക:</strong> ₹${work.amount}`;
            worksList.appendChild(div);
        });
    }
    </script>
</body>
</html>
