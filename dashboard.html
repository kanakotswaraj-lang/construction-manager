<script type="module">
    // Firebase SDK-കൾ ഇമ്പോർട്ട് ചെയ്യുന്നു
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyiX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bb0d352218"
    };

    // Firebase ഇനിഷ്യലൈസ്
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ലോഗിൻ ചെക്കിംഗ്
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("user-info").innerHTML = "സ്വാഗതം, <strong>" + user.displayName + "</strong>";
            loadWorks();
        } else {
            window.location.href = "login.html";
        }
    });

    // ജോലികൾ ലോഡ് ചെയ്യാനുള്ള ഫംഗ്ഷൻ
    async function loadWorks() {
        const worksList = document.getElementById('worksList');
        const querySnapshot = await getDocs(collection(db, "works"));
        worksList.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const work = doc.data();
            const div = document.createElement("div");
            div.className = "work-box";
            div.innerHTML = `<strong>ജോലി:</strong> ${work.name} <br> <strong>തുക:</strong> ₹${work.amount}`;
            worksList.appendChild(div);
        });
    }

    // ലോഗ് ഔട്ട് (ഇത് വിൻഡോയിൽ ലഭ്യമാക്കാൻ)
    window.logout = function() {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };
</script>
