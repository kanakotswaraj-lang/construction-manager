<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesthri Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4">

    <!-- ഹെഡർ -->
    <div class="bg-black text-white p-4 rounded-3xl shadow-lg flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black">MESTHRI PRO</h1>
            <p id="userNameDisplay" class="text-sm opacity-80">സ്വാഗതം</p>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html';" class="bg-red-600 px-4 py-2 rounded-xl font-bold">ലോഗ് ഔട്ട്</button>
    </div>

    <!-- കണക്ക് ബോക്സുകൾ -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg">
            <p class="text-sm font-bold opacity-80">ആകെ വരവ്</p>
            <p id="dashIncome" class="text-2xl font-black">₹0</p>
        </div>
        <div class="bg-orange-600 text-white p-6 rounded-3xl shadow-lg">
            <p class="text-sm font-bold opacity-80">ആകെ ചിലവ്</p>
            <p id="dashExpense" class="text-2xl font-black">₹0</p>
        </div>
    </div>

    <!-- ബട്ടണുകൾ -->
    <div class="space-y-4">
        <a href="work-entry.html" class="block bg-emerald-700 text-white p-5 rounded-3xl text-center font-black text-lg shadow-md">വരവ് - ചെലവ് രേഖപ്പെടുത്തുക</a>
        <a href="staff.html" class="block bg-purple-700 text-white p-5 rounded-3xl text-center font-black text-lg shadow-md">ജീവനക്കാരുടെ ശമ്പളം</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // പേര് കാണിക്കാൻ
        const name = localStorage.getItem('userName');
        if(name) document.getElementById('userNameDisplay').innerText = `സ്വാഗതം, ${name}`;

        // കണക്കുകൾ അപ്‌ഡേറ്റ് ചെയ്യാൻ
        async function updateDashboard() {
            let totalIncome = 0, totalExpense = 0;
            const querySnapshot = await getDocs(collection(db, "transactions"));
            querySnapshot.forEach((doc) => {
                let data = doc.data();
                let amount = parseFloat(data.amount) || 0;
                if (data.type === "income" || data.type === "വരവ്") totalIncome += amount;
                else if (data.type === "expense" || data.type === "ചെലവ്") totalExpense += amount;
            });
            document.getElementById('dashIncome').innerText = '₹' + totalIncome.toLocaleString('en-IN');
            document.getElementById('dashExpense').innerText = '₹' + totalExpense.toLocaleString('en-IN');
        }
        updateDashboard();
    </script>
</body>
</html>
