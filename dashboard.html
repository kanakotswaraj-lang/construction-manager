<!DOCTYPE html>
<html lang="ml" translate="no">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>മേസ്തിരി ആപ്പ് - സൈറ്റ് മാനേജർ</title>
    <!-- Tailwind CSS ഫോർ സ്റ്റൈലിംഗ് -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- മനോഹരമായ മലയാളം ഫോണ്ട് -->
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        
        <!-- പ്രൊഫൈൽ ഹെഡർ ബോക്സ് -->
        <div class="bg-gradient-to-r from-slate-900 to-blue-950 text-white p-4 rounded-3xl shadow-xl mb-6 flex justify-between items-center border border-slate-800">
            <div class="flex items-center gap-3">
                <div id="userAvatar" class="w-10 h-10 bg-gradient-to-tr from-yellow-400 to-amber-500 text-slate-950 rounded-2xl flex items-center justify-center font-black text-lg shadow-inner">
                    ..
                </div>
                <div class="leading-tight">
                    <p class="text-[11px] text-slate-400 font-bold tracking-wider uppercase">മേസ്തിരി</p>
                    <p id="displayUser" class="text-base font-black text-yellow-400">ലോഡ് ചെയ്യുന്നു...</p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-4 py-2 rounded-2xl font-black transition shadow-sm">
                Logout
            </button>
        </div>

<!-- പ്രധാന ആപ്പ് ടൈറ്റിൽ - പുതിയ കള്ളി സ്റ്റൈലിൽ -->
<div class="text-center mb-6">
    <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-3">മേസ്തിരി ആപ്പ്</h1>
    
    <!-- സൈറ്റ് മാനേജർ എന്നത് വ്യക്തമായ ഒരു കള്ളിക്കുള്ളിലേക്ക് മാറ്റി -->
    <div class="w-full max-w-[200px] mx-auto bg-blue-50 border-2 border-blue-200 px-4 py-2 rounded-2xl shadow-sm">
        <p class="text-blue-600 font-black text-lg tracking-wide">
            സൈറ്റ് മാനേജർ
        </p>
    </div>
</div>
        
        <!-- പ്രധാന വരുമാന കാർഡുകൾ -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-5 rounded-3xl shadow-lg border border-blue-500 transform active:scale-95 transition">
                <p class="text-xs opacity-90 font-bold uppercase tracking-wide mb-2">ആകെ വരുമാനം</p>
                <p class="text-3xl font-black tracking-wide" id="totalIncome">₹0</p>
            </div>
            
            <!-- കയ്യിലുള്ള തുക മൈനസ് ആണെങ്കിൽ തിരിച്ചറിയാൻ പ്രത്യേക സ്റ്റൈലിംഗ് നൽകും -->
            <div id="cashCard" class="bg-gradient-to-br from-emerald-600 to-emerald-700 text-white p-5 rounded-3xl shadow-lg border border-emerald-500 transform active:scale-95 transition">
                <p class="text-xs opacity-90 font-bold uppercase tracking-wide mb-2">കയ്യിലുള്ളത്</p>
                <p class="text-3xl font-black tracking-wide" id="cashInHand">₹0</p>
            </div>
        </div>

        <!-- ആകെ ബാധ്യത കാർഡ് -->
        <div class="bg-gradient-to-br from-rose-50 to-red-100/50 border-2 border-rose-200 p-5 rounded-3xl mb-4 shadow-md">
            <p class="text-xs text-rose-600 font-black uppercase tracking-wide mb-2">ആകെ ബാധ്യത (തുല്യം നൽകാനുള്ളത്)</p>
            <p class="text-3xl font-black text-rose-700 tracking-wide" id="totalLiability">₹0</p>
        </div>

        <!-- വാടക വിവരങ്ങൾ -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white border-2 border-slate-200 p-5 rounded-3xl shadow-sm">
                <p class="text-xs text-slate-500 font-bold uppercase mb-2">ബാക്കി വാടക ചെലവ്</p>
                <p class="text-2xl font-black text-slate-800 tracking-wide" id="rentExpense">₹0</p>
            </div>
            <div class="bg-gradient-to-br from-amber-50 to-amber-100/30 border-2 border-amber-200 p-5 rounded-3xl shadow-sm">
                <p class="text-xs text-amber-700 font-bold uppercase mb-2">ആകെ നൽകിയത്</p>
                <p class="text-2xl font-black text-amber-900 tracking-wide" id="totalPaid">₹0</p>
            </div>
        </div>

        <!-- മറ്റ് പേജുകളിലേക്കുള്ള മെനു ലിങ്കുകൾ (ലിങ്കുകൾ തിരുത്തിയത് ഇവിടെയാണ്) -->
        <div class="space-y-4">
            <a href="staff.html" class="block w-full bg-white border-2 border-slate-200/80 p-5 rounded-3xl text-center font-black text-slate-800 shadow-md hover:bg-slate-50 hover:border-blue-300 active:scale-98 transition text-lg">
                ജീവനക്കാർ
            </a>
            <a href="rentals.html" class="block w-full bg-white border-2 border-slate-200/80 p-5 rounded-3xl text-center font-bold text-slate-800 shadow-md hover:bg-slate-50 hover:border-blue-300 active:scale-98 transition text-lg">
                വാടക ഉപകരണങ്ങൾ
            </a>
            <!-- 404 എറർ വരാതിരിക്കാൻ ശരിയായ ഫയൽ നെയിം ആയ transactions.html ഇവിടെ നൽകിയിട്ടുണ്ട് -->
            <a href="transactions.html" class="block w-full bg-gradient-to-r from-blue-50 to-cyan-50 border-2 border-blue-200 p-5 rounded-3xl text-center font-black text-blue-900 shadow-md hover:from-blue-100 hover:to-cyan-100 active:scale-98 transition text-lg">
                സൈറ്റ് കണക്ക്
            </a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
        measurementId: "G-J9Y5TW9D7T"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUserId = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            const userName = user.email.split('@')[0];
            document.getElementById("displayUser").innerText = userName;
            document.getElementById("userAvatar").innerText = userName.charAt(0).toUpperCase();
            
            calculateDashboard();
        } else {
            window.location.href = "login.html";
        }
    });

    function calculateDashboard() {
        const staffRef = ref(db, 'staff/' + currentUserId);
        onValue(staffRef, (snapshot) => {
            const data = snapshot.val() || {};
            let staffLiability = 0;

            Object.values(data).forEach(s => {
                let work = Number(s.workAmount || 0);
                let given = Number(s.givenAmount || 0);
                if (work > given) {
                    staffLiability += (work - given);
                }
            });

            const rentRef = ref(db, 'rentals/' + currentUserId);
            onValue(rentRef, (rentSnapshot) => {
                const rentData = rentSnapshot.val() || {};
                let rentalLiability = 0;

                Object.values(rentData).forEach(r => {
                    let totalRent = Number(r.totalRent || 0);
                    let rentPaid = Number(r.rentPaid || 0);
                    if (totalRent > rentPaid) {
                        rentalLiability += (totalRent - rentPaid);
                    }
                });

                const mainRef = ref(db, 'transactions/' + currentUserId);
                onValue(mainRef, (transSnapshot) => {
                    const transData = transSnapshot.val() || {};
                    let totalIncome = 0;
                    let generalPaid = 0;

                    Object.values(transData).forEach(t => {
                        let amount = Number(t.amount || 0);
                        if (t.type === 'income') {
                            totalIncome += amount;
                        } else if (t.type === 'expense') {
                            generalPaid += amount;
                        }
                    });

                    let totalStaffPaid = Object.values(data).reduce((sum, s) => sum + Number(s.givenAmount || 0), 0);
                    let totalRentalPaid = Object.values(rentData).reduce((sum, r) => sum + Number(r.rentPaid || 0), 0);

                    let finalTotalPaid = totalStaffPaid + totalRentalPaid + generalPaid;
                    let finalCashInHand = totalIncome - finalTotalPaid;
                    let finalLiability = staffLiability + rentalLiability;

                    // കയ്യിലുള്ളത് മൈനസ് സംഖ്യയാണെങ്കിൽ കാർഡ് ചുവപ്പ് നിറമാക്കാനുള്ള ലോജിക്
                    const cashCard = document.getElementById("cashCard");
                    if (finalCashInHand < 0) {
                        cashCard.classList.remove("from-emerald-600", "to-emerald-700", "border-emerald-500");
                        cashCard.classList.add("from-amber-600", "to-amber-700", "border-amber-500");
                    } else {
                        cashCard.classList.remove("from-amber-600", "to-amber-700", "border-amber-500");
                        cashCard.classList.add("from-emerald-600", "to-emerald-700", "border-emerald-500");
                    }

                    document.getElementById("totalIncome").innerText = "₹" + totalIncome;
                    document.getElementById("cashInHand").innerText = "₹" + finalCashInHand;
                    document.getElementById("totalLiability").innerText = "₹" + finalLiability;
                    document.getElementById("rentExpense").innerText = "₹" + rentalLiability;
                    document.getElementById("totalPaid").innerText = "₹" + finalTotalPaid;
                });
            });
        });
    }

    window.logout = function() {
        signOut(auth).then(() => {
            window.location.href = "login.html";
        });
    }
</script>
</body>
</html>
