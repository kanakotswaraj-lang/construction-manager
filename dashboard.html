<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesthri Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap');
    
    body { 
        font-family: 'Manjari', sans-serif; 
        background-color: #f3f4f6; /* കുറച്ചുകൂടി കടുപ്പമുള്ള പശ്ചാത്തലം */
        color: #111827; /* അക്ഷരങ്ങൾക്ക് നല്ല കറുപ്പ് നിറം */
        font-weight: 700; /* അക്ഷരങ്ങൾക്ക് കട്ടി കൂട്ടുന്നു */
    }

        /* പ്രധാന സേവനങ്ങളിലെ അക്ഷരങ്ങൾ വെയിലത്ത് വായിക്കാൻ വലുതാക്കുന്നു */
    .space-y-4 a span {
        font-size: 1.4rem !important; /* അക്ഷര വലിപ്പം വർദ്ധിപ്പിച്ചു */
        font-weight: 900 !important;   /* നല്ല കട്ടി നൽകി */
        display: block;
        color: white !important;       /* വായന വ്യക്തമാക്കാൻ വെള്ള നിറം */
    }

    .space-y-4 a span.text-xs {
        font-size: 1.1rem !important;  /* താഴെയുള്ള വരിയും വലുതാക്കി */
        opacity: 1 !important;         /* മങ്ങൽ പൂർണ്ണമായും മാറ്റി */
        font-weight: 700 !important;
        color: #e5e7eb !important;     /* അല്പം ചാരനിറം */
    }

    .text-3xl { 
        font-size: 2.25rem !important; /* വലിയ അക്ഷരങ്ങൾ */
        font-weight: 900 !important; 
    }

    /* കാർഡുകൾക്ക് കൂടുതൽ ബോൾഡ് ലുക്ക് നൽകുന്നു */
    .bg-gradient-to-br, .bg-white { 
        border: 2px solid #374151; /* ബോർഡർ കടുപ്പിക്കുന്നു */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
       /* പ്രധാന സേവനങ്ങൾ (Service Cards) അക്ഷരങ്ങൾ വലുതാക്കാൻ */
.space-y-4 a span {
    font-size: 1.25rem !important; /* അക്ഷര വലിപ്പം കൂട്ടുന്നു */
    font-weight: 900 !important;   /* നല്ല കട്ടി നൽകുന്നു */
}

.space-y-4 a span.text-xs {
    font-size: 0.9rem !important;  /* താഴെയുള്ള ചെറു അക്ഷരങ്ങളും വായനയ്ക്ക് പാകമാക്കുന്നു */
    opacity: 1 !important;         /* മങ്ങൽ ഒഴിവാക്കുന്നു */
    font-weight: 700 !important;
}
 
</style>

<body class="bg-gray-100 min-h-screen flex flex-col pb-24">

    <!-- HEADER -->
    <header class="bg-slate-900 text-white px-4 py-5 rounded-b-3xl shadow-lg grid grid-cols-3 items-center mx-3 mt-2">
        <div class="flex justify-start">
            <div class="w-14 h-14 rounded-full bg-amber-500 text-slate-900 font-black text-3xl flex items-center justify-center shadow-md">മ</div>
        </div>
        <div class="text-center">
            <h1 class="text-2xl font-black tracking-wide text-amber-400 leading-none">MESTHRI PRO</h1>
        </div>
        <div class="flex justify-end">
            <button onclick="handleLogout()" class="bg-red-600 text-white font-bold py-2 px-3 rounded-xl text-xs">ലോഗ് ഔട്ട്</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 px-4 py-6 max-w-md mx-auto w-full space-y-6">
        <!-- CASH FLOW CARDS -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gradient-to-br from-blue-700 to-blue-900 text-white p-5 rounded-2xl shadow-md">
                <p class="text-xs font-bold text-blue-200 uppercase">ഈ മാസത്തെ വരവ്</p>
                <p class="text-3xl font-black mt-2" id="dashIncome">₹0</p>
            </div>
            <div class="bg-gradient-to-br from-amber-600 to-amber-800 text-white p-5 rounded-2xl shadow-md">
                <p class="text-xs font-bold text-amber-200 uppercase">ഈ മാസത്തെ ചിലവ്</p>
                <p class="text-3xl font-black mt-2" id="dashExpense">₹0</p>
            </div>
        </div>

        <!-- TOTAL SPENT CARD -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <p class="text-sm font-bold text-gray-500">തൊഴിലാളികൾക്ക് നൽകാനുള്ളത്</p>
            <p class="text-3xl font-black text-red-600 mt-1" id="dashTotalSpent">₹0</p>
        </div>

        <!-- NAVIGATION -->
        <div class="space-y-4">
            <h2 class="text-xl font-black text-gray-800">പ്രധാന സേവനങ്ങൾ</h2>
            <a href="staff.html" class="flex items-center justify-between bg-gradient-to-r from-purple-700 to-indigo-800 text-white p-5 rounded-2xl shadow-md">
                <div><span class="block font-black">ജീവനക്കാരുടെ ശമ്പളം</span><span class="text-xs opacity-80">ഹാജരും ശമ്പള കണക്കുകളും</span></div>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="rentals.html" class="flex items-center justify-between bg-gradient-to-r from-teal-700 to-emerald-800 text-white p-5 rounded-2xl shadow-md">
                <div><span class="block font-black">വാടക ഉപകരണങ്ങൾ</span><span class="text-xs opacity-80">മിക്സിംഗ് മെഷീൻ, ഷട്ടറിങ്..</span></div>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="cash.html" class="flex items-center justify-between bg-gradient-to-r from-rose-700 to-pink-800 text-white p-5 rounded-2xl shadow-md">
                <div><span class="block font-black">വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</span><span class="text-xs opacity-80">മറ്റ് നിർമ്മാണ ചിലവുകൾ</span></div>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

        <!-- WHATSAPP BUTTON -->
        <button onclick="sendWhatsAppFeedback()" class="w-full flex items-center justify-center gap-3 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg">
            <i class="fa-brands fa-whatsapp text-2xl"></i> അഭിപ്രായങ്ങൾ വാട്സാപ്പിൽ അറിയിക്കൂ
        </button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Firestore-ൽ നിന്ന് ഡാറ്റ എടുത്ത് ടാലി ചെയ്യുന്ന കോഡ്

// dashboard.html-ലെ updateDashboard ഫങ്ക്ഷൻ ഇതാക്കി മാറ്റൂ:
async function updateDashboard() {
    let totalIncome = 0;
    let totalExpense = 0;
    const querySnapshot = await getDocs(collection(db, "transactions"));
    querySnapshot.forEach((doc) => {
        let data = doc.data();
        let amount = parseFloat(data.amount) || 0;
        
        // ഇംഗ്ലീഷോ മലയാളമോ ഏതായാലും കണക്ക് കൂട്ടും
        if (data.type === "income" || data.type === "വരവ്") totalIncome += amount;
        else if (data.type === "expense" || data.type === "ചെലവ്") totalExpense += amount;
    });
    document.getElementById('dashIncome').innerText = '₹' + totalIncome.toLocaleString('en-IN');
    document.getElementById('dashExpense').innerText = '₹' + totalExpense.toLocaleString('en-IN');
}

        window.sendWhatsAppFeedback = () => { 
            window.open("https://wa.me/916238020523?text=ഹലോ+മേസ്തിരി,+Mesthri+Pro+ആപ്പിനെക്കുറിച്ച്...", '_blank');
        };

        window.handleLogout = () => { window.location.href = "index.html"; };

        updateDashboard();
    </script>
</body>
</html>
