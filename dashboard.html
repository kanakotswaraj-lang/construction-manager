    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Firestore-ൽ നിന്ന് ഡാറ്റ എടുത്ത് ടാലി ചെയ്യുന്ന കോഡ്

// dashboard.html-ലെ updateDashboard ഫങ്ക്ഷൻ ഇതാക്കി മാറ്റൂ:
async function updateDashboard() {
    let totalIncome = 0;
    let totalExpense = 0;
    const querySnapshot = await getDocs(collection(db, "transactions"));
    querySnapshot.forEach((doc) => {
        let data = doc.data();
        let amount = parseFloat(data.amount) || 0;
        
        // ഇംഗ്ലീഷോ മലയാളമോ ഏതായാലും കണക്ക് കൂട്ടും
        if (data.type === "income" || data.type === "വരവ്") totalIncome += amount;
        else if (data.type === "expense" || data.type === "ചെലവ്") totalExpense += amount;
    });
    document.getElementById('dashIncome').innerText = '₹' + totalIncome.toLocaleString('en-IN');
    document.getElementById('dashExpense').innerText = '₹' + totalExpense.toLocaleString('en-IN');
}

        window.sendWhatsAppFeedback = () => {
