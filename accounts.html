<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കണക്ക് മാനേജർ</title>
    
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-2">
    <!-- ഇവിടെ w-full ആണ് കൊടുത്തിരിക്കുന്നത്, അത് സ്ക്രീനിൽ നിറഞ്ഞു നിൽക്കും -->
    <div class="w-full">
        <h1 class="text-2xl font-bold text-center mb-4">കണക്ക് മാനേജർ പ്രോ</h1>

        <!-- ഡാഷ്ബോർഡ് -->
        <div class="bg-white p-3 rounded-xl shadow mb-4">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-emerald-600 text-white p-3 rounded-lg text-center">
                    <p class="text-[10px]">വരവ്</p>
                    <h2 id="totalIncome" class="text-lg font-bold">₹0</h2>
                </div>
                <div class="bg-red-600 text-white p-3 rounded-lg text-center">
                    <p class="text-[10px]">ചെലവ്</p>
                    <h2 id="totalExpense" class="text-lg font-bold">₹0</h2>
                </div>
            </div>
            <div class="bg-slate-800 text-white p-3 rounded-lg text-center">
                <p class="text-[10px]">ബാക്കി</p>
                <h2 id="netBalance" class="text-xl font-bold">₹0</h2>
            </div>
        </div>

       <!-- ഫോം ഭാഗം -->
<div class="bg-white p-4 rounded-xl shadow-lg mb-4">
    <h2 class="text-lg font-bold mb-3">പുതിയ കണക്ക് ചേർക്കുക</h2>
    
    <!-- തീയതി -->
    <input type="date" id="transDate" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
    
    <!-- വിവരങ്ങൾ -->
    <input type="text" id="ownerName" placeholder="പേര്" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
    <input type="text" id="siteName" placeholder="സ്ഥലം/സൈറ്റ്" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
    
    <!-- ടൈപ്പ് -->
    <select id="type" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
        <option value="income">വരവ്</option>
        <option value="expense">ചെലവ്</option>
    </select>

    <!-- പെയ്മെന്റ് രീതി -->
    <select id="paymentMethod" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
        <option value="cash">ക്യാഷ് (Cash)</option>
        <option value="gpay">ഗൂഗിൾ പേ (GPay)</option>
        <option value="bank">ബാങ്ക് ട്രാൻസ്ഫർ</option>
        <option value="upi">മറ്റ് UPI ആപ്പുകൾ</option>
    </select>

    <input type="text" id="desc" placeholder="വിവരണം" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
    <input type="number" id="amount" placeholder="തുക" class="w-full p-2 bg-slate-50 border rounded-lg mb-2 text-sm">
    
    <button id="saveBtn" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold">സേവ് ചെയ്യുക</button>
</div>
<!-- സെർച്ച് ബോക്സ് -->
<div class="mt-6 mb-4">
    <input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." class="w-full p-3 border rounded-lg">
</div>

<!-- കണക്കുകൾ കാണാനുള്ള ലിസ്റ്റ് -->
<div id="transactionList" class="space-y-3">
    <!-- ഡാറ്റ ഇവിടെ ലിസ്റ്റ് ചെയ്യപ്പെടും -->
</div>
        

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. സേവ് ചെയ്യുന്ന ലോജിക്
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const data = {
            name: document.getElementById('ownerName').value,
            site: document.getElementById('siteName').value,
            type: document.getElementById('type').value,
            payment: document.getElementById('paymentMethod').value,
            desc: document.getElementById('desc').value,
            amount: parseFloat(document.getElementById('amount').value) || 0,
            createdAt: new Date()
        };

        if (!data.name || data.amount === 0) {
            alert("പേരും തുകയും നിർബന്ധമാണ്!");
            return;
        }

        try {
            await addDoc(collection(db, "transactions"), data);
            alert("സേവ് ചെയ്തു!");
            // ബോക്സുകൾ ക്ലിയർ ചെയ്യാൻ
            document.getElementById('ownerName').value = '';
            document.getElementById('amount').value = '';
        } catch (e) {
            alert("എറർ: സേവ് ആയില്ല!");
        }
    });

    // 2. ലിസ്റ്റ് ചെയ്യുകയും ഡിലീറ്റ് ചെയ്യുകയും ചെയ്യുന്ന ലോജിക്
    window.deleteItem = async (id) => {
        if(confirm("ഈ കണക്ക് ഡിലീറ്റ് ചെയ്യണോ?")) {
            await deleteDoc(doc(db, "transactions", id));
        }
    };

    onSnapshot(collection(db, "transactions"), (snapshot) => {
        let income = 0;
        let expense = 0;
        const listContainer = document.getElementById('transactionList');
        listContainer.innerHTML = '';

        snapshot.forEach((doc) => {
            const data = doc.data();
            // 'undefined' വരാതിരിക്കാൻ ഡിഫോൾട്ട് വാല്യൂ
            const name = data.name || "പേരില്ല";
            const site = data.site || "സ്ഥലമില്ല";
            const payment = data.payment || "Cash";
            
            if (data.type === 'income') income += data.amount;
            else expense += data.amount;

            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow flex justify-between items-center mb-2";
            div.innerHTML = `
                <div>
                    <p class="font-bold text-sm">${name}</p>
                    <p class="text-[10px] text-gray-500">${site} | ${payment}</p>
                </div>
                <div class="text-right">
                    <p class="font-bold ${data.type === 'income' ? 'text-emerald-600' : 'text-red-600'}">₹${data.amount}</p>
                    <button onclick="deleteItem('${doc.id}')" class="text-red-500 text-[10px]">ഡിലീറ്റ്</button>
                </div>
            `;
            listContainer.appendChild(div);
        });

        document.getElementById('totalIncome').innerText = `₹${income}`;
        document.getElementById('totalExpense').innerText = `₹${expense}`;
        document.getElementById('netBalance').innerText = `₹${income - expense}`;
    });

    // 3. സെർച്ച് ലോജിക്
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const items = document.querySelectorAll('#transactionList > div');
        items.forEach(item => {
            const name = item.querySelector('p').innerText.toLowerCase();
            item.style.display = name.includes(term) ? 'flex' : 'none';
        });
    });
</script>

 
    
</body>
</html>
