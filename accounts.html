<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let editId = null;

    // സേവ് / അപ്ഡേറ്റ് ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const data = {
            name: document.getElementById('ownerName').value,
            site: document.getElementById('siteName').value,
            type: document.getElementById('type').value,
            payment: document.getElementById('paymentMethod').value,
            desc: document.getElementById('desc').value,
            amount: parseFloat(document.getElementById('amount').value) || 0,
            date: document.getElementById('transDate').value || new Date().toISOString().split('T')[0]
        };

        if (!data.name || data.amount === 0) { alert("പേരും തുകയും നൽകുക!"); return; }

        if (editId) {
            await updateDoc(doc(db, "accounts", editId), data);
            alert("അപ്ഡേറ്റ് ചെയ്തു!");
            editId = null;
            document.getElementById('saveBtn').innerText = "സേവ് ചെയ്യുക";
        } else {
            await addDoc(collection(db, "accounts"), data);
            alert("സേവ് ചെയ്തു!");
        }
        // ഫോം ക്ലിയർ ചെയ്യുക
        document.getElementById('ownerName').value = '';
        document.getElementById('amount').value = '';
    });

    // ഡാറ്റ ലോഡ് ചെയ്യുക
    const q = query(collection(db, "accounts"), orderBy("date", "desc"));
    onSnapshot(q, (snapshot) => {
        let income = 0, expense = 0;
        const listContainer = document.getElementById('transactionList');
        listContainer.innerHTML = '';

        snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.type === 'income') income += data.amount;
            else expense += data.amount;

            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow flex justify-between items-center";
            div.innerHTML = `
                <div>
                    <p class="font-bold text-sm">${data.name}</p>
                    <p class="text-[10px] text-gray-500">${data.site} | ${data.payment}</p>
                </div>
                <div class="text-right">
                    <p class="font-bold ${data.type === 'income' ? 'text-emerald-600' : 'text-red-600'}">₹${data.amount}</p>
                    <button onclick="editItem('${doc.id}', '${data.name}', ${data.amount}, '${data.site}')" class="text-blue-500 text-[10px] mr-2">എഡിറ്റ്</button>
                    <button onclick="deleteItem('${doc.id}')" class="text-red-500 text-[10px]">❌</button>
                </div>
            `;
            listContainer.appendChild(div);
        });

        document.getElementById('totalIncome').innerText = `₹${income}`;
        document.getElementById('totalExpense').innerText = `₹${expense}`;
        document.getElementById('netBalance').innerText = `₹${income - expense}`;
    });

    // എഡിറ്റ് ഫങ്ക്ഷൻ
    window.editItem = (id, name, amount, site) => {
        editId = id;
        document.getElementById('ownerName').value = name;
        document.getElementById('amount').value = amount;
        document.getElementById('siteName').value = site;
        document.getElementById('saveBtn').innerText = "അപ്ഡേറ്റ് ചെയ്യുക";
        window.scrollTo(0, 300);
    };

    // ഡിലീറ്റ് ഫങ്ക്ഷൻ
    window.deleteItem = async (id) => {
        if(confirm("ഡിലീറ്റ് ചെയ്യണോ?")) await deleteDoc(doc(db, "accounts", id));
    };
</script>
