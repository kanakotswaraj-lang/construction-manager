<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കണക്ക് മാനേജർ പ്രോ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">

    <div class="w-full">
        <h1 class="text-2xl font-bold text-center mb-4">കണക്ക് മാനേജർ പ്രോ</h1>

        <!-- ഡാഷ്ബോർഡ് -->
        <div class="bg-white p-3 rounded-xl shadow mb-4">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-emerald-600 text-white p-3 rounded-lg text-center">
                    <p class="text-[10px]">വരവ്</p>
                    <h2 id="totalIncome" class="text-lg font-bold">₹0</h2>
                </div>
                <div class="bg-red-600 text-white p-3 rounded-lg text-center">
                    <p class="text-[10px]">ചെലവ്</p>
                    <h2 id="totalExpense" class="text-lg font-bold">₹0</h2>
                </div>
            </div>
            <div class="bg-slate-800 text-white p-3 rounded-lg text-center">
                <p class="text-[10px]">ബാക്കി</p>
                <h2 id="netBalance" class="text-xl font-bold">₹0</h2>
            </div>
        </div>

        <!-- ഫോം -->
        <!-- തീയതി ഫിൽട്ടർ ബോക്സ് -->
<div class="bg-white p-3 rounded-xl shadow mb-4">
    <label class="text-xs font-bold text-gray-500">തീയതി വെച്ച് തിരയുക:</label>
    <input type="date" id="filterDate" onchange="filterList()" class="w-full p-2 bg-slate-50 border rounded-lg mt-1">
</div>

        <div class="bg-white p-4 rounded-xl shadow-lg mb-4">
            <h2 class="text-lg font-bold mb-3">പുതിയ കണക്ക് ചേർക്കുക</h2>
            <input type="date" id="transDate" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
            <input type="text" id="ownerName" placeholder="പേര്" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
            <input type="text" id="siteName" placeholder="സ്ഥലം/സൈറ്റ്" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
            <select id="type" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
                <option value="income">വരവ്</option>
                <option value="expense">ചെലവ്</option>
            </select>
            <select id="paymentMethod" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
                <option value="cash">ക്യാഷ് (Cash)</option>
                <option value="gpay">GPay</option>
                   
            </select>
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-base">
            <button id="saveBtn" class="w-full bg-emerald-700 text-white p-4 rounded-xl font-bold text-base">സേവ് ചെയ്യുക</button>
        </div>

        <button onclick="window.print()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold mb-4">PDF റിപ്പോർട്ട് ഡൗൺലോഡ് ചെയ്യുക</button>
        <!-- തീയതി ഫിൽട്ടർ -->
<div class="bg-white p-3 rounded-xl shadow mb-4">
    <label class="text-xs font-bold text-gray-500">ഈ തീയതിയിലെ മാത്രം കാണുക:</label>
    <input type="date" id="filterDate" onchange="filterList()" class="w-full p-2 bg-slate-50 border rounded-lg mt-1 text-base">
</div>
        
        <div id="transactionList" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let editId = null;

        document.getElementById('saveBtn').onclick = async () => {
            const data = {
                name: document.getElementById('ownerName').value,
                site: document.getElementById('siteName').value,
                type: document.getElementById('type').value,
                payment: document.getElementById('paymentMethod').value,
                amount: parseFloat(document.getElementById('amount').value) || 0,
                date: document.getElementById('transDate').value
            };

            if (editId) {
                await updateDoc(doc(db, "accounts", editId), data);
                editId = null;
                document.getElementById('saveBtn').innerText = "സേവ് ചെയ്യുക";
            } else {
                await addDoc(collection(db, "accounts"), data);
            }
            document.getElementById('ownerName').value = '';
            document.getElementById('amount').value = '';
        };

        onSnapshot(query(collection(db, "accounts"), orderBy("date", "desc")), (snapshot) => {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let inc = 0, exp = 0;
            snapshot.forEach(doc => {
                const d = doc.data();
                if(d.type === 'income') inc += d.amount; else exp += d.amount;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-base">${d.name}</p>
                            <p class="text-[10px] text-gray-500">${d.date || ''} | ${d.site}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-base text-gray-800">₹${d.amount}</p>
                            <div class="flex gap-2 mt-1">
                                <button onclick="window.edit('${doc.id}', '${d.name}', ${d.amount}, '${d.date}')" class="text-blue-600 text-xs font-bold">എഡിറ്റ്</button>
                                <button onclick="window.del('${doc.id}')" class="text-red-600 text-xs font-bold">ഡിലീറ്റ്</button>
                                <button onclick="window.shareWhatsApp('${d.name}', ${d.amount})" class="text-green-600 text-xs font-bold">WhatsApp</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('totalIncome').innerText = "₹" + inc;
            document.getElementById('totalExpense').innerText = "₹" + exp;
            document.getElementById('netBalance').innerText = "₹" + (inc - exp);
        });

        window.edit = (id, name, amt, date) => {
            editId = id;
            document.getElementById('ownerName').value = name;
            document.getElementById('amount').value = amt;
            document.getElementById('transDate').value = date;
            document.getElementById('saveBtn').innerText = "അപ്ഡേറ്റ് ചെയ്യുക";
            window.scrollTo(0, 0);
        };

        window.del = async (id) => { if(confirm("ഡിലീറ്റ് ചെയ്യണോ?")) await deleteDoc(doc(db, "accounts", id)); };
        window.filterList = () => {
    const selectedDate = document.getElementById('filterDate').value;
    const items = document.querySelectorAll('#transactionList > div');
    
    items.forEach(item => {
        // ഡേറ്റിലെ തീയതി എടുക്കുന്നു
        const itemDate = item.querySelector('.text-[10px]').innerText.split(' | ')[0];
        
        if (!selectedDate || itemDate === selectedDate) {
            item.style.display = 'flex'; // കാണിക്കുക
        } else {
            item.style.display = 'none'; // മറയ്ക്കുക
        }
    });
};
        
        window.shareWhatsApp = (name, amount) => {
            const message = `കണക്ക് വിശദാംശം:\nപേര്: ${name}\nതുക: ₹${amount}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        };
    </script>
</body>
</html>
