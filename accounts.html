<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കണക്ക് മാനേജർ പ്രോ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">കണക്ക് മാനേജർ പ്രോ</h1>

        <!-- ഡാഷ്ബോർഡ് -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-emerald-600 text-white p-4 rounded-2xl shadow-md text-center">
                <p class="text-[10px] opacity-80 uppercase tracking-widest">വരവ്</p>
                <h2 id="totalIncome" class="text-xl font-bold">₹0</h2>
            </div>
            <div class="bg-red-600 text-white p-4 rounded-2xl shadow-md text-center">
                <p class="text-[10px] opacity-80 uppercase tracking-widest">ചെലവ്</p>
                <h2 id="totalExpense" class="text-xl font-bold">₹0</h2>
            </div>
            <div class="col-span-2 bg-slate-800 text-white p-4 rounded-2xl shadow-md text-center">
                <p class="text-[10px] opacity-80 uppercase tracking-widest">ബാക്കി</p>
                <h2 id="netBalance" class="text-2xl font-bold">₹0</h2>
            </div>
        </div>

        <!-- തീയതി ഫിൽട്ടർ -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">തീയതി വെച്ച് തിരയുക</label>
            <input type="date" id="filterDate" onchange="filterList()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-base focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- പുതിയ കണക്ക് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-lg mb-6 border border-slate-100">
            <h2 class="text-lg font-bold mb-4 text-slate-700">പുതിയ കണക്ക് ചേർക്കുക</h2>
            <input type="date" id="transDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-base">
            <input type="text" id="ownerName" placeholder="പേര്" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-base">
            <input type="text" id="siteName" placeholder="സ്ഥലം/സൈറ്റ്" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-base">
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="type" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-base">
                    <option value="income">വരവ്</option>
                    <option value="expense">ചെലവ്</option>
                </select>
                <select id="type" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-base">
    <option value="income">വരവ്</option>
    <option value="wage">ജീവനക്കാരുടെ കൂലി</option>
    <option value="material">മെറ്റീരിയൽസ്</option>
    <option value="rent">വാടക</option>
    <option value="other">മറ്റ് ചെലവുകൾ</option>
                </select>
                
            </div>
            
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 text-base">
            <button id="saveBtn" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold text-base hover:bg-emerald-700 transition">സേവ് ചെയ്യുക</button>
        </div>

        <!-- PDF ഡൗൺലോഡ് -->
        <button onclick="window.print()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold mb-6 hover:bg-blue-700 transition">PDF റിപ്പോർട്ട് ഡൗൺലോഡ് ചെയ്യുക</button>
        
        <!-- ലിസ്റ്റ് ഭാഗം -->
        <div id="transactionList" class="space-y-3 pb-10"></div>
    </div>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let editId = null;

        document.getElementById('saveBtn').onclick = async () => {
            const data = {
                name: document.getElementById('ownerName').value,
                site: document.getElementById('siteName').value,
                type: document.getElementById('type').value,
                payment: document.getElementById('paymentMethod').value,
                amount: parseFloat(document.getElementById('amount').value) || 0,
                date: document.getElementById('transDate').value
            };

            if (editId) {
                await updateDoc(doc(db, "accounts", editId), data);
                editId = null;
                document.getElementById('saveBtn').innerText = "സേവ് ചെയ്യുക";
            } else {
                await addDoc(collection(db, "accounts"), data);
            }
            document.getElementById('ownerName').value = '';
            document.getElementById('amount').value = '';
        };

        onSnapshot(query(collection(db, "accounts"), orderBy("date", "desc")), (snapshot) => {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let inc = 0, exp = 0;
            snapshot.forEach(doc => {
                const d = doc.data();
                // snapshot.forEach ലൂപ്പിനുള്ളിൽ ഇത് ചേർക്കുക
let categoryColor = "";
if(d.type === 'income') categoryColor = "text-emerald-600";
else if(d.type === 'wage') categoryColor = "text-blue-600";
else if(d.type === 'material') categoryColor = "text-orange-600";
else if(d.type === 'rent') categoryColor = "text-purple-600";
else categoryColor = "text-red-600";

// ലിസ്റ്റ് HTML-ൽ തുകയുടെ വരിയിൽ താഴെ പറയുന്ന പോലെ മാറ്റുക:
// പഴയ ₹${d.amount} മാറ്റി പകരം ഇങ്ങനെ എഴുതുക:
<p class="font-bold text-base ${categoryColor}">₹${d.amount}</p>

                            <div class="flex gap-2 mt-1">
                                <button onclick="window.edit('${doc.id}', '${d.name}', ${d.amount}, '${d.date}')" class="text-blue-600 text-xs font-bold">എഡിറ്റ്</button>
                                <button onclick="window.del('${doc.id}')" class="text-red-600 text-xs font-bold">ഡിലീറ്റ്</button>
                                <button onclick="window.shareWhatsApp('${d.name}', ${d.amount})" class="text-green-600 text-xs font-bold">WhatsApp</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('totalIncome').innerText = "₹" + inc;
            document.getElementById('totalExpense').innerText = "₹" + exp;
            document.getElementById('netBalance').innerText = "₹" + (inc - exp);
        });

        window.edit = (id, name, amt, date) => {
            editId = id;
            document.getElementById('ownerName').value = name;
            document.getElementById('amount').value = amt;
            document.getElementById('transDate').value = date;
            document.getElementById('saveBtn').innerText = "അപ്ഡേറ്റ് ചെയ്യുക";
            window.scrollTo(0, 0);
        };

        window.del = async (id) => { if(confirm("ഡിലീറ്റ് ചെയ്യണോ?")) await deleteDoc(doc(db, "accounts", id)); };
        window.filterList = () => {
    const selectedDate = document.getElementById('filterDate').value;
    const items = document.querySelectorAll('#transactionList > div');
    
    items.forEach(item => {
        // ഡേറ്റിലെ തീയതി എടുക്കുന്നു
        const itemDate = item.querySelector('.text-[10px]').innerText.split(' | ')[0];
        
        if (!selectedDate || itemDate === selectedDate) {
            item.style.display = 'flex'; // കാണിക്കുക
        } else {
            item.style.display = 'none'; // മറയ്ക്കുക
        }
    });
};
        
        window.shareWhatsApp = (name, amount) => {
            const message = `കണക്ക് വിശദാംശം:\nപേര്: ${name}\nതുക: ₹${amount}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        };
    </script>
</body>
</html>
