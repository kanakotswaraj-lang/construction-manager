<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // സേവ് ചെയ്യുമ്പോൾ
    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('ownerName').value;
        const amount = parseFloat(document.getElementById('amount').value);
        if(!name || !amount) return alert("പേരും തുകയും വേണം!");
        
        await addDoc(collection(db, "accounts"), {
            name: name,
            site: document.getElementById('siteName').value,
            type: document.getElementById('type').value,
            payment: document.getElementById('paymentMethod').value,
            amount: amount,
            date: new Date().toISOString()
        });
        alert("സേവ് ചെയ്തു!");
    };

    // ഡാറ്റ കാണിക്കുമ്പോൾ
    onSnapshot(query(collection(db, "accounts"), orderBy("date", "desc")), (snapshot) => {
        const list = document.getElementById('transactionList');
        list.innerHTML = '';
        let income = 0, expense = 0;

        snapshot.forEach((doc) => {
            const d = doc.data();
            if(d.type === 'income') income += d.amount; else expense += d.amount;
            
            list.innerHTML += `
                <div class="bg-white p-3 rounded-lg shadow mb-2 flex justify-between">
                    <div><b>${d.name}</b><br><small>${d.site}</small></div>
                    <div class="text-right">₹${d.amount}<br>
                        <button onclick="deleteDoc(doc(db, 'accounts', '${doc.id}'))" class="text-red-500 text-xs">ഡിലീറ്റ്</button>
                    </div>
                </div>`;
        });
        document.getElementById('totalIncome').innerText = "₹" + income;
        document.getElementById('totalExpense').innerText = "₹" + expense;
        document.getElementById('netBalance').innerText = "₹" + (income - expense);
    });
</script>
