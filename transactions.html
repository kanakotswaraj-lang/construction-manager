<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }</style>
    <title>വരവ്-ചെലവ് - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-900">വരവ്-ചെലവ്</h1>
            <a href="dashboard.html" class="text-xs font-bold bg-slate-100 px-4 py-2 rounded-xl">← മെയിൻ</a>
        </div>

        <!-- മാസാടിസ്ഥാനത്തിലുള്ള ഫിൽറ്റർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <label class="text-[10px] font-black text-slate-400 uppercase">മാസം തിരഞ്ഞെടുക്കുക</label>
            <input type="month" id="monthFilter" class="w-full p-4 mt-1 bg-slate-50 border rounded-xl font-black text-slate-800 mb-4">
            
            <div class="grid grid-cols-2 gap-3">
                <button id="btnIncome" class="bg-emerald-600 text-white py-3 rounded-xl font-black">വരവ് ചേർക്കുക</button>
                <button id="btnExpense" class="bg-rose-600 text-white py-3 rounded-xl font-black">ചെലവ് ചേർക്കുക</button>
            </div>
            
            <button id="btnDownloadPDF" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-black">📄 PDF റിപ്പോർട്ട് എടുക്കുക</button>
        </div>

        <!-- ലിസ്റ്റ് -->
        <div id="historyList" class="space-y-3">
            <p class="text-center text-slate-400 font-bold py-10">കണക്കുകൾ ലോഡ് ചെയ്യുന്നു...</p>
        </div>
    </div>
</body>
</html>
