<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .main-container { max-width: 400px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="text-xl font-bold mb-5 text-center text-slate-700">വരവ്-ചെലവ് കണക്ക്</h2>
        
        <div class="space-y-4">
            <input type="text" id="description" placeholder="വിവരണം" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
            
            <select id="type" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
                <option value="വരവ്">വരവ്</option>
                <option value="ചെലവ്">ചെലവ്</option>
            </select>

            <!-- പുതിയ കാറ്റഗറി സെലക്ട് ബോക്സ് -->
            <select id="category" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
                <option value="മറ്റ് ചെലവുകൾ">മറ്റ് ചെലവുകൾ</option>
                <option value="സാധനങ്ങൾ">സാധനങ്ങൾ</option>
                <option value="കൂലി">കൂലി</option>
                <option value="വാടക">വാടക</option>
            </select>
            
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
            
            <button onclick="saveTransaction()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">സേവ് ചെയ്യുക</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // നിങ്ങളുടെ Firebase കോൺഫിഗറേഷൻ ഇവിടെ നൽകുക
    const firebaseConfig = { /* ...നിങ്ങളുടെ കോൺഫിഗറേഷൻ... */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveTransaction = async () => {
        const desc = document.getElementById("description").value;
        const type = document.getElementById("type").value;
        const amount = document.getElementById("amount").value;
        const category = document.getElementById("category").value;

        if (desc && amount) {
            await addDoc(collection(db, "transactions"), {
                description: desc,
                type: type,
                amount: Number(amount),
                category: category,
                timestamp: new Date()
            });
            alert("കണക്ക് സേവ് ചെയ്തു!");
            window.location.href = "dashboard.html";
        } else {
            alert("എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക!");
        }
    };
</script>
</body>
</html>
