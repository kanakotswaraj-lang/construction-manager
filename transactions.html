<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }
        input, button { font-size: 16px !important; }
    </style>
    <title>വരവ്-ചെലവ് - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-sky-600">വരവ്-ചെലവ്</h1>
            <a href="dashboard.html" class="font-bold bg-slate-100 px-4 py-2 rounded-xl text-sm">← മെയിൻ</a>
        </div>

        <!-- ഫോം ബോക്സ് -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl font-black mb-6 text-slate-800">പുതിയ കണക്ക് ചേർക്കുക</h2>
            
            <!-- ലേബലുകളുടെ വലിപ്പം കൂട്ടാൻ text-sm നൽകി -->
<label class="text-sm font-black text-slate-500 uppercase px-2">തീയതി</label>
<input type="date" id="date" class="w-full p-5 mb-4 border rounded-2xl font-bold text-lg bg-slate-50">

<label class="text-sm font-black text-slate-500 uppercase px-2">ഇനം</label>
<input type="text" id="item" placeholder="ഉദാ: സിമന്റ്" class="w-full p-5 mb-4 border rounded-2xl font-bold text-lg bg-slate-50">

<label class="text-sm font-black text-slate-500 uppercase px-2">തുക</label>
<input type="number" id="amount" placeholder="₹ തുക" class="w-full p-5 mb-4 border rounded-2xl font-bold text-lg bg-slate-50">

<label class="text-sm font-black text-slate-500 uppercase px-2">ആളുടെ പേര്</label>
<input type="text" id="name" placeholder="പേര് ടൈപ്പ് ചെയ്യുക" class="w-full p-5 mb-4 border rounded-2xl font-bold text-lg bg-slate-50">

<label class="text-sm font-black text-slate-500 uppercase px-2">ഫോൺ നമ്പർ</label>
<input type="tel" id="phone" placeholder="നമ്പർ" class="w-full p-5 mb-6 border rounded-2xl font-bold text-lg bg-slate-50">
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button class="bg-emerald-600 p-4 rounded-2xl text-white font-black hover:bg-emerald-700">സേവ് ചെയ്യുക</button>
                <button onclick="shareWhatsApp()" class="bg-sky-600 p-4 rounded-2xl text-white font-black hover:bg-sky-700">WhatsApp</button>
            </div>
            <button class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black">📄 PDF റിപ്പോർട്ട്</button>
        </div>
    </div>

    <script>
        function shareWhatsApp() {
            const name = document.getElementById('name').value;
            const amount = document.getElementById('amount').value;
            const item = document.getElementById('item').value;
            const message = `മേസ്തിരി പ്രോ കണക്ക്: ${name}, ${item} - തുക ₹${amount}.`;
            window.open("https://wa.me/?text=" + encodeURIComponent(message), '_blank');
        }
    </script>
</body>
</html>
