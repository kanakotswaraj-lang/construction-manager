<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; font-size: 18px !important; }
        h1 { font-size: 28px !important; }
        input, button { font-size: 16px !important; }
    </style>
    <title>വരവ്-ചെലവ് - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-sky-600">വരവ്-ചെലവ്</h1>
            <a href="dashboard.html" class="font-bold bg-slate-100 px-4 py-2 rounded-xl">← മെയിൻ</a>
        </div>

        <!-- ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl font-black mb-4 text-slate-800">പുതിയ കണക്ക് ചേർക്കുക</h2>
            <input type="date" id="date" class="w-full p-4 mb-3 border rounded-2xl font-bold">
            <input type="text" id="item" placeholder="ഇനം (ഉദാ: സിമന്റ്)" class="w-full p-4 mb-3 border rounded-2xl font-bold">
            <input type="number" id="amount" placeholder="തുക (₹)" class="w-full p-4 mb-3 border rounded-2xl font-bold">
            <input type="text" id="name" placeholder="ആളുടെ പേര്" class="w-full p-4 mb-3 border rounded-2xl font-bold">
            <input type="tel" id="phone" placeholder="ഫോൺ നമ്പർ" class="w-full p-4 mb-4 border rounded-2xl font-bold">
            
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-emerald-600 p-4 rounded-2xl text-white font-black">സേവ് ചെയ്യുക</button>
                <button onclick="shareWhatsApp()" class="bg-sky-600 p-4 rounded-2xl text-white font-black">WhatsApp PDF</button>
            </div>
            <button class="w-full mt-3 bg-slate-900 text-white p-4 rounded-2xl font-black">📄 PDF റിപ്പോർട്ട്</button>
        </div>

        <!-- ലിസ്റ്റ് -->
        <div id="historyList" class="space-y-3">
            <p class="text-center text-slate-400 font-bold py-10">കണക്കുകൾ ഇവിടെ കാണാം...</p>
        </div>
    </div>

    <script>
        function shareWhatsApp() {
            const name = document.getElementById('name').value;
            const amount = document.getElementById('amount').value;
            const message = `മേസ്തിരി പ്രോ കണക്ക്: ${name} നൽകേണ്ട/വാങ്ങിയ തുക ₹${amount}.`;
            window.open("https://wa.me/?text=" + encodeURIComponent(message), '_blank');
        }
    </script>
</body>
</html>
