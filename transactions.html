<!-- Transaction input form with Dropdown -->
<div class="space-y-4">
    <input type="text" id="description" placeholder="വിവരണം" class="w-full p-4 bg-slate-100 rounded-xl outline-none">
    <select id="type" class="w-full p-4 bg-slate-100 rounded-xl outline-none">
        <option value="വരവ്">വരവ്</option>
        <option value="ചെലവ്">ചെലവ്</option>
    </select>
    <input type="number" id="amount" placeholder="തുക" class="w-full p-4 bg-slate-100 rounded-xl outline-none">
    <button onclick="saveTransaction()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-semibold">സേവ് ചെയ്യുക</button>
</div>

<!-- Back button -->
<div class="mt-4">
    <button onclick="history.back()" class="w-full text-slate-500 underline">തിരികെ പോകുക</button>
</div>
