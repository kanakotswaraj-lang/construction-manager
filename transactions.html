<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>വരവ്-ചെലവ് - മേസ്തിരി പ്രോ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    
<!-- പ്രധാന കണ്ടെയ്നർ കോഡ് ഇങ്ങനെ മാറ്റുക -->
<div class="w-full max-w-lg mx-auto p-4"> 
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <h1 class="text-3xl font-black mb-8 text-slate-800">പുതിയ കണക്ക് ചേർക്കുക</h1>
        
        <!-- ഇൻപുട്ട് ഫീൽഡുകളിൽ p-5 എന്ന് നൽകി വലിപ്പം കൂട്ടി -->
        <input type="date" id="date" class="w-full p-5 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="text" id="item" placeholder="ഇനം" class="w-full p-5 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="number" id="amount" placeholder="തുക" class="w-full p-5 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="text" id="name" placeholder="പേര്" class="w-full p-5 mb-4 border-2 rounded-2xl font-bold text-lg">
        
        <select id="type" class="w-full p-5 mb-4 border-2 rounded-2xl font-bold text-lg">
            <option value="Income">മുതലാളിയിൽ നിന്ന് വാങ്ങിയത് (Income)</option>
            <option value="Expense">ചെലവ് (Expense)</option>
        </select>
        <select id="mode" class="w-full p-5 mb-6 border-2 rounded-2xl font-bold text-lg">
            <option value="Cash">കാഷ് (Cash)</option>
            <option value="UPI">ഗൂഗിൾ പേ/UPI</option>
            <option value="Bank">ബാങ്ക് ട്രാൻസ്ഫർ</option>
        </select>
        
        <!-- ബട്ടൺ വലിപ്പം കൂട്ടി -->
        <button id="saveBtn" class="w-full bg-emerald-600 p-6 rounded-2xl text-white font-black text-xl shadow-lg">സേവ് ചെയ്യുക</button>
    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const data = {
                date: document.getElementById('date').value,
                item: document.getElementById('item').value,
                amount: parseFloat(document.getElementById('amount').value),
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                mode: document.getElementById('mode').value
            };
            await addDoc(collection(db, "transactions"), data);
            alert("സേവ് ആയി!");
        });
    </script>
</body>
</html>
