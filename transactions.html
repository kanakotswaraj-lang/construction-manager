<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">വരവ്-ചെലവ് കണക്കുകൾ</h1>
        
        <div class="space-y-4">
            <input type="text" id="description" placeholder="വിവരണം (ഉദാ: സിമന്റ്)" class="w-full p-4 bg-slate-100 rounded-xl outline-none border border-slate-200">
            <input type="number" id="amount" placeholder="തുക (രൂപ)" class="w-full p-4 bg-slate-100 rounded-xl outline-none border border-slate-200">
            <button onclick="saveTransaction()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-semibold hover:bg-emerald-600 transition-all">കണക്ക് ചേർക്കുക</button>
        </div>

        <div class="mt-8">
            <a href="index.html" class="block w-full text-center text-slate-500 hover:text-slate-800 underline">തിരികെ ഡാഷ്ബോർഡിലേക്ക്</a>
        </div>
    </div>

    <script>
        function saveTransaction() {
            const desc = document.getElementById('description').value;
            const amt = document.getElementById('amount').value;
            if(desc && amt) {
                alert("വിവരം ലഭിച്ചു: " + desc + " - ₹" + amt);
            } else {
                alert("ദയവായി വിവരങ്ങളും തുകയും നൽകുക.");
            }
        }
    </script>
</body>
</html>
