<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .main-container {
            max-width: 400px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="text-xl font-bold mb-5 text-center text-slate-700">വരവ്-ചെലവ് കണക്ക്</h2>
        
        <div class="space-y-4">
            <input type="text" id="description" placeholder="വിവരണം" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
            
            <select id="type" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
                <option value="വരവ്">വരവ്</option>
                <option value="ചെലവ്">ചെലവ്</option>
            </select>
            
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-2 focus:border-emerald-500">
            
            <button onclick="saveTransaction()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">സേവ് ചെയ്യുക</button>
        </div>

        <div class="mt-6 text-center">
            <button onclick="history.back()" class="text-slate-500 underline text-sm">തിരികെ പോകുക</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveTransaction = async function() {
            const description = document.getElementById("description").value;
            const type = document.getElementById("type").value;
            const amount = document.getElementById("amount").value;

            if (description === "" || amount === "") {
                alert("ദയവായി എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക!");
                return;
            }

            try {
                await addDoc(collection(db, "transactions"), {
                    description: description,
                    type: type,
                    amount: Number(amount),
                    timestamp: new Date()
                });
                alert("വിവരങ്ങൾ സേവ് ചെയ്തു!");
                document.getElementById("description").value = "";
                document.getElementById("amount").value = "";
            } catch (e) {
                console.error("പിശക് സംഭവിച്ചു: ", e);
                alert("സേവ് ചെയ്യാൻ സാധിച്ചില്ല.");
            }
        };
    </script>
</body>
</html>
