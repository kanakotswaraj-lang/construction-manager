<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>വരവ്-ചെലവ്</title>
</head>
<body class="bg-slate-100 p-2">
    <!-- ഇവിടെ w-full എന്ന് കൊടുത്തിട്ടുണ്ട്, ഇത് സ്ക്രീൻ മുഴുവൻ എടുക്കും -->
    <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-3xl shadow-xl mt-4">
        <h1 class="text-2xl font-black mb-6 text-slate-800">പുതിയ കണക്ക് ചേർക്കുക</h1>
        
        <input type="date" id="date" class="w-full p-4 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="text" id="item" placeholder="ഇനം" class="w-full p-4 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="number" id="amount" placeholder="തുക" class="w-full p-4 mb-4 border-2 rounded-2xl font-bold text-lg">
        <input type="text" id="name" placeholder="പേര്" class="w-full p-4 mb-4 border-2 rounded-2xl font-bold text-lg">
        
        <select id="type" class="w-full p-4 mb-4 border-2 rounded-2xl font-bold text-lg">
            <option value="Income">മുതലാളിയിൽ നിന്ന് വാങ്ങിയത് (Income)</option>
            <option value="Expense">ചെലവ് (Expense)</option>
        </select>
        <select id="mode" class="w-full p-4 mb-6 border-2 rounded-2xl font-bold text-lg">
            <option value="Cash">കാഷ് (Cash)</option>
            <option value="UPI">ഗൂഗിൾ പേ/UPI</option>
            <option value="Bank">ബാങ്ക് ട്രാൻസ്ഫർ</option>
        </select>
        
        <button id="saveBtn" class="w-full bg-emerald-600 p-5 rounded-2xl text-white font-black text-xl shadow-lg">സേവ് ചെയ്യുക</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const data = {
                date: document.getElementById('date').value,
                item: document.getElementById('item').value,
                amount: parseFloat(document.getElementById('amount').value),
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                mode: document.getElementById('mode').value
            };
            try {
                await addDoc(collection(db, "transactions"), data);
                alert("സേവ് ആയി!");
            } catch (e) {
                alert("എന്തോ പ്രശ്നം!");
            }
        });
    </script>
</body>
</html>
