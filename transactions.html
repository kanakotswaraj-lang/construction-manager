<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <!-- കണക്ക് രേഖപ്പെടുത്തുന്ന പ്രധാന ബോക്സ് -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl font-bold mb-5 text-center text-slate-700">വരവ്-ചെലവ് കണക്ക്</h2>
            
            <div class="space-y-4">
                <input type="text" id="description" placeholder="സെറ്റിന്റെ പേര്" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                <input type="text" id="details" placeholder="വിശദാംശങ്ങൾ" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ (ഉദാ: 9876543210)" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                <input type="number" id="amount" placeholder="തുക" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                
                <div class="flex gap-4">
                    <button onclick="saveTransaction('വരവ്')" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition text-center">വരവ്</button>
                    <button onclick="saveTransaction('ചെലവ്')" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition text-center">ചെലവ്</button>
                </div>
            </div>
        </div>

        <!-- തത്സമയ ഹിസ്റ്ററി സെക്ഷൻ (നിങ്ങളുടെ പഴയ സൈറ്റ് ഡിസൈനിൽ തന്നെ!) -->
        <h3 class="text-lg font-bold mb-3 text-slate-700 px-1">ഇടപാടുകളുടെ ഹിസ്റ്ററി</h3>
        <div id="historyList" class="space-y-3">
            <p class="text-xs text-slate-400 text-center py-4 bg-white rounded-3xl border border-slate-100">കണക്കുകൾ ലോഡ് ചെയ്യുന്നു...</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // നിങ്ങളുടെ കൃത്യമായ ഫയർബേസ് കോൺഫിഗറേഷൻ
    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const transRef = ref(db, 'transactions'); // Realtime Database ഉപയോഗിക്കുന്നു

    window.saveTransaction = (type) => {
        const desc = document.getElementById("description").value;
        const details = document.getElementById("details").value;
        const phone = document.getElementById("phone").value;
        const amount = document.getElementById("amount").value;

        if (desc && amount) {
            const transaction = {
                description: desc,
                details: details,
                phone: phone,
                amount: Number(amount),
                type: type, // 'വരവ്' അല്ലെങ്കിൽ 'ചെലവ്'
                date: new Date().toLocaleDateString('en-US') // 7/15/2026 രൂപത്തിൽ
            };

            push(transRef, transaction).then(() => {
                document.getElementById("description").value = "";
                document.getElementById("details").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("amount").value = "";
                alert("കണക്ക് സേവ് ചെയ്തു!");
            });
        } else {
            alert("പേരും തുകയും നിർബന്ധമായും നൽകുക!");
        }
    };

    window.deleteTransaction = (key) => {
        if (confirm("ഈ ഇടപാട് നീക്കം ചെയ്യണോ?")) {
            remove(ref(db, 'transactions/' + key));
        }
    };

    // ഹിസ്റ്ററി തത്സമയം കാണിക്കുന്ന ഫങ്ഷൻ
    onValue(transRef, (snapshot) => {
        const historyList = document.getElementById("historyList");
        historyList.innerHTML = "";
        const data = snapshot.val() || {};

        if (Object.keys(data).length === 0) {
            historyList.innerHTML = `<p class="text-xs text-slate-400 text-center py-4 bg-white rounded-3xl border border-slate-100">ഇടപാടുകൾ ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
            return;
        }

        // തീയതി അനുസരിച്ച് തിരിച്ചു വെക്കുന്നു (പുതിയത് ആദ്യം)
        const sortedEntries = Object.entries(data).reverse();

        sortedEntries.forEach(([key, t]) => {
            const isIncome = t.type === "വരവ്";
            const amtColor = isIncome ? "text-green-600" : "text-red-600";
            const amtSign = isIncome ? "+" : "-";

            historyList.innerHTML += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-blue-600 text-base">${t.description}</h4>
                        <p class="text-xs text-slate-700 font-medium mt-1">${t.details || 'വിശദാംശങ്ങൾ നൽകിയിട്ടില്ല'}</p>
                        <p class="text-[10px] text-slate-400 mt-1">${t.date}</p>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-lg ${amtColor} mb-2">${amtSign} ₹${t.amount}</div>
                        <div class="flex gap-2 justify-end">
                            <span onclick="deleteTransaction('${key}')" class="text-xs text-red-500 cursor-pointer hover:underline font-bold mr-2">ഡിലീറ്റ്</span>
                            <span onclick='window.open("https://wa.me/91${t.phone || ''}")' class="text-xs text-blue-500 cursor-pointer hover:underline font-bold">WhatsApp</span>
                        </div>
                    </div>
                </div>
            `;
        });
    });
</script>
</body>
</html>
