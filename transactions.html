                <!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>മേസ്തിരി പ്രോ - വരവ്-ചെലവ് രേഖപ്പെടുത്തുക</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF ഡൗൺലോഡ് ചെയ്യാനുള്ള ലൈബ്രറി -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap');
    
    body { 
        font-family: 'Manjari', sans-serif; 
        background-color: #f3f4f6; 
        color: #111827; 
        font-weight: 700; 
    }

    /* അക്ഷര വലിപ്പം കൂട്ടാൻ */
    h1, h2, p, span {
        font-size: 1.25rem !important; 
        font-weight: 800 !important;
    }

    /* പ്രധാന കാർഡുകൾ വ്യക്തമാക്കാൻ */
    .bg-gradient-to-r, .bg-white { 
        border: 3px solid #1f2937 !important; 
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4) !important;
    }

    /* ബട്ടണുകൾക്കും ലിങ്കുകൾക്കും കട്ടി നൽകാൻ */
    a, button {
        font-size: 1.2rem !important;
        font-weight: 900 !important;
    }
</style>

</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        
        <!-- പുതിയ ഭംഗിയുള്ള ടോപ്പ് ഹെഡർ ബോക്സ് -->
        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 p-4 rounded-3xl shadow-md border border-slate-800 mb-4 flex items-center justify-between">
            <a href="dashboard.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2.5 rounded-xl font-bold border border-slate-700 transition active:scale-95 flex items-center gap-1">
                ← മെയിൻ പേജ്
            </a>
            <span class="text-xs text-amber-400 font-black tracking-widest uppercase">Mesthri Pro</span>
        </div>

        <!-- കണക്ക് രേഖപ്പെടുത്തുന്ന പ്രധാന ബോക്സ് -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <h1 class="text-xl font-black text-slate-800 mb-5 border-b pb-2 border-slate-100">വരവ്-ചെലവ് കണക്ക്</h1>
            
            <div class="space-y-4">
                <!-- 1. സൈറ്റിന്റെ പേര് -->
                <input type="text" id="description" placeholder="സൈറ്റിന്റെ / പാർട്ടിയുടെ പേര്" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                
                <!-- 2. വിശദാംശങ്ങൾ -->
                <input type="text" id="details" placeholder="വിവരങ്ങൾ (വിശദാംശങ്ങൾ)" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                
                <!-- 3. ഫോൺ നമ്പർ -->
                <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500">
                
                <!-- 4. തീയതി തിരഞ്ഞെടുക്കാനുള്ള കള്ളി -->
                <div class="space-y-1">
                    <label class="text-xs text-slate-500 font-bold px-1 uppercase">തീയതി തിരഞ്ഞെടുക്കുക</label>
                    <input type="date" id="customDate" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500 text-slate-700 font-medium">
                </div>

                <!-- 5. തുക -->
                <input type="number" id="amount" placeholder="തുക (₹)" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-emerald-500 font-bold text-lg">
                
                <!-- 6. ബട്ടണുകൾ -->
                <div class="flex gap-4">
                    <button id="btnIncome" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition text-center text-lg shadow-sm">വരവ്</button>
                    <button id="btnExpense" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition text-center text-lg shadow-sm">ചെലവ്</button>
                </div>
            </div>
        </div>

        <!-- സെർച്ച് ബോക്സും തീയതി ഫിൽറ്ററും ടോട്ടൽ കണക്കുകളും -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6 space-y-4">
            <div>
                <input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-blue-500 font-medium mb-1">
            </div>

            <!-- തീയതികൾ വെച്ച് ഫിൽറ്റർ ചെയ്യാനുള്ള കള്ളികൾ -->
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-xs text-slate-600 font-bold uppercase mb-3 px-1 tracking-wide">📅 തീയതി വെച്ച് തിരയാൻ:</p>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-slate-500 font-bold block pl-1 mb-1">തുടങ്ങുന്ന തീയതി</label>
                        <input type="date" id="filterFromDate" class="w-full p-2.5 bg-white rounded-xl text-sm border border-slate-200 outline-none text-slate-800 font-medium">
                    </div>
                    <div>
                        <label class="text-xs text-slate-500 font-bold block pl-1 mb-1">അവസാനിക്കുന്ന തീയതി</label>
                        <input type="date" id="filterToDate" class="w-full p-2.5 bg-white rounded-xl text-sm border border-slate-200 outline-none text-slate-800 font-medium">
                    </div>
                </div>
                <div class="flex gap-3 mt-4">
                    <button id="btnClearFilter" class="flex-1 text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2.5 rounded-xl transition">ഫിൽറ്റർ മാറ്റുക</button>
                    <button id="btnDownloadPDF" class="flex-1 text-xs bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl transition shadow-sm flex items-center justify-center gap-1">
                        📄 PDF റിപ്പോർട്ട്
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2 text-center pt-2 border-t border-slate-100">
                <div class="p-2 bg-green-50 rounded-2xl">
                    <span class="text-[11px] text-green-700 block font-bold">ആകെ വരവ്</span>
                    <span id="totalIncome" class="text-base font-black text-green-600">₹0</span>
                </div>
                <div class="p-2 bg-red-50 rounded-2xl">
                    <span class="text-[11px] text-red-700 block font-bold">ആകെ ചെലവ്</span>
                    <span id="totalExpense" class="text-base font-black text-red-600">₹0</span>
                </div>
                <div class="p-2 bg-blue-50 rounded-2xl">
                    <span id="balanceLabel" class="text-[11px] text-blue-700 block font-bold">കയ്യിലുള്ളത്</span>
                    <span id="totalBalance" class="text-base font-black text-blue-600">₹0</span>
                </div>
            </div>
        </div>

        <!-- തത്സമയ ഹിസ്റ്ററി -->
        <h3 class="text-lg font-bold mb-3 text-slate-700 px-1">ഇടപാടുകളുടെ ഹിസ്റ്ററി</h3>
        <div id="historyList" class="space-y-3">
            <p class="text-xs text-slate-400 text-center py-4 bg-white rounded-3xl border border-slate-100">കണക്കുകൾ ലോഡ് ചെയ്യുന്നു...</p>
        </div>
    </div>

    <!-- വിവരങ്ങൾ എഡിറ്റ് ചെയ്യാനുള്ള മോഡൽ വിൻഡോ (Popup) -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-slate-800">വി വിവരങ്ങൾ തിരുത്തുക</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">പേര്</label>
                    <input type="text" id="editDesc" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">വിവരങ്ങൾ</label>
                    <input type="text" id="editDetails" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">ഫോൺ നമ്പർ</label>
                    <input type="number" id="editPhone" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">തീയതി</label>
                    <input type="date" id="editDate" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-slate-800 font-medium">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">തുക</label>
                    <input type="number" id="editAmount" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-bold">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold">തിരുത്തേണ്ട</button>
                <button onclick="updateTransaction()" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">മാറ്റങ്ങൾ സംരക്ഷിക്കുക</button>
            </div>
        </div>
    </div>

                 
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const transRef = ref(db, 'transactions');

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('customDate').value = today;

    let allTransactions = [];
    let currentEditKey = "";
    let currentEditType = "";

    const saveTransaction = (type) => {
        const desc = document.getElementById("description").value.trim();
        const details = document.getElementById("details").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const amount = document.getElementById("amount").value;
        const selectedDate = document.getElementById("customDate").value;

        if (desc && amount && selectedDate) {
            const dateParts = selectedDate.split('-');
            const formattedDate = `${Number(dateParts[1])}/${Number(dateParts[2])}/${dateParts[0]}`;

            const transaction = {
                description: desc,
                details: details || "വിവരങ്ങൾ ചേർത്തിട്ടില്ല",
                phone: phone,
                amount: Number(amount),
                type: type,
                date: formattedDate
            };

            push(transRef, transaction).then(() => {
                document.getElementById("description").value = "";
                document.getElementById("details").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("amount").value = "";
                document.getElementById('customDate').value = today;
                alert("കണക്ക് വിജയകരമായി ചേർത്തു!");
            });
        } else {
            alert("പേര്, തീയതി, തുക എന്നിവ നിർബന്ധമായും നൽകുക!");
        }
    };

    window.deleteTransaction = (key) => {
        if (confirm("ഈ ഇടപാട് നീക്കം ചെയ്യണോ?")) {
            remove(ref(db, 'transactions/' + key));
        }
    };

    window.openEditModal = (key, desc, details, phone, dateStr, amount, type) => {
        currentEditKey = key;
        currentEditType = type;
        
        document.getElementById("editDesc").value = desc;
        document.getElementById("editDetails").value = details === 'വിവരങ്ങൾ ചേർത്തിട്ടില്ല' ? '' : details;
        document.getElementById("editPhone").value = phone;
        document.getElementById("editAmount").value = amount;

        if(dateStr && dateStr.includes('/')) {
            const parts = dateStr.split('/');
            const mm = parts[0].padStart(2, '0');
            const dd = parts[1].padStart(2, '0');
            const yyyy = parts[2];
            document.getElementById("editDate").value = `${yyyy}-${mm}-${dd}`;
        }

        document.getElementById("editModal").classList.remove("hidden");
    };

    window.closeEditModal = () => {
        document.getElementById("editModal").classList.add("hidden");
    };

    window.updateTransaction = () => {
        const desc = document.getElementById("editDesc").value.trim();
        const details = document.getElementById("editDetails").value.trim();
        const phone = document.getElementById("editPhone").value.trim();
        const amount = document.getElementById("editAmount").value;
        const selectedDate = document.getElementById("editDate").value;

        if (desc && amount && selectedDate) {
            const dateParts = selectedDate.split('-');
            const formattedDate = `${Number(dateParts[1])}/${Number(dateParts[2])}/${dateParts[0]}`;

            const updatedData = {
                description: desc,
                details: details || "വിവരങ്ങൾ ചേർത്തിട്ടില്ല",
                phone: phone,
                amount: Number(amount),
                type: currentEditType,
                date: formattedDate
            };

            update(ref(db, 'transactions/' + currentEditKey), updatedData).then(() => {
                closeEditModal();
                alert("വിവരങ്ങൾ തിരുത്തി സംരക്ഷിച്ചു!");
            });
        } else {
            alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി പൂരിപ്പിക്കുക!");
        }
    };

    document.getElementById("btnIncome").addEventListener("click", () => saveTransaction("വരവ്"));
    document.getElementById("btnExpense").addEventListener("click", () => saveTransaction("ചെലവ്"));
    document.getElementById("searchInput").addEventListener("input", () => filterTransactions());
    
    document.getElementById("filterFromDate").addEventListener("change", () => filterTransactions());
    document.getElementById("filterToDate").addEventListener("change", () => filterTransactions());
    
    document.getElementById("btnClearFilter").addEventListener("click", () => {
        document.getElementById("filterFromDate").value = "";
        document.getElementById("filterToDate").value = "";
        filterTransactions();
    });

    document.getElementById("btnDownloadPDF").addEventListener("click", () => {
        downloadFilteredPDF();
    });

    onValue(transRef, (snapshot) => {
        const data = snapshot.val() || {};
        allTransactions = Object.entries(data).reverse();
        filterTransactions();
    });

    function filterTransactions() {
        const searchVal = document.getElementById("searchInput").value.toLowerCase().trim();
        const fromDateVal = document.getElementById("filterFromDate").value;
        const toDateVal = document.getElementById("filterToDate").value;
        
        const historyList = document.getElementById("historyList");
        historyList.innerHTML = "";

        let totalIncome = 0;
        let totalExpense = 0;
        let hasData = false;

        allTransactions.forEach(([key, t]) => {
            const desc = t.description.toLowerCase();
            let matchDate = true;
            if (t.date && t.date.includes('/')) {
                const parts = t.date.split('/');
                const tDateObj = new Date(parts[2], parts[0] - 1, parts[1]);
                
                if (fromDateVal) {
                    const fromObj = new Date(fromDateVal);
                    fromObj.setHours(0,0,0,0);
                    tDateObj.setHours(0,0,0,0);
                    if (tDateObj < fromObj) matchDate = false;
                }
                if (toDateVal) {
                    const toObj = new Date(toDateVal);
                    toObj.setHours(0,0,0,0);
                    tDateObj.setHours(0,0,0,0);
                    if (tDateObj > toObj) matchDate = false;
                }
            }

            if ((searchVal === "" || desc.includes(searchVal)) && matchDate) {
                hasData = true;
                const isIncome = t.type === "വരവ്";
                const amtColor = isIncome ? "text-green-600" : "text-red-600";
                const amtSign = isIncome ? "+" : "-";

                if (isIncome) {
                    totalIncome += t.amount;
                } else {
                    totalExpense += t.amount;
                }

                const safeDesc = t.description.replace(/['"]/g, "");
                const safeDetails = (t.details || 'വിവരങ്ങൾ ചേർത്തിട്ടില്ല').replace(/['"]/g, "");

                historyList.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-blue-600 text-base">${t.description}</h4>
                            <p class="text-xs text-slate-700 font-medium mt-1">${t.details || 'വിവരങ്ങൾ ചേർത്തിട്ടില്ല'}</p>
                            <p class="text-[10px] text-slate-400 mt-1">📅 ${t.date} (${t.type})</p>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-lg ${amtColor} mb-2">${amtSign} ₹${t.amount}</div>
                            <div class="flex gap-2 justify-end text-xs font-bold">
                                <span onclick="openEditModal('${key}', '${safeDesc}', '${safeDetails}', '${t.phone || ''}', '${t.date}', ${t.amount}, '${t.type}')" class="text-amber-500 cursor-pointer hover:underline mr-2">എഡിറ്റ്</span>
                                <span onclick="deleteTransaction('${key}')" class="text-red-500 cursor-pointer hover:underline mr-2">ഡിലീറ്റ്</span>
                                <span onclick='window.open("https://wa.me/91${t.phone || ''}")' class="text-blue-500 cursor-pointer hover:underline">WhatsApp</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        if (!hasData) {
            historyList.innerHTML = `<p class="text-xs text-slate-400 text-center py-4 bg-white rounded-3xl border border-slate-100">വിവരങ്ങൾ ഒന്നും കണ്ടെത്തിയില്ല.</p>`;
        }

        document.getElementById("totalIncome").innerText = `₹${totalIncome}`;
        document.getElementById("totalExpense").innerText = `₹${totalExpense}`;
        
        const balance = totalIncome - totalExpense;
        const balanceEl = document.getElementById("totalBalance");
        const balanceLabel = document.getElementById("balanceLabel");

        if (balance >= 0) {
            balanceEl.innerText = `₹${balance}`;
            balanceEl.className = "text-base font-black text-blue-600";
            balanceLabel.innerText = "കയ്യിലുള്ളത്";
        } else {
            balanceEl.innerText = `₹${Math.abs(balance)}`;
            balanceEl.className = "text-base font-black text-red-600";
            balanceLabel.innerText = "ബാധ്യത";
        }
    }

    // PDF ഫങ്ഷൻ പുതുക്കിയത് (ടൈപ്പ് തെറ്റ് പരിഹരിച്ചു)
    function downloadFilteredPDF() {
        const searchVal = document.getElementById("searchInput").value.toLowerCase().trim();
        const fromDateVal = document.getElementById("filterFromDate").value;
        const toDateVal = document.getElementById("filterToDate").value;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFont("Helvetica", "bold");
        doc.setFontSize(18);
        doc.text("MESTHRI APP - SITE TRANSACTIONS", 14, 20);

        doc.setFontSize(10);
        doc.setFont("Helvetica", "normal");
        
        let dateInfo = "All Dates";
        if(fromDateVal || toDateVal) {
            dateInfo = `Period: ${fromDateVal || 'Start'} to ${toDateVal || 'End'}`;
        }
        doc.text(dateInfo + "  |  Generated: " + new Date().toLocaleDateString(), 14, 28);
        doc.text("--------------------------------------------------------------------------------------", 14, 33);

        let y = 40;
        let pdfIncome = 0;
        let pdfExpense = 0;

        allTransactions.forEach(([key, t]) => {
            const desc = t.description.toLowerCase();
            let matchDate = true;
            
            if (t.date && t.date.includes('/')) {
                const parts = t.date.split('/');
                const tDateObj = new Date(parts[2], parts[0] - 1, parts[1]);
                
                if (fromDateVal) {
                    const fromObj = new Date(fromDateVal);
                    fromObj.setHours(0,0,0,0);
                    tDateObj.setHours(0,0,0,0);
                    if (tDateObj < fromObj) matchDate = false;
                }
                if (toDateVal) {
                    const toObj = new Date(toDateVal);
                    toObj.setHours(0,0,0,0);
                    tDateObj.setHours(0,0,0,0);
                    if (tDateObj > toObj) matchDate = false;
                }
            }

            if ((searchVal === "" || desc.includes(searchVal)) && matchDate) {
                if(y > 260) { doc.addPage(); y = 20; }

                const isIncomeType = t.type === "വരവ്";
                const pdfTypeString = isIncomeType ? "Income" : "Expense";

                if (isIncomeType) pdfIncome += t.amount;
                else pdfExpense += t.amount;

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(11);
                doc.text(`Description: ${t.description}`, 14, y);
                
                doc.setFont("Helvetica", "normal");
                doc.text(`Type: ${pdfTypeString}  |  Amount: Rs.${t.amount}`, 120, y);
                
                y += 5;
                doc.setFontSize(9);
                
                // വിവരങ്ങൾ ഇംഗ്ലീഷിലേക്ക് താൽക്കാലികമായി മാറ്റുന്നു (PDF-ൽ ശരിയായി വരാൻ)
                let detailsText = t.details;
                if(detailsText === "വിവരങ്ങൾ ചേർത്തിട്ടില്ല" || !detailsText) {
                    detailsText = "No details";
                }
                
                doc.text(`Details: ${detailsText}  |  Date: ${t.date}  |  Phone: ${t.phone || '-'}`, 14, y);
                
                y += 5;
                doc.text(".................................................................................................................................", 14, y);
                y += 8;
            }
        });

        if(y > 240) { doc.addPage(); y = 20; }
        y += 5;
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(12);
        doc.text("SUMMARY REPORT", 14, y);
        y += 6;
        doc.text(`Total Income  : Rs.${pdfIncome}`, 14, y);
        y += 5;
        doc.text(`Total Expense : Rs.${pdfExpense}`, 14, y);
        y += 5;
        const bal = pdfIncome - pdfExpense;
        doc.text(`${bal >= 0 ? 'Net Balance' : 'Net Liability'}   : Rs.${Math.abs(bal)}`, 14, y);

        doc.save("Site_Transactions_" + new Date().toISOString().split('T')[0] + ".pdf");
    }
</script>
</body>
</html>
