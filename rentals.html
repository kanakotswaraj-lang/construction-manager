<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolQty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolRate" placeholder="ദിവസ വാടക (ഒരെണ്ണത്തിന്)" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personPhone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="space-y-4"></div>
    </div>

    <script>
        let tools = JSON.parse(localStorage.getItem('tools') || '[]');

        function addTool() {
            let name = document.getElementById('toolName').value;
            let qty = parseInt(document.getElementById('toolQty').value);
            let rate = parseInt(document.getElementById('toolRate').value);
            let person = document.getElementById('personName').value;
            let phone = document.getElementById('personPhone').value;
            
            if(!name || !qty || !rate || !person) return alert("എല്ലാ വിവരങ്ങളും നൽകുക!");
            
            tools.push({
                name, qty, rate, person, phone,
                startDate: new Date().toLocaleDateString(),
                returnDate: null,
                paid: 0,
                status: 'ഉപയോഗിക്കുന്നു'
            });
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        function returnTool(i) {
            tools[i].returnDate = new Date().toLocaleDateString();
            tools[i].status = 'തിരികെ നൽകി';
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        function addPayment(i) {
            let amount = prompt("നൽകിയ തുക:");
            if(amount) {
                tools[i].paid += parseInt(amount);
                localStorage.setItem('tools', JSON.stringify(tools));
                location.reload();
            }
        }

        function deleteTool(i) {
            if(confirm('നീക്കം ചെയ്യണോ?')) {
                tools.splice(i, 1);
                localStorage.setItem('tools', JSON.stringify(tools));
                location.reload();
            }
        }

        let list = document.getElementById('toolList');
        list.innerHTML = tools.map((t, i) => {
            let total = (t.qty * t.rate);
            let bal = total - t.paid;
            
            return `
            <div class="bg-white p-4 rounded-xl border">
                <p class="font-bold text-lg">${t.name} (${t.qty} എണ്ണം)</p>
                <p class="text-sm">ആൾ: ${t.person}</p>
                <p class="text-xs text-gray-500">എടുത്തത്: ${t.startDate}</p>
                <p class="text-xs text-gray-500">തിരികെ നൽകിയത്: ${t.returnDate || 'ഇതുവരെ ഇല്ല'}</p>
                <p class="text-sm font-bold mt-1 ${bal > 0 ? 'text-red-600' : 'text-green-600'}">
                    ${bal > 0 ? 'ബാലൻസ്: ₹'+bal : 'അഡ്വാൻസ്: ₹'+Math.abs(bal)}
                </p>
                <div class="flex gap-2 mt-3">
                    ${t.status === 'ഉപയോഗിക്കുന്നു' ? `<button onclick="returnTool(${i})" class="bg-yellow-100 p-2 rounded text-xs font-bold">തിരികെ നൽകി</button>` : ''}
                    <button onclick="addPayment(${i})" class="bg-green-100 p-2 rounded text-xs font-bold">തുക വാങ്ങി</button>
                    <button onclick="deleteTool(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                </div>
            </div>`;
        }).join('');
    </script>
</body>
</html>
