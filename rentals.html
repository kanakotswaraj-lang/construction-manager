
<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-center">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- ആകെ തുക കാണിക്കാൻ -->
        <div class="bg-blue-600 p-4 rounded-3xl shadow-lg text-white mb-6 text-center">
            <p class="text-sm">ആകെ ലഭിക്കാനുള്ളത്</p>
            <h2 id="totalDue" class="text-3xl font-bold">₹0</h2>
        </div>
        
        <div class="bg-white p-4 rounded-3xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="rate" placeholder="ദിവസ വാടക" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ" class="w-full p-3 border rounded-xl mb-2">
            <label class="text-xs text-gray-500">തുടങ്ങിയ തീയതി:</label>
            <input type="date" id="startDate" class="w-full p-3 border rounded-xl mb-2">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-2xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="grid grid-cols-1 gap-4"></div>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const toolsRef = ref(db, 'tools');

    window.addTool = () => {
        let tool = {
            name: document.getElementById('toolName').value,
            qty: document.getElementById('qty').value,
            rate: document.getElementById('rate').value,
            person: document.getElementById('personName').value,
            phone: document.getElementById('phone').value,
            startDate: document.getElementById('startDate').value,
            status: 'Pending' // പുതിയ സ്റ്റാറ്റസ്
        };
        push(toolsRef, tool).then(() => location.reload());
    };

    window.toggleStatus = (key, currentStatus) => {
        let newStatus = currentStatus === 'Pending' ? 'Paid' : 'Pending';
        update(ref(db, 'tools/' + key), { status: newStatus }).then(() => location.reload());
    };

    window.deleteTool = (key) => { if(confirm("നീക്കം ചെയ്യണോ?")) remove(ref(db, 'tools/' + key)); };

    onValue(toolsRef, (snapshot) => {
        let data = snapshot.val() || {};
        let list = document.getElementById('toolList');
        let totalDue = 0;
        list.innerHTML = "";

        Object.entries(data).forEach(([key, t]) => {
            let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
            let total = (t.qty * t.rate * days);
            if(t.status === 'Pending') totalDue += total;
            
            list.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border mb-3">
                    <h3 class="font-bold">${t.name} (${t.qty} എണ്ണം)</h3>
                    <p class="text-sm">👤 ${t.person}</p>
                    <p class="text-sm font-bold ${t.status === 'Paid' ? 'text-green-600' : 'text-red-600'}">വാടക: ₹${total} (${days} ദിവസം)</p>
                    <div class="flex gap-2 mt-3">
                        <button onclick="toggleStatus('${key}', '${t.status}')" class="bg-yellow-500 text-white p-2 rounded text-xs">${t.status === 'Pending' ? 'Paid ആക്കി മാറ്റുക' : 'Pending ആക്കുക'}</button>
                        <button onclick='window.open("https://wa.me/91${t.phone}")' class="bg-green-600 text-white p-2 rounded text-xs">WhatsApp</button>
                        <button onclick="deleteTool('${key}')" class="bg-red-500 text-white p-2 rounded text-xs">Delete</button>
                    </div>
                </div>`;
        });
        document.getElementById('totalDue').innerText = "₹" + totalDue;
    });
</script>
</body>
</html>
