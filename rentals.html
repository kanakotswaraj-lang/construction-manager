<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <!-- Tailwind CSS ഉപയോഗിക്കുന്നു -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- ഡാറ്റ ഇവിടെയാണ് വരിക -->
        <div id="toolList" class="space-y-4">
            <p class="text-center text-gray-500">ലോഡ് ആകുന്നു...</p>
        </div>
    </div>

    <!-- Firebase സ്ക്രിപ്റ്റുകൾ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        // നിങ്ങളുടെ കോൺഫിഗറേഷൻ
        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const toolsRef = ref(db, 'tools');

        // ഡാറ്റ എടുക്കാനുള്ള ഫങ്ക്ഷൻ
        onValue(toolsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('toolList');
            
            list.innerHTML = ""; // പഴയത് ക്ലിയർ ചെയ്യുന്നു
            
            if (data) {
                Object.values(data).forEach(tool => {
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border">
                            <h3 class="font-bold text-lg">${tool.name || 'പേരില്ലാത്ത ഉപകരണം'}</h3>
                            <p class="text-gray-600">വാടക: ₹${tool.price || '0'}</p>
                        </div>`;
                });
            } else {
                list.innerHTML = "<p class='text-center text-gray-500'>നിലവിൽ ഉപകരണങ്ങൾ ഒന്നുമില്ല.</p>";
            }
        });
    </script>
</body>
</html>
