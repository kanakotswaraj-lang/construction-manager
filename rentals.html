<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF ഡൗൺലോഡ് ചെയ്യാൻ ലൈബ്രറി -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto" id="printableArea">
        
        <!-- ലോഗിൻ ഹെഡറും മേസ്ത്രി പ്രൊഫൈൽ ഐക്കണും -->
        <div class="bg-slate-800 text-white p-3 rounded-2xl shadow-sm mb-4 flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <!-- പേരിന്റെ ആദ്യ അക്ഷരം കാണിക്കുന്ന റൗണ്ട് ഐക്കൺ -->
                <div id="userAvatar" class="w-7 h-7 bg-yellow-400 text-slate-900 rounded-full flex items-center justify-center font-black text-sm uppercase">
                    ..
                </div>
                <span class="text-xs font-bold">മേസ്ത്രി: <span id="displayUser" class="text-yellow-400">ലോഡ് ചെയ്യുന്നു...</span></span>
            </div>
            <a href="dashboard.html" class="text-[10px] bg-blue-600 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition">മെയിൻ പേജ്</a>
        </div>

        <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">വാടക ഉപകരണങ്ങൾ</h1>
        
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 p-6 rounded-3xl shadow-lg text-white mb-6 text-center">
            <p class="text-sm opacity-80 uppercase tracking-widest">ബാക്കി വാടക കൊടുക്കാനുള്ളത്</p>
            <h2 id="totalDue" class="text-4xl font-black mt-1">₹0</h2>
            <!-- PDF ഡൗൺലോഡ് ബട്ടൺ -->
            <button onclick="downloadPDF()" class="mt-4 bg-white text-blue-800 px-4 py-1 rounded-full text-xs font-bold shadow-md hover:bg-slate-100 transition">PDF ഡൗൺലോഡ്</button>
        </div>
        
        <!-- സെർച്ച് ഫീച്ചർ -->
        <input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." onkeyup="filterList()" class="w-full p-4 border border-slate-200 rounded-2xl mb-6 outline-none shadow-sm">

        <!-- ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">പുതിയ വാടക കണക്ക് ചേർക്കുക</h3>
            <input type="text" id="toolName" placeholder="ഉപകരണം (ഉദാ: മിക്സർ മെഷീൻ)" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="number" id="rate" placeholder="ദിവസ വാടക (തുക ₹)" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="text" id="personName" placeholder="വാടകയ്ക്ക് തന്ന ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="date" id="startDate" class="w-full p-3 border rounded-xl mb-4 text-slate-700 focus:border-blue-500 outline-none">
            <button id="btnAddTool" class="w-full bg-slate-900 hover:bg-slate-800 text-white p-4 rounded-2xl font-bold transition">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="grid grid-cols-1 gap-4"></div>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
        measurementId: "G-J9Y5TW9D7T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUserId = "";
    let userToolsRef = null;

    // ലോഗിൻ പരിശോധിക്കുന്നു
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            const userName = user.email.split('@')[0];
            document.getElementById("displayUser").innerText = userName;
            
            const firstLetter = userName.charAt(0).toUpperCase();
            document.getElementById("userAvatar").innerText = firstLetter;
            
            // മെയിൻ ഡാഷ്‌ബോർഡുമായി ഒത്തുപോകാൻ ഡാറ്റാബേസ് പാത്ത് 'rentals' ലേക്ക് മാറ്റി
            userToolsRef = ref(db, 'rentals/' + currentUserId);
            
            loadTools();
        } else {
            window.location.href = "login.html";
        }
    });

    // PDF ഡൗൺലോഡ് ഫങ്ഷൻ
    window.downloadPDF = () => {
        const element = document.getElementById('printableArea');
        html2pdf().from(element).save('വാടക_കണക്ക്.pdf');
    };

    // സെർച്ച് ഫങ്ഷൻ
    window.filterList = () => {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('tool-card');
        Array.from(cards).forEach(card => {
            let name = card.getAttribute('data-name').toLowerCase();
            card.style.display = name.includes(input) ? "" : "none";
        });
    };

    // വാടക ഉപകരണം ചേർക്കാനുള്ള ഫങ്ഷൻ
    const addTool = () => {
        if (!currentUserId || !userToolsRef) return alert("ദയവായി വീണ്ടും ലോഗിൻ ചെയ്യുക!");

        const toolName = document.getElementById('toolName').value.trim();
        const qty = document.getElementById('qty').value;
        const rate = document.getElementById('rate').value;
        const person = document.getElementById('personName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const startDate = document.getElementById('startDate').value;

        if (toolName && qty && rate && person && startDate) {
            let tool = {
                name: toolName,
                qty: Number(qty),
                rate: Number(rate),
                person: person,
                phone: phone,
                startDate: startDate,
                totalRent: 0, // തത്സമയ വാടക സൂക്ഷിക്കാൻ
                rentPaid: 0,  // നൽകിയ തുക
                history: ""   // ഹിസ്റ്ററി ടെക്സ്റ്റ് രൂപത്തിൽ സൂക്ഷിക്കാൻ
            };

            push(userToolsRef, tool).then(() => {
                document.getElementById('toolName').value = "";
                document.getElementById('qty').value = "";
                document.getElementById('rate').value = "";
                document.getElementById('personName').value = "";
                document.getElementById('phone').value = "";
                document.getElementById('startDate').value = "";
                alert("ഉപകരണത്തിന്റെ വിവരങ്ങൾ രേഖപ്പെടുത്തി!");
            }).catch(err => {
                alert("സേവ് ചെയ്യാൻ പറ്റിയില്ല: " + err.message);
            });
        } else {
            alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി പൂരിപ്പിക്കുക!");
        }
    };

    // പണം നൽകിയത് രേഖപ്പെടുത്തൽ
    window.addPayment = (key, currentPaid, currentTotal, existingHistory) => {
        let amount = prompt("എത്ര രൂപയാണ് നൽകിയത്?", "0");
        if(amount && Number(amount) > 0) {
            let numAmount = Number(amount);
            let updatedPaid = Number(currentPaid) + numAmount;
            
            // തീയതി എടുക്കുന്നു
            let today = new Date().toLocaleDateString('en-GB'); 
            let newHistoryEntry = `📅 ${today} | നൽകിയത്: ₹${numAmount}\n`;
            let updatedHistory = newHistoryEntry + (existingHistory || "");

            update(ref(db, `rentals/${currentUserId}/${key}`), { 
                rentPaid: updatedPaid,
                history: updatedHistory
            });
        }
    };

    // ഹിസ്റ്ററി അലർട്ട് വിൻഡോ വഴി കാണിക്കാൻ
    window.showHistory = (person, historyText) => {
        let msg = `📄 പേയ്മെന്റ് ഹിസ്റ്ററി (${person}):\n\n`;
        if(!historyText || historyText.trim() === "") {
            msg += "ഇതുവരെ പണം നൽകിയ വിവരങ്ങൾ ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല.";
        } else {
            msg += historyText;
        }
        alert(msg);
    };

    // ഡിലീറ്റ് ചെയ്യൽ
    window.deleteTool = (key) => { 
        if(confirm("ഈ വാടക കണക്ക് പൂർണ്ണമായി നീക്കം ചെയ്യണോ?")) {
            remove(ref(db, `rentals/${currentUserId}/${key}`));
        }
    };

    // വാട്സാപ്പ് സന്ദേശം
    window.sendWhatsApp = function(name, phone, toolName, total, paid, balance) {
        let cleanPhone = phone.replace(/\D/g, '');
        if(cleanPhone.length === 10) cleanPhone = '91' + cleanPhone;
        let message = `*ഉപകരണ വാടക വിവരങ്ങൾ*%0A%0A*പേര്:* ${name}%0A*ഉപകരണം:* ${toolName}%0A*ആകെ വാടക തുക:* ₹${total}%0A*നൽകിയ തുക:* ₹${paid}%0A*ബാക്കി നൽകാനുള്ളത്:* ₹${balance}%0A%0A_സൈറ്റ് മാനേജർ ആപ്പ് വഴി അയച്ചത്._`;
        window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
    };

    document.getElementById("btnAddTool").addEventListener("click", addTool);

    // ഡാറ്റ ലോഡ് ചെയ്യുന്നു
    function loadTools() {
        onValue(userToolsRef, (snapshot) => {
            let data = snapshot.val() || {};
            let list = document.getElementById('toolList');
            let totalDue = 0;
            list.innerHTML = "";

            let sortedEntries = Object.entries(data).sort((a, b) => {
                return new Date(b[1].startDate) - new Date(a[1].startDate);
            });

            if(sortedEntries.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-400 text-center py-6 bg-white rounded-3xl border border-slate-100">വാടക വിവരങ്ങൾ ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
                document.getElementById('totalDue').innerText = "₹0";
                return;
            }

            sortedEntries.forEach(([key, t]) => {
                let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
                let total = (t.qty * t.rate * days);
                let paid = t.rentPaid || 0;
                let balance = total - paid;
                totalDue += balance;

                // മെയിൻ ഡാഷ്‌ബോർഡിന്റെ കൃത്യതയ്ക്കായി ആകെ വാടക ഡാറ്റാബേസിൽ തത്സമയം അപ്‌ഡേറ്റ് ചെയ്യുന്നു
                if(t.totalRent !== total) {
                    update(ref(db, `rentals/${currentUserId}/${key}`), { totalRent: total });
                }

                list.innerHTML += `
                    <div class="tool-card bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4" data-name="${t.person}">
                        <h3 class="font-bold text-lg text-slate-800">${t.name} <span class="text-sm text-slate-400">(${t.qty} എണ്ണം)</span></h3>
                        <p class="text-sm text-slate-500 mb-3">👤 ${t.person}</p>
                        <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-3 rounded-2xl mb-4 border border-slate-100">
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">വാടക (${days} ദിവസം)</p><p class="font-bold text-slate-700 text-sm">₹${total}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">നൽകിയത്</p><p class="font-bold text-green-600 text-sm">₹${paid}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">ബാക്കി</p><p class="font-bold text-red-600 text-sm">₹${balance}</p></div>
                        </div>

                        <div class="flex gap-2 flex-wrap">
                            <button onclick="addPayment('${key}', ${paid}, ${total}, '${encodeURIComponent(t.history || "")}')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-xs font-bold transition">പണം നൽകി</button>
                            <button onclick="showHistory('${t.person}', '${encodeURIComponent(t.history || "")}')" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-3 py-2.5 rounded-xl text-xs font-bold transition">ഹിസ്റ്ററി</button>
                            <button onclick="sendWhatsApp('${t.person}', '${t.phone}', '${t.name}', ${total}, ${paid}, ${balance})" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2.5 rounded-xl text-xs font-bold transition">WhatsApp</button>
                            <button onclick="deleteTool('${key}')" class="bg-red-50 hover:bg-red-100 text-red-600 p-2.5 rounded-xl text-xs ml-auto transition">Delete</button>
                        </div>
                    </div>`;
            });
            document.getElementById('totalDue').innerText = "₹" + totalDue;
        });
    }
</script>
</body>
</html>
