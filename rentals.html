<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolQty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolRate" placeholder="ഒരെണ്ണത്തിനുള്ള വാടക" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personPhone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="space-y-4"></div>
    </div>

    <script>
        let tools = JSON.parse(localStorage.getItem('tools') || '[]');

        function addTool() {
            // ഓരോ ഇൻപുട്ടിന്റെയും ID കൃത്യമായി ഇവിടെ നൽകിയിരിക്കുന്നു
            let name = document.getElementById('toolName').value;
            let qty = parseInt(document.getElementById('toolQty').value);
            let rate = parseInt(document.getElementById('toolRate').value);
            let person = document.getElementById('personName').value;
            let phone = document.getElementById('personPhone').value;
            
            if(!name || !qty || !rate || !person) {
                alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി നൽകുക!");
                return;
            }
            
            let totalRent = qty * rate;
            let date = new Date().toLocaleDateString();
            
            tools.push({name, qty, rate, totalRent, person, phone, date, history: []});
            localStorage.setItem('tools', JSON.stringify(tools));
            
            // ഫോം ക്ലിയർ ചെയ്യുക
            document.getElementById('toolName').value = '';
            document.getElementById('toolQty').value = '';
            document.getElementById('toolRate').value = '';
            document.getElementById('personName').value = '';
            document.getElementById('personPhone').value = '';
            
            location.reload();
        }
    </script>
</body>
</html>
