<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- Add Tool Form -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolQty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolRate" placeholder="ഒരെണ്ണത്തിനുള്ള വാടക" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personPhone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="space-y-4"></div>
    </div>

    <script>
        let tools = JSON.parse(localStorage.getItem('tools') || '[]');

        function addTool() {
            let name = document.getElementById('toolName').value;
            let qty = parseInt(document.getElementById('toolQty').value);
            let rate = parseInt(document.getElementById('toolRate').value);
            let person = document.getElementById('personName').value;
            let phone = document.getElementById('personPhone').value;
            
            if(!name || !qty || !rate || !person) return alert("എല്ലാ വിവരങ്ങളും നൽകുക!");
            
            let totalRent = qty * rate; // മൊത്തം തുക
            let date = new Date().toLocaleDateString();
            
            tools.push({name, qty, rate, totalRent, person, phone, date, history: []});
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        function addEntry(i, type) {
            let amount = prompt("തുക നൽകുക:");
            if(!amount) return;
            tools[i].history.push({type, amount: parseInt(amount), date: new Date().toLocaleDateString()});
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        function deleteTool(i) {
            if(confirm('നീക്കം ചെയ്യണോ?')) {
                tools.splice(i, 1);
                localStorage.setItem('tools', JSON.stringify(tools));
                location.reload();
            }
        }

        let toolList = document.getElementById('toolList');
        toolList.innerHTML = tools.map((t, i) => {
            let paidAmount = t.history.filter(h => h.type === 'given').reduce((sum, h) => sum + h.amount, 0);
            let balance = t.totalRent - paidAmount;

            return `
            <div class="bg-white p-4 rounded-xl border">
                <p class="font-bold text-lg">${t.name} (${t.qty} എണ്ണം)</p>
                <p class="text-xs text-gray-500">തീയതി: ${t.date}</p>
                <p class="text-sm">റേറ്റ്: ₹${t.rate} | ആകെ: ₹${t.totalRent}</p>
                <p class="text-sm">${t.person} (${t.phone})</p>
                <p class="text-sm font-bold mt-1 ${balance > 0 ? 'text-red-600' : 'text-green-600'}">
                    ബാലൻസ്: ₹${balance}
                </p>
                <div class="flex gap-2 mt-3">
                    <button onclick="addEntry(${i}, 'rent')" class="bg-blue-100 p-2 rounded text-xs font-bold">വാടക</button>
                    <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs font-bold">തുക വാങ്ങി</button>
                    <button onclick="deleteTool(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                </div>
            </div>`;
        }).join('');
    </script>
</body>
</html>
