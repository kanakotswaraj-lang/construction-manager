<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="renter" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="tel" id="phone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addRental()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>
        <div id="rentalList" class="space-y-4"></div>
    </div>

    <script>
        let rentals = JSON.parse(localStorage.getItem('rentals') || '[]');
        
        function addRental() {
            // ഐഡികൾ ശരിയാണെന്ന് ഉറപ്പുവരുത്തുക
            let tool = document.getElementById('toolName').value;
            let qty = document.getElementById('qty').value;
            let renter = document.getElementById('renter').value;
            let phone = document.getElementById('phone').value;

            if(!tool || !renter) return alert("വിവരങ്ങൾ നൽകുക!");

            rentals.push({tool, qty, renter, phone, date: new Date().toLocaleDateString(), history: []});
            localStorage.setItem('rentals', JSON.stringify(rentals));
            location.reload();
        }

        function saveAndDisplay() {
            let list = document.getElementById('rentalList');
            list.innerHTML = rentals.map((r, i) => `
                <div class="bg-white p-4 rounded-xl border">
                    <p class="font-bold">${r.tool || ''} (${r.qty || '0'} എണ്ണം) - ${r.date || ''}</p>
                    <p class="text-sm text-gray-500">${r.renter || ''} (${r.phone || ''})</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="addEntry(${i}, 'taken')" class="bg-blue-100 p-2 rounded text-xs">വാടക കണക്ക്</button>
                        <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs">തുക വാങ്ങി</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addEntry(i, type) {
            let amount = prompt("തുക നൽകുക:");
            if(amount) {
                if(!rentals[i].history) rentals[i].history = [];
                rentals[i].history.push({type, amount: parseInt(amount), date: new Date().toLocaleDateString()});
                localStorage.setItem('rentals', JSON.stringify(rentals));
                saveAndDisplay();
            }
        }
        saveAndDisplay();
    </script>
</body>
</html>
