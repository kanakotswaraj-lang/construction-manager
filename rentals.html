<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF ഡൗൺലോഡ് ചെയ്യാൻ ലൈബ്രറി -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto" id="printableArea">
        <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">വാടക ഉപകരണങ്ങൾ</h1>
        
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 p-6 rounded-3xl shadow-lg text-white mb-6 text-center">
            <p class="text-sm opacity-80 uppercase tracking-widest">ആകെ ലഭിക്കാനുള്ളത്</p>
            <h2 id="totalDue" class="text-4xl font-black mt-1">₹0</h2>
            <!-- PDF ഡൗൺലോഡ് ബട്ടൺ -->
            <button onclick="downloadPDF()" class="mt-4 bg-white text-blue-800 px-4 py-1 rounded-full text-xs font-bold">PDF ഡൗൺലോഡ്</button>
        </div>
        
        <!-- സെർച്ച് ഫീച്ചർ -->
        <input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." onkeyup="filterList()" class="w-full p-4 border border-slate-200 rounded-2xl mb-6 outline-none shadow-sm">

        <!-- ഫോം പഴയതുപോലെ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="rate" placeholder="ദിവസ വാടക" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ" class="w-full p-3 border rounded-xl mb-2">
            <input type="date" id="startDate" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="grid grid-cols-1 gap-4"></div>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const toolsRef = ref(db, 'tools');

    // PDF ഡൗൺലോഡ് ഫങ്ഷൻ
    window.downloadPDF = () => {
        const element = document.getElementById('printableArea');
        html2pdf().from(element).save('വാടക_കണക്ക്.pdf');
    };

    // സെർച്ച് ഫങ്ഷൻ
    window.filterList = () => {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('tool-card');
        Array.from(cards).forEach(card => {
            let name = card.getAttribute('data-name').toLowerCase();
            card.style.display = name.includes(input) ? "" : "none";
        });
    };

    window.addTool = () => {
        let tool = {
            name: document.getElementById('toolName').value,
            qty: document.getElementById('qty').value,
            rate: document.getElementById('rate').value,
            person: document.getElementById('personName').value,
            phone: document.getElementById('phone').value,
            startDate: document.getElementById('startDate').value,
            paid: 0,
            history: [] // ഹിസ്റ്ററി സൂക്ഷിക്കാൻ പുതിയ അറേ
        };
        push(toolsRef, tool).then(() => location.reload());
    };

    window.addPayment = (key, currentPaid, existingHistoryJSON) => {
        let amount = prompt("എത്ര രൂപയാണ് നൽകിയത്?", "0");
        if(amount && Number(amount) > 0) {
            let existingHistory = [];
            if (existingHistoryJSON) {
                try {
                    existingHistory = JSON.parse(decodeURIComponent(existingHistoryJSON));
                } catch(e) { console.error(e); }
            }
            
            // ഇന്നത്തെ തീയതി എടുക്കുന്നു
            let today = new Date().toLocaleDateString('en-GB'); 
            existingHistory.push({ date: today, amount: Number(amount) });

            update(ref(db, 'tools/' + key), { 
                paid: Number(currentPaid) + Number(amount),
                history: existingHistory
            }).then(() => location.reload());
        }
    };

    // ഹിസ്റ്ററി കാണിക്കാനും ഒളിപ്പിക്കാനുമുള്ള ഫങ്ഷൻ
    window.toggleHistory = (key) => {
        let el = document.getElementById('hist-' + key);
        if(el.style.display === "none") {
            el.style.display = "block";
        } else {
            el.style.display = "none";
        }
    };

    window.deleteTool = (key) => { if(confirm("നീക്കം ചെയ്യണോ?")) remove(ref(db, 'tools/' + key)); };

    onValue(toolsRef, (snapshot) => {
        let data = snapshot.val() || {};
        let list = document.getElementById('toolList');
        let totalDue = 0;
        list.innerHTML = "";

        let sortedEntries = Object.entries(data).sort((a, b) => {
            return new Date(b[1].startDate) - new Date(a[1].startDate);
        });

        sortedEntries.forEach(([key, t]) => {
            let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
            let total = (t.qty * t.rate * days);
            let paid = t.paid || 0;
            let balance = total - paid;
            totalDue += balance;
            
            // ഹിസ്റ്ററി ലിസ്റ്റ് ഉണ്ടെങ്കിൽ അത് തയ്യാറാക്കുന്നു
            let historyHTML = "";
            let historyData = t.history || [];
            if(historyData.length > 0) {
                historyData.forEach(h => {
                    historyHTML += `<div class="flex justify-between text-xs text-slate-600 border-b border-dashed py-1"><span>📅 ${h.date}</span><span class="font-bold text-green-600">₹${h.amount}</span></div>`;
                });
            } else {
                historyHTML = `<p class="text-xs text-slate-400 text-center">ഇതുവരെ പേയ്മെന്റുകൾ ഒന്നും നടത്തിയിട്ടില്ല.</p>`;
            }

            // സുരക്ഷിതമായി ഹിസ്റ്ററി ഡാറ്റ ഫങ്ഷനിലേക്ക് കൈമാറാൻ
            let historyJSON = encodeURIComponent(JSON.stringify(historyData));

            list.innerHTML += `
                <div class="tool-card bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4" data-name="${t.person}">
                    <h3 class="font-bold text-lg text-slate-800">${t.name} <span class="text-sm text-slate-400">(${t.qty} എണ്ണം)</span></h3>
                    <p class="text-sm text-slate-500 mb-3">👤 ${t.person}</p>
                    <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-3 rounded-2xl mb-4">
                        <div><p class="text-[10px] text-slate-400 font-bold">വാടക</p><p class="font-bold">₹${total}</p></div>
                        <div><p class="text-[10px] text-slate-400 font-bold">നൽകിയത്</p><p class="font-bold text-green-600">₹${paid}</p></div>
                        <div><p class="text-[10px] text-slate-400 font-bold">ബാക്കി</p><p class="font-bold text-red-600">₹${balance}</p></div>
                    </div>

                    <!-- മറഞ്ഞിരിക്കുന്ന ഹിസ്റ്ററി ബോക്സ് -->
                    <div id="hist-${key}" class="bg-yellow-50/50 p-3 rounded-2xl mb-4 border border-yellow-100" style="display: none;">
                        <p class="text-[11px] font-bold text-slate-500 mb-2 border-b pb-1">📄 പേയ്മെന്റ് ഹിസ്റ്ററി</p>
                        ${historyHTML}
                    </div>

                    <div class="flex gap-2 flex-wrap">
                        <button onclick="addPayment('${key}', ${paid}, '${historyJSON}')" class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-xs font-bold">പണം ലഭിച്ചു</button>
                        <button onclick="toggleHistory('${key}')" class="bg-yellow-100 text-yellow-700 px-3 py-2 rounded-xl text-xs font-bold">ഹിസ്റ്ററി</button>
                        <button onclick='window.open("https://wa.me/91${t.phone}")' class="bg-green-100 text-green-700 px-3 py-2 rounded-xl text-xs font-bold">WhatsApp</button>
                        <button onclick="deleteTool('${key}')" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-xs font-bold">Delete</button>
                    </div>
                </div>`;
        });
        document.getElementById('totalDue').innerText = "₹" + totalDue;
    });
</script>
</body>
</html>
