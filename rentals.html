<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolQty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="toolRate" placeholder="ഒരെണ്ണത്തിനുള്ള വാടക" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personName" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="personPhone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="saveTool()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="space-y-4"></div>
    </div>

    <script>
        function saveTool() {
            let name = document.getElementById('toolName').value;
            let qty = parseInt(document.getElementById('toolQty').value);
            let rate = parseInt(document.getElementById('toolRate').value);
            let person = document.getElementById('personName').value;
            let phone = document.getElementById('personPhone').value;
            
            if(!name || !qty || !rate || !person) {
                alert("എല്ലാ വിവരങ്ങളും നൽകുക!");
                return;
            }
            
            let tools = JSON.parse(localStorage.getItem('tools') || '[]');
            let totalRent = qty * rate;
            
            tools.push({
                name: name,
                qty: qty,
                rate: rate,
                totalRent: totalRent,
                person: person,
                phone: phone,
                date: new Date().toLocaleDateString(),
                history: []
            });
            
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        // ലിസ്റ്റ് കാണിക്കാൻ
        let tools = JSON.parse(localStorage.getItem('tools') || '[]');
        let listContainer = document.getElementById('toolList');
        
        listContainer.innerHTML = tools.map((t, i) => {
            let paid = (t.history || []).reduce((sum, h) => sum + (h.type === 'given' ? h.amount : 0), 0);
            let bal = t.totalRent - paid;
            
            return `
            <div class="bg-white p-4 rounded-xl border">
                <p class="font-bold text-lg">${t.name} (${t.qty} എണ്ണം)</p>
                <p class="text-xs text-gray-500">തീയതി: ${t.date || 'N/A'}</p>
                <p class="text-sm">റേറ്റ്: ₹${t.rate} | ആകെ: ₹${t.totalRent}</p>
                <p class="text-sm">ആൾ: ${t.person} (${t.phone})</p>
                <p class="text-sm font-bold mt-1 ${bal > 0 ? 'text-red-600' : 'text-green-600'}">
                    ബാലൻസ്: ₹${bal}
                </p>
                <div class="flex gap-2 mt-3">
                    <button onclick="alert('ലഭ്യം')" class="bg-blue-100 p-2 rounded text-xs font-bold">വാടക</button>
                    <button onclick="alert('ലഭ്യം')" class="bg-green-100 p-2 rounded text-xs font-bold">തുക വാങ്ങി</button>
                    <button onclick="deleteT(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                </div>
            </div>`;
        }).join('');

        function deleteT(i) {
            let tools = JSON.parse(localStorage.getItem('tools') || '[]');
            tools.splice(i, 1);
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }
    </script>
</body>
</html>
