<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- പുതിയ ഉപകരണം ചേർക്കാനുള്ള ഫോം -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border">
            <input type="text" id="toolName" placeholder="ഉപകരണത്തിന്റെ പേര്" class="w-full p-2 border rounded mb-2">
            <input type="number" id="toolPrice" placeholder="വാടക (രൂപ)" class="w-full p-2 border rounded mb-2">
            <button id="addBtn" class="w-full bg-blue-600 text-white p-2 rounded font-bold">ചേർക്കുക</button>
        </div>

        <div id="toolList" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const toolsRef = ref(db, 'tools');

        // ഡാറ്റ ചേർക്കാനുള്ള ഫങ്ക്ഷൻ
        document.getElementById('addBtn').onclick = () => {
            const name = document.getElementById('toolName').value;
            const price = document.getElementById('toolPrice').value;
            if(name && price) {
                push(toolsRef, { name, price });
                document.getElementById('toolName').value = "";
                document.getElementById('toolPrice').value = "";
            }
        };

        // ഡാറ്റ കാണിക്കാനുള്ള ഫങ്ക്ഷൻ
        onValue(toolsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('toolList');
            list.innerHTML = "";
            if (data) {
                Object.values(data).forEach(tool => {
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border">
                            <h3 class="font-bold text-lg">${tool.name}</h3>
                            <p class="text-gray-600">വാടക: ₹${tool.price}</p>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
