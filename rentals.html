<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-center">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- പഴയ ഫോം (എല്ലാ ഫീൽഡുകളും ഉള്ളത്) -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="rate" placeholder="ദിവസ വാടക (ഒരെണ്ണത്തിന്)" class="w-full p-3 border rounded-xl mb-2">
            <select id="personType" class="w-full p-3 border rounded-xl mb-2">
                <option value="ഉടമസ്ഥൻ">ഉടമസ്ഥൻ</option>
                <option value="വാടകയ്ക്ക് എടുക്കുന്ന ആൾ">വാടകയ്ക്ക് എടുക്കുന്ന ആൾ</option>
            </select>
            <input type="text" id="personName" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ (10 അക്കം)" class="w-full p-3 border rounded-xl mb-2">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-2xl font-bold">ചേർക്കുക</button>
        </div>
<input type="text" id="searchInput" placeholder="പേര് വെച്ച് തിരയുക..." onkeyup="filterTools()" class="w-full p-3 border rounded-xl mb-4">
        
        <div id="toolList" class="grid grid-cols-1 gap-4"></div>
    </div>

    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const toolsRef = ref(db, 'tools');
    
    let allTools = {}; // എല്ലാ ഡാറ്റയും സേവ് ചെയ്യാൻ

    // ചേർക്കാൻ
    window.addTool = () => {
        let tool = {
            name: document.getElementById('toolName').value,
            qty: document.getElementById('qty').value,
            rate: document.getElementById('rate').value,
            type: document.getElementById('personType').value,
            person: document.getElementById('personName').value,
            phone: document.getElementById('phone').value,
            startDate: new Date().toISOString()
        };
        push(toolsRef, tool).then(() => location.reload());
    };

    // എഡിറ്റ് ചെയ്യാൻ
    window.editTool = (key, t) => {
        let n = prompt("പേര്:", t.name);
        let q = prompt("എണ്ണം:", t.qty);
        let r = prompt("വാടക:", t.rate);
        if(n && q && r) update(ref(db, 'tools/' + key), {name: n, qty: q, rate: r});
    };

    // ഡിലീറ്റ് ചെയ്യാൻ
    window.deleteTool = (key) => { if(confirm("നീക്കം ചെയ്യണോ?")) remove(ref(db, 'tools/' + key)); };

    // സെർച്ച് ഫങ്ഷൻ
    window.filterTools = () => {
        let input = document.getElementById('searchInput').value.toLowerCase();
        renderList(Object.entries(allTools).filter(([k, t]) => t.person.toLowerCase().includes(input)));
    };

    // ലിസ്റ്റ് ഡിസ്പ്ലേ ചെയ്യാൻ
    function renderList(dataArray) {
        let list = document.getElementById('toolList');
        list.innerHTML = "";
        dataArray.forEach(([key, t]) => {
            let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
            let total = (t.qty * t.rate * days);
            list.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border mb-3">
                    <h3 class="font-bold">${t.name} (${t.qty} എണ്ണം)</h3>
                    <p class="text-sm">👤 <strong>${t.person}</strong> (${t.type})</p>
                    <p class="text-sm font-bold text-red-600">വാടക: ₹${total}</p>
                    <div class="flex gap-2 mt-3">
                        <button onclick='window.open("https://wa.me/91${t.phone}")' class="bg-green-600 text-white p-2 rounded text-xs">WhatsApp</button>
                        <button onclick='editTool("${key}", ${JSON.stringify(t)})' class="bg-blue-500 text-white p-2 rounded text-xs">Edit</button>
                        <button onclick='deleteTool("${key}")' class="bg-red-500 text-white p-2 rounded text-xs">Delete</button>
                    </div>
                </div>`;
        });
    }

    onValue(toolsRef, (snapshot) => {
        allTools = snapshot.val() || {};
        renderList(Object.entries(allTools));
    });
</script>

</body>
</html>
