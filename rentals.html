<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-center">വാടക ഉപകരണങ്ങൾ</h1>
        
        <!-- ഇൻപുട്ട് ഫോം -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="rate" placeholder="ദിവസ വാടക (ഒരെണ്ണത്തിന്)" class="w-full p-3 border rounded-xl mb-2">
            
            <!-- ഇവിടെയാണ് പുതിയ ഡ്രോപ്പ്‌ഡൗൺ ചേർത്തത് -->
            <select id="personType" class="w-full p-3 border rounded-xl mb-2">
                <option value="ഉടമസ്ഥൻ">ഉടമസ്ഥൻ</option>
                <option value="വാടകയ്ക്ക് എടുക്കുന്ന ആൾ">വാടകയ്ക്ക് എടുക്കുന്ന ആൾ</option>
            </select>
            
            <input type="text" id="personName" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="phone" placeholder="ഫോൺ നമ്പർ (10 അക്കം)" class="w-full p-3 border rounded-xl mb-2">
            <button onclick="addTool()" class="w-full bg-slate-900 text-white p-3 rounded-2xl font-bold">ചേർക്കുക</button>
        </div>

        <!-- ലിസ്റ്റ് -->
        <div id="toolList" class="grid grid-cols-1 gap-4"></div>
    </div>

    <script>
        let tools = JSON.parse(localStorage.getItem('tools') || '[]');

        function addTool() {
            let tool = {
                name: document.getElementById('toolName').value,
                qty: document.getElementById('qty').value,
                rate: document.getElementById('rate').value,
                type: document.getElementById('personType').value, // ടൈപ്പ് സേവ് ചെയ്യുന്നു
                person: document.getElementById('personName').value,
                phone: document.getElementById('phone').value,
                startDate: new Date().toISOString(),
                paid: 0
            };
            tools.push(tool);
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }

        // വാട്‌സാപ്പ് മെസ്സേജ് അയക്കുന്ന ഫങ്ഷൻ
        function sendWhatsApp(i) {
            let t = tools[i];
            let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
            let total = (t.qty * t.rate * days);
            let bal = total - t.paid;

            let msg = `വാടക കണക്ക് വിവരം:%0A` +
                      `ഉപകരണം: ${t.name}%0A` +
                      `${t.type}: ${t.person}%0A` +
                      `ആകെ വാടക: ₹${total}%0A` +
                      `നൽകിയ തുക: ₹${t.paid}%0A` +
                      `ബാക്കി നൽകാനുള്ളത്: ₹${bal}%0A` +
                      `സൈറ്റ് മാനേജർ ആപ്പിൽ നിന്ന്.`;
            
            let phone = '91' + t.phone; 
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        // ലിസ്റ്റ് കാണിക്കുന്ന ഭാഗം
        let list = document.getElementById('toolList');
        tools.forEach((t, i) => {
            let days = Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
            let total = (t.qty * t.rate * days);
            
            list.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border">
                    <h3 class="font-bold text-lg">${t.name} (${t.qty} എണ്ണം)</h3>
                    <!-- ഐക്കണും ടൈപ്പും പേരും ഇവിടെ കാണിക്കും -->
                    <p class="text-sm flex items-center gap-1">👤 <strong>${t.type}:</strong> ${t.person}</p>
                    <p class="text-sm font-bold text-red-600">നൽകാനുള്ളത്: ₹${total - t.paid}</p>
                    <div class="flex gap-2 mt-3">
                        <button onclick="sendWhatsApp(${i})" class="bg-green-600 text-white p-2 rounded text-xs font-bold">WhatsApp അയക്കുക</button>
                        <button onclick="deleteTool(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                    </div>
                </div>`;
        });

        function deleteTool(i) {
            tools.splice(i, 1);
            localStorage.setItem('tools', JSON.stringify(tools));
            location.reload();
        }
    </script>
</body>
</html>
