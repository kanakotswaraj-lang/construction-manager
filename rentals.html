<!DOCTYPE html>
<html lang="ml">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta charset="UTF-8">
    <title>വാടക ഉപകരണങ്ങൾ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">വാടക ഉപകരണങ്ങൾ</h1>
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="toolName" placeholder="ഉപകരണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="qty" placeholder="എണ്ണം" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="renter" placeholder="ആളുടെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="tel" id="phone" placeholder="നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addRental()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>
        <div id="rentalList" class="space-y-4"></div>
    </div>

    <script>
        let rentals = JSON.parse(localStorage.getItem('rentals') || '[]');
        
        function addRental() {
            // ഐഡികൾ ശരിയാണെന്ന് ഉറപ്പുവരുത്തുക
            let tool = document.getElementById('toolName').value;
            let qty = document.getElementById('qty').value;
            let renter = document.getElementById('renter').value;
            let phone = document.getElementById('phone').value;

            if(!tool || !renter) return alert("വിവരങ്ങൾ നൽകുക!");

            rentals.push({tool, qty, renter, phone, date: new Date().toLocaleDateString(), history: []});
            localStorage.setItem('rentals', JSON.stringify(rentals));
            location.reload();
        }

       function saveAndDisplay() {
    localStorage.setItem('rentals', JSON.stringify(rentals));
    let list = document.getElementById('rentalList');
    list.innerHTML = rentals.map((r, i) => `
        <div class="bg-white p-4 rounded-xl border shadow-sm mb-3">
            <div class="font-bold text-lg cursor-pointer" onclick="editRental(${i})">
                ${r.tool || ''} (${r.qty || '0'} എണ്ണം)
            </div>
            <p class="text-xs text-gray-400">തീയതി: ${r.date || ''}</p>
            <p class="text-sm text-gray-700 cursor-pointer" onclick="editRental(${i})">
                ${r.renter || ''} (${r.phone || ''})
            </p>
            
            <div class="flex gap-2 mt-3">
                <button onclick="addEntry(${i}, 'taken')" class="bg-blue-100 p-2 rounded text-xs font-bold">വാടക</button>
                <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs font-bold">തുക വാങ്ങി</button>
                <button onclick="deleteRental(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
            </div>
        </div>
    `).join('');
}

function editRental(i) {
    let newTool = prompt("ഉപകരണം:", rentals[i].tool);
    let newQty = prompt("എണ്ണം:", rentals[i].qty);
    let newRenter = prompt("ആളുടെ പേര്:", rentals[i].renter);
    let newPhone = prompt("ഫോൺ നമ്പർ:", rentals[i].phone);
    
    if(newTool) rentals[i].tool = newTool;
    if(newQty) rentals[i].qty = newQty;
    if(newRenter) rentals[i].renter = newRenter;
    if(newPhone) rentals[i].phone = newPhone;
    
    saveAndDisplay();
}

function deleteRental(i) {
    if(confirm('ഇത് നീക്കം ചെയ്യണോ?')) {
        rentals.splice(i, 1);
        saveAndDisplay();
    }
}
        saveAndDisplay();
    </script>
</body>
</html>
