<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>വാടക ഉപകരണങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">വാടക ഉപകരണങ്ങൾ</h1>
            <a href="index.html" class="text-sm text-slate-500 underline">ഡാഷ്ബോർഡ്</a>
        </div>
        
        <!-- Add Rental Item -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6 space-y-3">
            <input type="date" id="rentalDate" class="w-full p-3 border rounded-xl outline-none">
            <input type="text" id="shopName" placeholder="സ്ഥാപനത്തിന്റെ പേര്" class="w-full p-3 border rounded-xl outline-none">
            <input type="text" id="itemName" placeholder="ഉപകരണത്തിന്റെ പേര്" class="w-full p-3 border rounded-xl outline-none">
            <input type="number" id="rentPrice" placeholder="വാടക നിരക്ക് (₹)" class="w-full p-3 border rounded-xl outline-none">
            
            <select id="paymentMode" class="w-full p-3 border rounded-xl outline-none bg-white">
                <option value="Cash">Cash (പണം)</option>
                <option value="Google Pay">Google Pay</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>

            <button onclick="addRental()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">രേഖപ്പെടുത്തുക</button>
        </div>

        <div id="rentalsList" class="space-y-3"></div>
    </div>

    <script>
        document.getElementById('rentalDate').valueAsDate = new Date();
        let rentals = JSON.parse(localStorage.getItem('rentals') || '[]');

        function addRental() {
            let data = {
                date: document.getElementById('rentalDate').value,
                shop: document.getElementById('shopName').value,
                item: document.getElementById('itemName').value,
                price: document.getElementById('rentPrice').value,
                mode: document.getElementById('paymentMode').value
            };
            if(!data.item || !data.price) return;
            
            rentals.push(data);
            localStorage.setItem('rentals', JSON.stringify(rentals));
            location.reload();
        }

        function deleteRental(index) {
            rentals.splice(index, 1);
            localStorage.setItem('rentals', JSON.stringify(rentals));
            location.reload();
        }

        function displayRentals() {
            let container = document.getElementById('rentalsList');
            container.innerHTML = rentals.map((r, i) => `
                <div class='bg-white p-4 border border-slate-100 rounded-2xl flex justify-between items-center shadow-sm'>
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold">${r.date} | <span class="text-blue-600">${r.mode}</span></div>
                        <div class="text-sm font-bold text-slate-800">${r.item} (${r.shop})</div>
                        <div class="text-sm text-slate-600">വാടക: ₹${r.price}</div>
                    </div>
                    <button onclick="deleteRental(${i})" class="text-red-500 text-xs font-bold bg-red-50 px-3 py-1 rounded-lg">Delete</button>
                </div>`).join('');
        }
        displayRentals();
    </script>
</body>
</html>
