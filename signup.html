<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>രജിസ്ട്രേഷൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-green-500">
        <!-- ഹെഡിംഗ് മാറ്റങ്ങൾ വരുത്തിയത് ഇവിടെയാണ് -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-green-700">മേസ്തിരി ആപ്പ്</h1>
            <p class="text-gray-500 font-bold mt-1">സൈറ്റ് മാനേജർ പുതിയ അക്കൗണ്ട്</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">യൂസർനെയിം</label>
                <input type="text" id="username" placeholder="ഉദാ: swarajkolayad" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <input type="password" id="password" placeholder="പുതിയ പാസ്‌വേർഡ്" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">രഹസ്യ ചോദ്യം</label>
                <select id="securityQuestion" class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none bg-white">
                    <option value="നിങ്ങളുടെ ആദ്യ സ്കൂൾ ഏതാണ്?">നിങ്ങളുടെ ആദ്യ സ്കൂൾ ഏതാണ്?</option>
                    <option value="നിങ്ങളുടെ പ്രിയപ്പെട്ട നിറം ഏതാണ്?">നിങ്ങളുടെ പ്രിയപ്പെട്ട നിറം ഏതാണ്?</option>
                    <option value="നിങ്ങളുടെ ആദ്യത്തെ വളർത്തുമൃഗത്തിന്റെ പേര്?">നിങ്ങളുടെ ആദ്യത്തെ വളർത്തുമൃഗത്തിന്റെ പേര്?</option>
                </select>
            </div>
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">ഉത്തരം</label>
                <input type="text" id="securityAnswer" placeholder="ഉത്തരം ഇവിടെ നൽകുക" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-green-500">
            </div>
        </div>

        <button id="btnSignup" class="w-full mt-6 bg-green-600 text-white p-4 rounded-xl font-black text-xl hover:bg-green-700 transition shadow-lg">
            രജിസ്റ്റർ ചെയ്യുക
        </button>

        <p class="text-center mt-6 text-gray-600 font-bold">
            ഇതിനകം അക്കൗണ്ട് ഉണ്ടോ? <a href="login.html" class="text-blue-600">ലോഗിൻ ചെയ്യുക</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("btnSignup").addEventListener("click", async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const question = document.getElementById('securityQuestion').value;
            const answer = document.getElementById('securityAnswer').value.trim();

            if(!user || !pass || !answer) return alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി പൂരിപ്പിക്കുക!");

            try {
                await createUserWithEmailAndPassword(auth, `${user}@mesthri.com`, pass);
                await setDoc(doc(db, "users", user), {
                    username: user,
                    password: pass,
                    securityQuestion: question,
                    securityAnswer: answer
                });
                alert("രജിസ്ട്രേഷൻ വിജയിച്ചു! ഇപ്പോൾ ലോഗിൻ ചെയ്യാവുന്നതാണ്.");
                window.location.href = "login.html";
            } catch (error) {
                alert("രജിസ്ട്രേഷൻ പരാജയപ്പെട്ടു: " + error.message);
            }
        });
    </script>
</body>
</html>
