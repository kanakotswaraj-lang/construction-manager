<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ജീവനക്കാരന്റെ വിവരങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 id="staffName" class="text-2xl font-bold mb-1"></h1>
        <p id="staffPhone" class="text-slate-500 mb-4"></p>

        <!-- Attendance -->
        <div class="bg-white p-4 rounded-xl border mb-4">
            <button onclick="markAttendance('Present')" class="bg-emerald-500 text-white px-4 py-2 rounded font-bold mr-2">വന്നു</button>
            <button onclick="markAttendance('Absent')" class="bg-red-500 text-white px-4 py-2 rounded font-bold">അവധി</button>
        </div>

        <!-- WhatsApp Button -->
        <button onclick="sendWhatsApp()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold mb-4">വാട്ട്‌സ്ആപ്പിൽ മെസ്സേജ് അയക്കുക</button>

        <div id="historyList" class="space-y-2"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const index = urlParams.get('index');
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');
        let s = staff[index];

        document.getElementById('staffName').innerText = s.name;
        document.getElementById('staffPhone').innerText = "ഫോൺ: " + (s.phone || "നൽകിയിട്ടില്ല");

        function markAttendance(status) {
            s.entries.push({ date: new Date().toLocaleDateString(), work: "ഹാജർ: " + status });
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function sendWhatsApp() {
            if(!s.phone) return alert("ഫോൺ നമ്പർ ഇല്ല!");
            let msg = `ഹലോ ${s.name}, താങ്കളുടെ ഹാജർ വിവരങ്ങൾ പരിശോധിക്കുമല്ലോ.`;
            window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
