<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <a href="index.html" class="text-sm text-slate-600 mb-2 inline-block">← ഡാഷ്‌ബോർഡ്</a>
        <h1 class="text-2xl font-bold mb-6">ജീവനക്കാർ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="name" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="phone" placeholder="ഫോൺ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="window.addStaff()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div class="mb-4">
            <input type="text" id="search" placeholder="പേര് തിരയുക..." onkeyup="window.filterStaff()" class="w-full p-3 border rounded-xl shadow-sm">
        </div>

        <div id="staffList" class="space-y-4">Loading...</div>
    </div>

   <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    databaseURL: "https://mesthri-app-default-rtdb.firebaseio.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.firebasestorage.app",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
    measurementId: "G-J9Y5TW9D7T"
  };

 // Initialize Firebase
       
 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadStaff() {
            const querySnapshot = await getDocs(collection(db, "staff_entries"));
            let staff = [];
            querySnapshot.forEach((doc) => {
                staff.push({ id: doc.id, ...doc.data() });
            });
            renderStaff(staff);
        }

    
        function renderStaff(staff) {
            let listElement = document.getElementById('staffList');
            listElement.innerHTML = staff.map((s) => {
                let history = s.history || [];
                let workAmount = history.filter(h => h.type === 'work').reduce((sum, h) => sum + (h.amount || 0), 0);
                let givenAmount = history.filter(h => h.type === 'given').reduce((sum, h) => sum + (h.amount || 0), 0);
                let balance = workAmount - givenAmount;
                
                return `
                <div class="staff-card bg-white p-4 rounded-xl border mb-3" data-name="${s.name}">
                    <p class="font-bold text-lg">${s.name}</p>
                    <p class="text-gray-500 text-sm">${s.phone}</p>
                    <p class="text-sm mt-1">ജോലി: ₹${workAmount} | നൽകിയത്: ₹${givenAmount}</p>
                    <p class="text-sm font-bold mt-1 ${balance > 0 ? 'text-red-600' : 'text-green-600'}">നൽകാനുള്ളത്: ₹${balance}</p>
                    <div class="flex gap-2 mt-3 flex-wrap">
                        <button onclick="window.addEntry('${s.id}', 'work')" class="bg-blue-100 px-3 py-1.5 rounded-lg text-xs font-bold text-blue-700">ജോലി</button>
                        <button onclick="window.addEntry('${s.id}', 'given')" class="bg-green-100 px-3 py-1.5 rounded-lg text-xs font-bold text-green-700">നൽകിയത്</button>
                        <button onclick="window.sendWhatsApp('${s.name}', '${s.phone}', ${workAmount}, ${givenAmount}, ${balance})" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">WhatsApp</button>
                        <button onclick="window.deleteStaff('${s.id}')" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                    </div>
                </div>`;
            }).join('');
        }
// താഴെയായി ഈ ഫങ്ഷൻ കൂടി ചേർക്കുക
    
        window.sendWhatsApp = function(name, phone, work, given, balance) {
            let cleanPhone = phone.replace(/\D/g, '');
            if(cleanPhone.length === 10) cleanPhone = '91' + cleanPhone;
            let message = `*സൈറ്റ് കണക്ക് വിവരങ്ങൾ*%0A%0A*പേര്:* ${name}%0A*ആകെ ജോലിക്കൂലി:* ₹${work}%0A*നൽകിയ തുക:* ₹${given}%0A*ബാക്കി നൽകാനുള്ളത്:* ₹${balance}%0A%0A_സൈറ്റ് മാനേജർ ആപ്പ് വഴി അയച്ചത്._`;
            window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
        };
        window.filterStaff = () => {
            let query = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.staff-card').forEach(item => {
                item.style.display = item.getAttribute('data-name').toLowerCase().includes(query) ? '' : 'none';
            });
        };

        loadStaff();
    </script>
</body>
</html>
