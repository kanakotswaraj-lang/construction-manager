<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">ജീവനക്കാർ</h1>
        
        <!-- Add New Staff -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="newStaffName" placeholder="പേര്" class="w-full p-3 border rounded-lg">
            <button onclick="addStaff()" class="bg-blue-500 text-white px-4 rounded-lg font-bold">+</button>
        </div>

        <input type="text" id="searchInput" onkeyup="filterStaff()" placeholder="തിരയുക..." class="w-full p-3 border rounded-lg mb-4">
        
        <div id="staffList" class="space-y-2"></div>

        <div class="mt-8 text-center"><a href="index.html" class="text-blue-500 underline">ഡാഷ്ബോർഡിലേക്ക്</a></div>
    </div>

    <script>
        function addStaff() {
            let name = document.getElementById('newStaffName').value;
            if(!name) return;
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            staff.push({ name: name, entries: [] });
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function deleteStaff(index) {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            staff.splice(index, 1);
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function displayStaff() {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            let container = document.getElementById('staffList');
            container.innerHTML = staff.map((s, index) => `
                <div class='staff-item p-3 border rounded flex justify-between bg-white items-center'>
                    <a href="staff-details.html?index=${index}" class="flex-grow font-bold">${s.name}</a>
                    <button onclick="deleteStaff(${index})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                </div>`).join('');
        }
        displayStaff();
    </script>
</body>
</html>
