<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-sm border">
        <h1 id="staffName" class="text-xl font-bold mb-4">എൻട്രികൾ</h1>
        
        <!-- Entry Form -->
        <div class="space-y-3 mb-6">
            <input type="date" id="entryDate" class="w-full p-3 border rounded-xl">
            <input type="number" id="wage" placeholder="കൂലി" class="w-full p-3 border rounded-xl">
            <input type="number" id="paid" placeholder="നൽകിയത്" class="w-full p-3 border rounded-xl">
            <button onclick="saveEntry()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">സേവ് ചെയ്യുക</button>
        </div>

        <div id="historyList" class="space-y-3"></div>
        <div class="mt-6 text-center"><a href="staff.html" class="text-slate-500 underline">തിരികെ</a></div>
    </div>

    <script>
        document.getElementById('entryDate').valueAsDate = new Date();
        const urlParams = new URLSearchParams(window.location.search);
        const staffIndex = urlParams.get('index');
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');

        function saveEntry() {
            if(!staff[staffIndex].entries) staff[staffIndex].entries = [];
            staff[staffIndex].entries.push({
                date: document.getElementById('entryDate').value,
                wage: document.getElementById('wage').value,
                paid: document.getElementById('paid').value
            });
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function deleteEntry(eIndex) {
            staff[staffIndex].entries.splice(eIndex, 1);
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function displayEntries() {
            let entries = staff[staffIndex].entries || [];
            document.getElementById('historyList').innerHTML = entries.map((e, i) => `
                <div class='p-3 border rounded-xl flex justify-between items-center bg-slate-50'>
                    <div>
                        <div class="text-xs text-gray-500">${e.date}</div>
                        <div class="font-bold">കൂലി: ₹${e.wage} | നൽകിയത്: ₹${e.paid}</div>
                    </div>
                    <button onclick="deleteEntry(${i})" class="text-red-500 text-xs font-bold">Delete</button>
                </div>`).join('');
        }
        displayEntries();
    </script>
</body>
</html>
