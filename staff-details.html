<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ജീവനക്കാരന്റെ വിവരങ്ങൾ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <!-- പേരും നമ്പറും എഡിറ്റ് ചെയ്യാനുള്ള സംവിധാനം -->
        <div class="mb-4">
            <h1 id="staffName" class="text-2xl font-bold text-slate-800"></h1>
            <p id="staffPhone" class="text-slate-500"></p>
            <button onclick="editStaff()" class="text-sm text-blue-600 underline mt-1">പേരും നമ്പറും തിരുത്താൻ</button>
        </div>

        <!-- അറ്റൻഡൻസ് ബട്ടൺ -->
        <div class="bg-white p-4 rounded-xl border mb-4 text-center">
            <h2 class="text-sm font-bold text-slate-600 mb-2">ഇന്നത്തെ ഹാജർ</h2>
            <button onclick="markAttendance('Present')" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold mr-2">വന്നു</button>
            <button onclick="markAttendance('Absent')" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">അവധി</button>
        </div>

        <!-- പണിയുടെ വിവരങ്ങൾ എൻട്രി ചെയ്യാൻ -->
        <div class="bg-white p-6 rounded-xl border mb-6 space-y-3">
            <input type="date" id="entryDate" class="w-full p-3 border rounded-xl outline-none">
            <input type="text" id="work" placeholder="പണിയുടെ വിവരണം" class="w-full p-3 border rounded-xl outline-none">
            <input type="number" id="wage" placeholder="കൂലി (₹)" class="w-full p-3 border rounded-xl outline-none">
            <input type="number" id="paid" placeholder="നൽകിയത് (₹)" class="w-full p-3 border rounded-xl outline-none">
            <button onclick="saveEntry()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">സേവ് ചെയ്യുക</button>
        </div>

        <!-- വാട്ട്‌സ്ആപ്പ് മെസ്സേജ് ബട്ടൺ -->
        <button onclick="sendWhatsApp()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold mb-6">വാട്ട്‌സ്ആപ്പിൽ കണക്ക് അയക്കുക 📱</button>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const index = urlParams.get('index');
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');
        let s = staff[index];

        // പേരും നമ്പറും കാണിക്കാൻ
        document.getElementById('staffName').innerText = s.name;
        document.getElementById('staffPhone').innerText = "Ph: " + (s.phone || "നമ്പർ ലഭ്യമല്ല");
        document.getElementById('entryDate').valueAsDate = new Date();

        // പേരും നമ്പറും എഡിറ്റ് ചെയ്യാൻ
        function editStaff() {
            let newName = prompt("പുതിയ പേര്:", s.name);
            let newPhone = prompt("പുതിയ ഫോൺ നമ്പർ:", s.phone);
            if (newName !== null && newPhone !== null) {
                s.name = newName;
                s.phone = newPhone;
                localStorage.setItem('staff', JSON.stringify(staff));
                location.reload();
            }
        }

        // ഹാജർ മാർക്ക് ചെയ്യാൻ
        function markAttendance(status) {
            s.entries.push({ date: document.getElementById('entryDate').value, work: "ഹാജർ: " + status, wage: 0, paid: 0 });
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        // കണക്ക് സേവ് ചെയ്യാൻ
        function saveEntry() {
            let entry = {
                date: document.getElementById('entryDate').value,
                work: document.getElementById('work').value,
                wage: document.getElementById('wage').value || 0,
                paid: document.getElementById('paid').value || 0
            };
            s.entries.push(entry);
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        // വാട്ട്‌സ്ആപ്പ് മെസ്സേജ്
        function sendWhatsApp() {
            if(!s.phone) return alert("നമ്പർ ചേർത്തിട്ടില്ല!");
            
            let totalWage = 0, totalPaid = 0, presentDays = 0;
            s.entries.forEach(e => {
                totalWage += parseFloat(e.wage);
                totalPaid += parseFloat(e.paid);
                if(e.work && e.work.includes("ഹാജർ: Present")) presentDays++;
            });

            let msg = `ഹലോ ${s.name}, ഇതുവരെയുള്ള കണക്ക്:
-------------------------
ജോലി ചെയ്ത ദിവസങ്ങൾ: ${presentDays}
ആകെ കൂലി: ₹${totalWage}
നൽകിയത്: ₹${totalPaid}
ഇനി ലഭിക്കാനുള്ളത്: ₹${totalWage - totalPaid}
-------------------------
കണക്ക് പരിശോധിക്കുമല്ലോ.`;
            window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
