<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>സൈറ്റ് മാനേജർ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center">സൈറ്റ് മാനേജർ</h1>
   
<div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-md">
        <p class="text-sm opacity-80">ആകെ വരുമാനം</p>
        <p id="totalWork" class="text-xl font-bold">₹0</p>
    </div>
    <div class="bg-green-600 p-4 rounded-2xl text-white shadow-md">
        <p class="text-sm opacity-80">കയ്യിലുള്ളത്</p>
        <p id="totalBalance" class="text-xl font-bold">₹0</p>
    </div>
</div>

<div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
    <h2 class="text-gray-500 text-sm font-medium">ആകെ ബാധ്യത</h2>
    <div id="totalBalance" class="text-4xl font-extrabold text-slate-900 mt-1">₹0</div>
    
    <!-- വരവും നൽകിയതും താഴെ വരുന്നു -->
    <div class="grid grid-cols-2 gap-4 mt-6">
        <div class="bg-blue-50 p-4 rounded-2xl">
            <div class="text-blue-600 text-xs font-bold">ആകെ വരവ്</div>
            <div id="sumwage" class="text-lg font-bold text-slate-800">₹0</div>
        </div>
        <div class="bg-orange-50 p-4 rounded-2xl">
            <div class="text-orange-600 text-xs font-bold">നൽകിയത്</div>
            <div id="sumPaid" class="text-lg font-bold text-slate-800">₹0</div>
        </div>
    </div>
</div>

        <div class="grid grid-cols-1 gap-3">
            <a href="staff.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">ജീവനക്കാർ</a>
            <a href="rentals.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">വാടക ഉപകരണങ്ങൾ</a>
            <a href="cash.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">സൈറ്റ് കണക്ക്</a>
        </div>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // ... നിങ്ങളുടെ firebaseConfig വിവരങ്ങൾ ഇവിടെ ഉണ്ടാകും ...
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);


    const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.appspot.com",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
};
    async function updateDashboard() {
        try {
            const staffSnapshot = await getDocs(collection(db, "staff_entries"));
            let totalWork = 0;
            let totalGiven = 0;
            
            staffSnapshot.forEach((doc) => {
                let s = doc.data();
                let history = s.history || [];
                totalWork += history.filter(h => h.type === 'work').reduce((sum, h) => sum + (Number(h.amount) || 0), 0);
                totalGiven += history.filter(h => h.type === 'given').reduce((sum, h) => sum + (Number(h.amount) || 0), 0);
            });

            const cashSnapshot = await getDocs(collection(db, "cash_entries"));
            let totalIncome = 0;
            let totalExpense = 0;
            
            cashSnapshot.forEach((doc) => {
                let c = doc.data();
                if(c.type === 'income') totalIncome += Number(c.amount || 0);
                if(c.type === 'expense') totalExpense += Number(c.amount || 0);
            });

            let finalIncome = totalWork + totalIncome; 
            let finalPaid = totalGiven + totalExpense; 
            let balanceInHand = finalIncome - finalPaid;

            document.getElementById('totalWork').innerText = '₹' + finalIncome;
            document.getElementById('sumwage').innerText = '₹' + finalIncome;
            document.getElementById('sumPaid').innerText = '₹' + finalPaid;
            document.getElementById('totalBalance').innerText = '₹' + balanceInHand;
            
        } catch (e) {
            console.error("Dashboard Error:", e);
        }
    }
    updateDashboard();
    // പുതിയ updateDashboard ഫങ്ഷൻ ഇവിടെ അവസാനിക്കുന്നു
</script>

</body>
</html>
