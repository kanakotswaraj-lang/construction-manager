<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-blue-500">
        
        <!-- ഹെഡിങ് -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-900">മേസ്തിരി ആപ്പ്</h1>
            <p class="text-blue-500 font-bold mt-1">ലോഗിൻ / രജിസ്ട്രേഷൻ</p>
        </div>

        <!-- ഫോം ഫീൽഡുകൾ -->
        <div class="space-y-4">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">മേസ്തിരിയുടെ പേര് (Username)</label>
                <input type="text" id="username" placeholder="നിങ്ങളുടെ പേര് നൽകുക" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ഇമെയിൽ വിലാസം</label>
                <input type="email" id="email" placeholder="email@example.com" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            
            <!-- പാസ്‌വേർഡും കണ്ണിന്റെ ചിഹ്നവും -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="പാസ്‌വേർഡ് നൽകുക" 
                           class="w-full p-3 pr-12 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-blue-600 focus:outline-none">
                        <!-- കണ്ണിന്റെ ചിഹ്നം (SVG Icon) -->
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- ബട്ടണുകൾ -->
        <div class="mt-6 space-y-3">
            <button id="btnLogin" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-black text-lg hover:bg-blue-700 transition shadow-lg">
                ലോഗിൻ ചെയ്യുക
            </button>
            
            <button id="btnSignup" class="w-full bg-green-600 text-white p-3.5 rounded-xl font-black text-lg hover:bg-green-700 transition shadow-lg">
                പുതിയ അക്കൗണ്ട് നിർമ്മിക്കുക
            </button>
        </div>

        <!-- പാസ്‌വേർഡ് മറന്നുപോയാൽ -->
        <button id="btnForgot" class="w-full mt-4 text-gray-500 font-bold hover:text-blue-600 underline text-sm">
            പാസ്‌വേർഡ് മറന്നുപോയോ? (ഇമെയിലിലേക്ക് അയക്കാം)
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // പാസ്‌വേർഡ് കാണാനും മറയ്ക്കാനുമുള്ള ഫംഗ്ഷൻ (Eye Toggle)
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        // രജിസ്ട്രേഷൻ (Signup)
        document.getElementById("btnSignup").addEventListener("click", async () => {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !email || !password) {
                return alert("യൂസർനെയിം, ഇമെയിൽ, പാസ്‌വേർഡ് എന്നിവ കൃത്യമായി നൽകുക!");
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", email), {
                    username: username,
                    email: email
                });
                alert("അക്കൗണ്ട് വിജയകരമായി നിർമ്മിച്ചു! ഇനി ലോഗിൻ ചെയ്യാം.");
            } catch (error) {
                alert("രജിസ്ട്രേഷൻ പരാജയപ്പെട്ടു: " + error.message);
            }
        });

        // ലോഗിൻ (Login)
        document.getElementById("btnLogin").addEventListener("click", async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                return alert("ലോഗിൻ ചെയ്യാൻ ഇമെയിലും പാസ്‌വേർഡും നൽകുക!");
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                const docRef = doc(db, "users", email);
                const docSnap = await getDoc(docRef);
                
                let userName = "Meshtri";
                if (docSnap.exists()) {
                    userName = docSnap.data().username;
                }

                localStorage.setItem('userName', userName);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("ലോഗിൻ പരാജയപ്പെട്ടു: ഇമെയിലും പാസ്‌വേർഡും ശരിയാണോ എന്ന് പരിശോധിക്കുക.");
            }
        });

        // പാസ്‌വേർഡ് മറന്നുപോയാൽ (Reset Password)
        document.getElementById("btnForgot").addEventListener("click", async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert("പാസ്‌വേർഡ് മാറ്റാൻ ആദ്യം മുകളിലെ കള്ളിയിൽ നിങ്ങളുടെ ഇമെയിൽ വിലാസം നൽകുക!");

            try {
                await sendPasswordResetEmail(auth, email);
                alert("പാസ്‌വേർഡ് മാറ്റാനുള്ള ലിങ്ക് നിങ്ങളുടെ ഇമെയിലിലേക്ക് അയച്ചിട്ടുണ്ട്!");
            } catch (error) {
                alert("തെറ്റായ ഇമെയിൽ വിലാസം അല്ലെങ്കിൽ ഈ ഇമെയിൽ രജിസ്റ്റർ ചെയ്തിട്ടില്ല!");
            }
        });
    </script>
</body>
</html>
