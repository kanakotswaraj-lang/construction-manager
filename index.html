<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>സെറ്റ് മാനേജർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <h1 class="text-2xl font-bold text-center mb-6">സെറ്റ് മാനേജർ</h1>

    <!-- പ്രധാന ഡാഷ്‌ബോർഡ് കാർഡുകൾ -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-blue-600 p-4 rounded-xl text-white">
            <p class="text-sm opacity-80">ആകെ വരുമാനം</p>
            <p id="totalWork" class="text-xl font-bold">₹0</p>
        </div>
        <div class="bg-green-600 p-4 rounded-xl text-white">
            <p class="text-sm opacity-80">കയ്യിലുള്ളത്</p>
            <p id="totalBalance" class="text-xl font-bold">₹0</p>
        </div>
    </div>

    <!-- ആകെ ബാധ്യത ബോക്സ് -->
    <div class="bg-red-50 p-4 rounded-xl mb-6 border border-red-100">
        <p class="text-sm text-red-600 font-bold">ആകെ ബാധ്യത</p>
        <p id="totalLiability" class="text-2xl font-bold text-red-900">₹0</p>
    </div>

    <!-- ചെറിയ വിവര ബോക്സുകൾ -->
    <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-50 p-4 rounded-xl">
                <p class="text-sm text-gray-600">വാടക വരുമാനം</p>
                <p id="rentalIncome" class="text-lg font-bold text-blue-900">₹0</p>
            </div>
            <div class="bg-orange-50 p-4 rounded-xl">
                <p class="text-sm text-gray-600">ആകെ നൽകിയത്</p>
                <p id="sumPaid" class="text-lg font-bold text-orange-900">₹0</p>
            </div>
        </div>
    </div>

    <!-- മെനുകൾ -->
    <div class="space-y-4">
        <a href="staff.html" class="block bg-white p-4 text-center font-bold rounded-xl shadow-sm border">ജീവനക്കാർ</a>
        <a href="rental.html" class="block bg-white p-4 text-center font-bold rounded-xl shadow-sm border">വാടക ഉപകരണങ്ങൾ</a>
        <a href="cash.html" class="block bg-white p-4 text-center font-bold rounded-xl shadow-sm border">സെറ്റ് കണക്ക്</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.appspot.com",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

    

    async function updateDashboard() {
        try {
            // 1. ജീവനക്കാരുടെ കണക്കുകൾ (പഴയ രീതിയിൽ)
            const staffSnapshot = await getDocs(collection(db, "staff_entries"));
            let totalWork = 0;
            let totalGiven = 0;
            
            staffSnapshot.forEach((doc) => {
                let s = doc.data();
                if (s.history) {
                    s.history.forEach(h => {
                        if (h.type === 'work') totalWork += Number(h.amount || 0);
                        if (h.type === 'given') totalGiven += Number(h.amount || 0);
                    });
                }
            });

            // 2. സൈറ്റ് വരവ്-ചെലവ് കണക്കുകൾ (പഴയ രീതിയിൽ)
            const cashSnapshot = await getDocs(collection(db, "cash_entries"));
            let totalIncome = 0;
            let totalExpense = 0;
            
            cashSnapshot.forEach((doc) => {
                let c = doc.data();
                if (c.type === 'income') totalIncome += Number(c.amount || 0);
                if (c.type === 'expense') totalExpense += Number(c.amount || 0);
            });

            // 3. ഫൈനൽ കണക്കുകൂട്ടൽ (പഴയ രീതി)
            let finalIncome = totalWork + totalIncome; 
            let finalPaid = totalGiven + totalExpense; 
            let balanceInHand = finalIncome - finalPaid;

            // 4. ഡിസ്‌പ്ലേ അപ്‌ഡേറ്റ് ചെയ്യുക
            document.getElementById('totalWork').innerText = '₹' + finalIncome;
            document.getElementById('totalBalance').innerText = '₹' + balanceInHand;
            document.getElementById('totalLiability').innerText = '₹' + finalPaid; // ബാധ്യത
            document.getElementById('rentalIncome').innerText = '₹' + totalIncome; // വാടക വരവ്
            document.getElementById('sumPaid').innerText = '₹' + finalExpense; // ആകെ നൽകിയത്

        } catch (e) {
            console.error("Dashboard Error:", e);
        }
    }

    updateDashboard();
</script>

</body>
</html>
