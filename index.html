<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ലോഗിൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-blue-500">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-900">മേസ്തിരി ആപ്പ്</h1>
            <p class="text-blue-500 font-bold mt-2">സൈറ്റ് മാനേജർ ഡിജിറ്റൽ ഡയറി</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">ഇമെയിൽ വിലാസം</label>
                <input type="email" id="email" placeholder="email@example.com" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <input type="password" id="password" placeholder="പാസ്‌വേർഡ്" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
        </div>

        <button id="btnLogin" class="w-full mt-6 bg-blue-600 text-white p-4 rounded-xl font-black text-xl hover:bg-blue-700 transition shadow-lg">
            ലോഗിൻ ചെയ്യുക
        </button>

        <button id="btnForgot" class="w-full mt-4 text-gray-500 font-bold hover:text-blue-600 underline text-sm">
            പാസ്‌വേർഡ് മറന്നുപോയോ?
        </button>

        <p class="text-center mt-6 text-gray-600 font-bold">
            പുതിയ അക്കൗണ്ട് വേണോ? <a href="signup.html" class="text-blue-600">രജിസ്റ്റർ ചെയ്യുക</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ലോഗിൻ കോഡ്
        document.getElementById("btnLogin").addEventListener("click", async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return alert("വിവരങ്ങൾ നൽകുക!");
            
            try {
                // ഫയർബേസ് ഓതന്റിക്കേഷൻ വഴി ലോഗിൻ ചെയ്യുന്നു
                await signInWithEmailAndPassword(auth, email, pass);

                // ഡാറ്റാബേസിൽ നിന്ന് ഈ ഇമെയിലിന് താഴെയുള്ള യൂസറുടെ പേര് കണ്ടുപിടിക്കുന്നു
                const q = query(collection(db, "users"), where("email", "==", email));
                const querySnapshot = await getDocs(q);
                
                let userName = "Meshtri";
                querySnapshot.forEach((doc) => {
                    userName = doc.data().username;
                });

                // ഡാഷ്‌ബോർഡിനായി പേര് സേവ് ചെയ്യുന്നു
                localStorage.setItem('userName', userName); 
                window.location.href = "dashboard.html";

            } catch (error) {
                alert("ലോഗിൻ പരാജയപ്പെട്ടു: ഇമെയിലും പാസ്‌വേർഡും പരിശോധിക്കുക!");
            }
        });

        // പാസ്‌വേർഡ് മറന്നുപോയാൽ റീസെറ്റ് ചെയ്യാൻ
        document.getElementById("btnForgot").addEventListener("click", async () => {
            const email = document.getElementById('email').value.trim();
            if(!email) return alert("ആദ്യം മുകളിലെ ബോക്സിൽ നിങ്ങളുടെ ഇമെയിൽ വിലാസം നൽകുക!");

            try {
                await sendPasswordResetEmail(auth, email);
                alert("പാസ്‌വേർഡ് മാറ്റാനുള്ള ലിങ്ക് നിങ്ങളുടെ ഇമെയിലിലേക്ക് അയച്ചിട്ടുണ്ട്. മെയിൽ പരിശോധിക്കുക!");
            } catch (error) {
                alert("തെറ്റായ ഇമെയിൽ വിലാസം അല്ലെങ്കിൽ ഈ ഇമെയിൽ രജിസ്റ്റർ ചെയ്തിട്ടില്ല!");
            }
        });
    </script>
</body>
</html>
