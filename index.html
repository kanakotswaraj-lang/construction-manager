<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>സൈറ്റ് മാനേജർ</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center">സൈറ്റ് മാനേജർ</h1>
   
<div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
    <h2 class="text-gray-500 text-sm font-medium">ആകെ ബാധ്യത</h2>
    <div id="totalBalance" class="text-4xl font-extrabold text-slate-900 mt-1">₹0</div>
    
    <!-- വരവും നൽകിയതും താഴെ വരുന്നു -->
    <div class="grid grid-cols-2 gap-4 mt-6">
        <div class="bg-blue-50 p-4 rounded-2xl">
            <div class="text-blue-600 text-xs font-bold">ആകെ വരവ്</div>
            <div id="sumwage" class="text-lg font-bold text-slate-800">₹0</div>
        </div>
        <div class="bg-orange-50 p-4 rounded-2xl">
            <div class="text-orange-600 text-xs font-bold">നൽകിയത്</div>
            <div id="sumPaid" class="text-lg font-bold text-slate-800">₹0</div>
        </div>
    </div>
</div>

        <div class="grid grid-cols-1 gap-3">
            <a href="staff.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">ജീവനക്കാർ</a>
            <a href="rentals.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">വാടക ഉപകരണങ്ങൾ</a>
            <a href="cash.html" class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-center">സൈറ്റ് കണക്ക്</a>
        </div>
    </div>
    <script>
     import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

// Initialize ചെയ്യുക
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);   
        const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.appspot.com",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
    };
        function updateDashboard() {
            try {
                let staffList = JSON.parse(localStorage.getItem('staff') || '[]');
                let tools = JSON.parse(localStorage.getItem('tools') || '[]'); // വാടക ഉപകരണങ്ങൾ
                let cashList = JSON.parse(localStorage.getItem('cash') || '[]');
                
                let totalWage = 0, totalPaid = 0, totalRent = 0;

                // ജീവനക്കാരുടെ കണക്ക്
                staffList.forEach(s => {
                    s.history?.forEach(e => {
                        if(e.type === 'work') totalWage += parseFloat(e.amount || 0); // 'taken' എന്നതിന് പകരം 'work'
                        if(e.type === 'given') totalPaid += parseFloat(e.amount || 0);
                    });
                });

                // വാടക ഉപകരണങ്ങളുടെ വാടക കണക്കാക്കുന്നു
                tools.forEach(t => {
                    let days = t.returnDate ? 
                        Math.max(1, Math.ceil((new Date(t.returnDate) - new Date(t.startDate)) / (1000 * 60 * 60 * 24))) :
                        Math.max(1, Math.ceil((new Date() - new Date(t.startDate)) / (1000 * 60 * 60 * 24)));
                    let total = (t.qty * t.rate * days);
                    totalRent += total; // മൊത്തം വാടക കൂട്ടുന്നു
                    totalPaid += (t.paid || 0); // നൽകിയ അഡ്വാൻസ് പേയ്മെന്റുകൾ
                });

                // സൈറ്റ് കണക്ക്
                cashList.forEach(c => {
                    if(c.type === 'income') totalWage += parseFloat(c.amount || 0);
                    if(c.type === 'expense') totalPaid += parseFloat(c.amount || 0);
                });

                // മൊത്തം ബാധ്യത (വരവ് - (നൽകിയത് + വാടക))
                let finalBalance = totalWage - totalPaid - totalRent;

                document.getElementById('sumwage').innerText = '₹' + totalWage;
                document.getElementById('sumPaid').innerText = '₹' + (totalPaid + totalRent); // നൽകിയത് + വാടക
                document.getElementById('totalBalance').innerText = '₹' + finalBalance;
            } catch (e) {
                console.error("Data error:", e);
            }
        }
        updateDashboard();
    </script>

</body>
</html>
