<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>സൈറ്റ് കണക്ക്</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">സൈറ്റ് കണക്ക്</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="siteName" placeholder="സൈറ്റിന്റെ പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="desc" placeholder="വിശദാംശങ്ങൾ" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 border rounded-xl mb-3">
            <div class="flex gap-2">
                <button onclick="addCash('income')" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold">വരവ്</button>
                <button onclick="addCash('expense')" class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold">ചെലവ്</button>
            </div>
        </div>

        <div id="cashList" class="space-y-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ഡാറ്റ സേവ് ചെയ്യാൻ
        window.addCash = async (type) => {
            let siteName = document.getElementById('siteName').value;
            let desc = document.getElementById('desc').value;
            let amount = parseInt(document.getElementById('amount').value);
            
            if(!siteName || !desc || !amount) return alert("എല്ലാ വിവരങ്ങളും നൽകുക!");
            
            await addDoc(collection(db, "cash_entries"), { siteName, desc, amount, type, date: new Date().toLocaleDateString() });
            location.reload();
        };

        // ഡാറ്റ ഡിലീറ്റ് ചെയ്യാൻ
        window.deleteCashEntry = async (id) => {
            if(confirm("ഈ കണക്ക് ഡിലീറ്റ് ചെയ്യണോ?")) {
                await deleteDoc(doc(db, "cash_entries", id));
                location.reload();
            }
        };

        // വാട്‌സാപ്പ് മെസ്സേജ്
        window.sendWhatsApp = (amount, desc) => {
            let msg = `നമസ്കാരം, സൈറ്റ് കണക്ക് പ്രകാരം ${desc} ഇനത്തിൽ ₹${amount} ലഭിച്ചിട്ടുണ്ട്.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // ലിസ്റ്റ് ലോഡ് ചെയ്യാൻ
        async function loadCash() {
            const querySnapshot = await getDocs(collection(db, "cash_entries"));
            let html = "";
            querySnapshot.forEach((doc) => {
                let c = doc.data();
                html += `
                    <div class="bg-white p-4 rounded-xl border flex justify-between items-center mb-2">
                        <div>
                            <p class="font-bold text-blue-600">${c.siteName}</p>
                            <p>${c.desc}</p>
                            <p class="text-xs text-gray-400">${c.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${c.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                                ${c.type === 'income' ? '+' : '-'} ₹${c.amount}
                            </p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="deleteCashEntry('${doc.id}')" class="text-red-500 text-xs font-bold">ഡിലീറ്റ്</button>
                                ${c.type === 'income' ? `<button onclick="sendWhatsApp(${c.amount}, '${c.desc}')" class="text-blue-500 text-xs font-bold">WhatsApp</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cashList').innerHTML = html;
        }
        
        loadCash();
    </script>
</body>
</html>
