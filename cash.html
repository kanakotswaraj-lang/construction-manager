<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>സൈറ്റ് കണക്ക്</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">സൈറ്റ് കണക്ക്</h1>
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="desc" placeholder="വിശദാംശങ്ങൾ" class="w-full p-3 border rounded-xl mb-2">
            <input type="number" id="amount" placeholder="തുക" class="w-full p-3 border rounded-xl mb-3">
            <div class="flex gap-2">
                <button onclick="addCash('income')" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold">വരവ്</button>
                <button onclick="addCash('expense')" class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold">ചെലവ്</button>
            </div>
        </div>
        <div id="cashList" class="space-y-2"></div>
    </div><div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
    <input type="text" id="desc" placeholder="വിശദാംശങ്ങൾ" class="w-full p-4 border rounded-xl mb-3">
    <input type="number" id="amount" placeholder="തുക" class="w-full p-4 border rounded-xl mb-4">
    <div class="grid grid-cols-2 gap-3">
        <button onclick="addCash('income')" class="bg-green-600 text-white p-4 rounded-xl font-bold">വരവ്</button>
        <button onclick="addCash('expense')" class="bg-red-600 text-white p-4 rounded-xl font-bold">ചെലവ്</button>
    </div>
</div>
    <script>
        let cashList = JSON.parse(localStorage.getItem('cash') || '[]');
        function addCash(type) {
            let desc = document.getElementById('desc').value;
            let amount = document.getElementById('amount').value;
            if(!desc || !amount) return;
            cashList.push({desc, amount: parseInt(amount), type, date: new Date().toLocaleDateString()});
            localStorage.setItem('cash', JSON.stringify(cashList));
            location.reload();
        }
        document.getElementById('cashList').innerHTML = cashList.map((c, i) => `
            <div class="bg-white p-3 rounded-xl flex justify-between">
                <span>${c.desc} (${c.date})</span>
                <span class="font-bold ${c.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                    ${c.type === 'income' ? '+' : '-'} ₹${c.amount}
                </span>
            </div>
        `).join('');
    </script>
</body>
</html>
