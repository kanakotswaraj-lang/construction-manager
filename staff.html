<!DOCTYPE html>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">ร ยดยคร ยตล ร ยดยดร ยดยฟร ยดยฒร ยดยพร ยดยณร ยดยฟร ยดโขร ยตยพ</h1>
        
        <!-- Add Staff -->
        <div class="bg-white p-4 rounded-xl shadow border mb-4">
            <input type="text" id="staffName" placeholder="ร ยดยชร ยตโกร ยดยฐร ยตย" class="w-full p-2 border rounded mb-2">
            <input type="tel" id="staffPhone" placeholder="ร ยดยซร ยตโนร ยตยบ ร ยดยจร ยดยฎร ยตยร ยดยชร ยตยผ" class="w-full p-2 border rounded mb-2">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-2 rounded font-bold">ร ยดโ ร ยดยกร ยตย ร ยดลกร ยตโ ร ยดยฏร ยตยร ยดยฏร ยตยร ยดโข</button>
        </div>

        <!-- Export/Import -->
        <div class="flex gap-2 mb-4">
            <button onclick="exportData()" class="flex-1 bg-blue-600 text-white p-2 rounded text-sm">ร ยดยฌร ยดยพร ยดโขร ยตยร ยดโขร ยดยชร ยตยร ยดยชร ยตย (Export)</button>
            <label class="flex-1 bg-emerald-600 text-white p-2 rounded text-sm text-center cursor-pointer">
                ร ยดยคร ยดยฟร ยดยฐร ยดยฟร ยดลกร ยตยร ยดลกร ยตโ ร ยดลธร ยตยร ยดโขร ยตยร ยดโขร ยตยร ยดโข (Import)
                <input type="file" id="importFile" onchange="importData(event)" class="hidden">
            </label>
        </div>

        <!-- Staff List -->
        <div id="staffList" class="space-y-2"></div>
    </div>

    <script>
        function addStaff() {
            let name = document.getElementById('staffName').value;
            let phone = document.getElementById('staffPhone').value;
            if(!name) return alert("ร ยดยชร ยตโกร ยดยฐร ยตย ร ยดยจร ยตยฝร ยดโขร ยตยร ยดโข");
            
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            staff.push({ name: name, phone: phone, entries: [] });
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function displayStaff() {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            let list = document.getElementById('staffList');
            staff.forEach((s, index) => {
                list.innerHTML += `<div class="bg-white p-4 rounded-xl border flex justify-between items-center">
                    <span>${s.name}</span>
                    <a href="staff-details.html?index=${index}" class="bg-slate-200 px-4 py-1 rounded">ร ยดโขร ยดยฃร ยดโขร ยตยร ยดโขร ยตย</a>
                </div>`;
            });
        }

        function exportData() {
            let data = localStorage.getItem('staff');
            if(!data) return alert("ร ยดยกร ยดยพร ยดยฑร ยตยร ยดยฑ ร ยดโกร ยดยฒร ยตยร ยดยฒ!");
            let a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = 'backup.json';
            a.click();
        }

        function importData(event) {
            let reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('staff', e.target.result);
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }

        displayStaff();
    </script>
</body>
</html>
