<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-emerald-800 mb-6">നിർമ്മാണ മാനേജർ</h1>
        
        <!-- ഇൻപുട്ട് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="text" id="siteName" placeholder="സൈറ്റ്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="number" id="dailyWage" placeholder="കൂലി" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="tel" id="phoneNumber" placeholder="WhatsApp നമ്പർ (91...)" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <button id="saveStaffBtn" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black">സേവ് ചെയ്യുക</button>
        </div>

        <div id="staffList" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

         const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.appspot.com",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // സേവ് ഫങ്ഷൻ
        document.getElementById('saveStaffBtn').addEventListener('click', async () => {
            await addDoc(collection(db, "staffs"), {
                name: document.getElementById('staffName').value,
                site: document.getElementById('siteName').value,
                wage: document.getElementById('dailyWage').value,
                phone: document.getElementById('phoneNumber').value
            });
            alert("സേവ് ആയി!");
        });

        // ഗ്ലോബൽ ഫങ്ഷനുകൾ (ബട്ടണുകൾ വർക്ക് ചെയ്യാൻ)
        window.deleteStaff = async (id) => await deleteDoc(doc(db, 'staffs', id));
        window.editStaff = (id, name) => {
            const newName = prompt("പുതിയ പേര് നൽകുക:", name);
            if (newName) updateDoc(doc(db, 'staffs', id), { name: newName });
        };
        window.viewHistory = (name) => alert(name + "-ന്റെ ഹിസ്റ്ററി ഉടൻ വരുന്നു!");

        // ലിസ്റ്റ് ചെയ്യൽ
        onSnapshot(collection(db, "staffs"), (snapshot) => {
            const list = document.getElementById('staffList');
            list.innerHTML = '';
            snapshot.forEach((d) => {
                const s = d.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <div class="flex justify-between">
                            <div><h3 class="font-bold">${s.name}</h3><p class="text-xs text-slate-500">${s.site} | ₹${s.wage}</p></div>
                            <button onclick="deleteStaff('${d.id}')" class="text-red-500 text-xs font-bold">Delete</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <button onclick="editStaff('${d.id}', '${s.name}')" class="bg-gray-100 p-2 rounded-lg text-xs font-bold">Edit</button>
                            <button onclick="viewHistory('${s.name}')" class="bg-gray-100 p-2 rounded-lg text-xs font-bold">History</button>
                            <a href="https://wa.me/${s.phone}" class="bg-green-100 text-green-700 p-2 text-center rounded-lg text-xs font-bold">WhatsApp</a>
                            <button class="bg-blue-100 text-blue-700 p-2 rounded-lg text-xs font-bold">Payment</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
