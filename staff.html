<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }
    </style>
    <title>ജീവനക്കാർ - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-sky-600">ജീവനക്കാർ</h1>
            <a href="dashboard.html" class="font-bold bg-slate-100 px-4 py-2 rounded-xl text-sm">← മെയിൻ</a>
        </div>

        <!-- ജീവനക്കാരെ ചേർക്കുന്ന ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <input type="file" id="staffPhoto" class="hidden" accept="image/*">
            <label for="staffPhoto" class="block w-20 h-20 bg-slate-50 rounded-full mb-6 mx-auto flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200">
                <span class="text-[10px] text-slate-400 font-bold">ഫോട്ടോ</span>
            </label>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase px-2">പേര്</label>
                    <input type="text" id="staffName" placeholder="പേര് ടൈപ്പ് ചെയ്യുക" class="w-full p-4 mt-1 bg-slate-50 rounded-2xl font-bold border">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase px-2">ദിവസക്കൂലി</label>
                        <input type="number" id="staffWage" placeholder="₹" class="w-full p-4 mt-1 bg-slate-50 rounded-2xl font-bold border">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase px-2">ഫോൺ നമ്പർ</label>
                        <input type="tel" id="staffPhone" placeholder="നമ്പർ" class="w-full p-4 mt-1 bg-slate-50 rounded-2xl font-bold border">
                    </div>
                </div>
                <button class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-black">ജീവനക്കാരനെ ചേർക്കുക</button>
            </div>
        </div>

        <!-- ജീവനക്കാരുടെ ലിസ്റ്റ് (ആധുനിക കാർഡ് ഡിസൈൻ) -->
        <div id="staffList" class="space-y-4">
            <!-- രാഘവന്റെ ഉദാഹരണം -->
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black">ര</div>
                    <div class="flex-grow">
                        <h3 class="text-lg font-black text-slate-800">രാഘവൻ</h3>
                        <p class="text-xs font-bold text-slate-400">ഫോൺ: 9876543210</p>
                        <span class="inline-block bg-emerald-50 text-emerald-700 px-2 py-1 rounded-lg text-[10px] font-black mt-1">₹ 1200 / ദിവസം</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-5 border-t pt-4">
                    <button class="flex-1 bg-blue-50 text-blue-600 py-2 rounded-xl text-[10px] font-black">എഡിറ്റ്</button>
                    <button class="flex-1 bg-orange-50 text-orange-600 py-2 rounded-xl text-[10px] font-black">ഹിസ്റ്ററി</button>
                    <button class="flex-1 bg-red-50 text-red-600 py-2 rounded-xl text-[10px] font-black">ഡിലീറ്റ്</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
