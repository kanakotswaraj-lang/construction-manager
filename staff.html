<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">ജീവനക്കാർ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="name" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="phone" placeholder="ഫോൺ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="staffList" class="space-y-4"></div>
    </div>

    <script>
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');

        function addStaff() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            if(!name || !phone) return alert("വിവരങ്ങൾ നൽകുക!");
            staff.push({name, phone, history: []});
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function addEntry(i, type) {
            let amount = prompt("തുക നൽകുക:");
            if(!amount) return;
            staff[i].history.push({type, amount: parseInt(amount), date: new Date().toLocaleDateString()});
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function showDetails(i) {
            let s = staff[i];
            let details = s.history.map(h => `${h.date}: ${h.type === 'taken' ? 'കൂലി വാങ്ങി' : 'നൽകിയത്'} ₹${h.amount}`).join('\n');
            alert(`പേര്: ${s.name}\nനമ്പർ: ${s.phone}\n\nചരിത്രം:\n${details || 'വിവരങ്ങളില്ല'}`);
        }

        function deleteStaff(i) {
            if(confirm('നീക്കം ചെയ്യണോ?')) {
                staff.splice(i, 1);
                localStorage.setItem('staff', JSON.stringify(staff));
                location.reload();
            }
        }
  function getBalance(history) {
        let taken = history.filter(h => h.type === 'taken').reduce((sum, h) => sum + h.amount, 0);
        let given = history.filter(h => h.type === 'given').reduce((sum, h) => sum + h.amount, 0);
        return given - taken; // ബാലൻസ് കണക്കാക്കുന്നു
    }

    // ലിസ്റ്റ് കാണിക്കുന്ന ഭാഗം ഇങ്ങനെ മാറ്റുക:
    document.getElementById('staffList').innerHTML = staff.map((s, i) => {
        let balance = getBalance(s.history);
        return `
            <div class="bg-white p-4 rounded-xl border">
                <div onclick="showDetails(${i})" class="cursor-pointer">
                    <p class="font-bold text-lg">${s.name}</p>
                    <p class="text-gray-500 text-sm">${s.phone}</p>
                    <p class="text-sm font-bold mt-1 ${balance >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ബാലൻസ്: ₹${balance}
                    </p>
                </div>
                <div class="flex gap-2 mt-3">
                    <button onclick="addEntry(${i}, 'taken')" class="bg-blue-100 p-2 rounded text-xs font-bold">കൂലി (വാങ്ങി)</button>
                    <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs font-bold">നൽകിയത്</button>
                    <button onclick="deleteStaff(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                </div>
            </div>
        `;
    }).join('');
</script>

                <div onclick="showDetails(${i})" class="cursor-pointer">
                    <p class="font-bold text-lg">${s.name}</p>
                    <p class="text-gray-500 text-sm">${s.phone}</p>
                </div>
                <div class="flex gap-2 mt-3">
                    <button onclick="addEntry(${i}, 'taken')" class="bg-blue-100 p-2 rounded text-xs font-bold">കൂലി (വാങ്ങി)</button>
                    <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs font-bold">നൽകിയത്</button>
                    <button onclick="deleteStaff(${i})" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
