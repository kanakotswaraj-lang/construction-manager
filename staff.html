<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>നിർമ്മാണ മാനേജർ - ജീവനക്കാരുടെ ശമ്പളം</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-slate-100 font-sans">
    <div class="max-w-md mx-auto">
        
        <!-- ഹെഡർ: ലോഗിൻ ചെയ്ത മേസ്തിരിയുടെ പേര് കാണിക്കാൻ -->
        <div class="bg-slate-900 p-4 rounded-2xl text-white mb-6 flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-xl font-black">ജീവനക്കാരുടെ ശമ്പളം</h1>
                <p id="loggedInMeshtri" class="text-xs text-blue-400 font-bold mt-1">മേസ്തിരി: ലോഡിങ്...</p>
            </div>
            <a href="dashboard.html" class="bg-slate-800 text-xs px-3 py-2 rounded-xl text-slate-300 font-bold hover:bg-slate-700">ഡാഷ്‌ബോർഡ്</a>
        </div>
        
        <!-- ഇൻപുട്ട് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <h2 class="font-bold text-slate-700 mb-3 text-sm">പുതിയ തൊഴിലാളിയെ ചേർക്കുക</h2>
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2 text-sm font-bold">
            <input type="text" id="siteName" placeholder="പ്രധാന സൈറ്റ്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2 text-sm font-bold">
            <input type="number" id="dailyWage" placeholder="ഒരു ദിവസത്തെ കൂലി (₹)" class="w-full p-3 bg-slate-50 rounded-xl border mb-2 text-sm font-bold">
            <input type="tel" id="phoneNumber" placeholder="WhatsApp നമ്പർ (91...)" class="w-full p-3 bg-slate-50 rounded-xl border mb-2 text-sm font-bold">
            <input type="text" id="jobType" placeholder="ജോലി (ഉദാ: മേസ്തിരി / പണിക്കാരൻ)" class="w-full p-3 bg-slate-50 rounded-xl border mb-2 text-sm font-bold">
            <input type="text" id="bankDetails" placeholder="ബാങ്ക് / GPay നമ്പർ" class="w-full p-3 bg-slate-50 rounded-xl border mb-3 text-sm font-bold">
            <button id="saveStaffBtn" class="w-full bg-emerald-700 text-white p-3.5 rounded-xl font-black shadow-md text-sm">വിവരങ്ങൾ സേവ് ചെയ്യുക</button>
        </div>

        <!-- സെർച്ച് ബാർ -->
        <input type="text" id="searchInput" placeholder="പേര് സെർച്ച് ചെയ്യുക..." class="w-full p-3 bg-white rounded-xl border mb-4 shadow-sm text-sm font-bold">

        <div id="staffList" class="space-y-4 pb-12"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ലോഗിൻ ചെയ്ത മേസ്തിരിയുടെ പേര് എടുക്കുന്നു
        const currentMeshtri = localStorage.getItem('userName') || "പൊതുമേസ്തിരി";
        document.getElementById('loggedInMeshtri').innerText = "സ്വാഗതം, " + currentMeshtri;

        // സേവ് സ്റ്റാഫ്
        document.getElementById('saveStaffBtn').addEventListener('click', async () => {
            const name = document.getElementById('staffName').value;
            if (!name) return alert("പേര് നൽകുക!");
            
            await addDoc(collection(db, "staffs"), {
                meshtriOwner: currentMeshtri,
                name: name,
                site: document.getElementById('siteName').value,
                wage: parseFloat(document.getElementById('dailyWage').value) || 0,
                phone: document.getElementById('phoneNumber').value,
                job: document.getElementById('jobType').value,
                bank: document.getElementById('bankDetails').value,
                workedDays: 0,
                advance: 0
            });
            alert("വിവരങ്ങൾ സേവ് ആയി!");
            
            document.getElementById('staffName').value = '';
            document.getElementById('siteName').value = '';
            document.getElementById('dailyWage').value = '';
            document.getElementById('phoneNumber').value = '';
            document.getElementById('jobType').value = '';
            document.getElementById('bankDetails').value = '';
        });

        // സെർച്ച് ഫംഗ്ഷൻ
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#staffList > div').forEach(div => {
                div.style.display = div.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        });

        // ലിസ്റ്റ് അപ്‌ഡേറ്റ്
        onSnapshot(collection(db, "staffs"), (snapshot) => {
            const list = document.getElementById('staffList');
            list.innerHTML = '';
            
            snapshot.forEach((d) => {
                const s = d.data();
                
                if (s.meshtriOwner === currentMeshtri) {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl border shadow-sm";
                    const cleanPhone = s.phone ? s.phone.replace(/\D/g, '') : '';
                    
                    const workedDays = parseFloat(s.workedDays) || 0;
                    const dailyWage = parseFloat(s.wage) || 0;
                    const totalEarned = workedDays * dailyWage;
                    const advance = parseFloat(s.advance) || 0;
                    const balanceDue = totalEarned - advance;

                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-3">
                            <div>
                                <h3 class="font-black text-base text-slate-800">${s.name} <span class="text-xs font-normal text-slate-500">(${s.job || 'പണിക്കാരൻ'})</span></h3>
                                <p class="text-xs text-slate-500 font-bold">സൈറ്റ്: ${s.site || 'പ്രധാന സൈറ്റ്'} | കൂലി: ₹${dailyWage}/ദിവസം</p>
                            </div>
                            <button id="del-${d.id}" class="text-red-500 text-xs font-bold px-2 py-1 bg-red-50 rounded">Delete</button>
                        </div>

                        <div class="p-3 bg-slate-50 rounded-xl mb-3 space-y-2 border border-slate-100">
                            <!-- സൈറ്റ് തിരഞ്ഞെടുക്കാൻ -->
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 block">ഇന്നത്തെ സൈറ്റ്</label>
                                <input type="text" id="workSite-${d.id}" value="${s.site || ''}" placeholder="സൈറ്റിന്റെ പേര് എഴുതുക" class="w-full p-2 border rounded text-sm font-bold bg-white mb-2">
                            </div>

                            <!-- പണിയുടെ അളവ് (ഫുൾ ഡേ / ഹാഫ് ഡേ / ഓവർടൈം) -->
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-500 block">പണിയുടെ അളവ്</label>
                                    <select id="workDayType-${d.id}" class="w-full p-2 border rounded text-sm font-bold bg-white">
                                        <option value="1">ഫുൾ ഡേ (1)</option>
                                        <option value="0.5">ഹാഫ് ഡേ (0.5)</option>
                                        <option value="1.5">ഓവർടൈം (1.5)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-500 block">വാങ്ങിയ അഡ്വാൻസ് (₹)</label>
                                    <input type="number" id="adv-${d.id}" value="${s.advance || 0}" class="w-full p-2 border rounded text-sm font-bold bg-white">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-bold text-slate-500 block">ആകെ പണിയെടുത്ത ദിവസം</label>
                                <input type="number" id="days-${d.id}" value="${s.workedDays || 0}" class="w-full p-2 border rounded text-sm font-bold bg-white">
                            </div>
                            
                            <div class="text-xs font-bold text-slate-700 pt-1 flex justify-between bg-blue-50 p-2 rounded-lg">
                                <span>ആകെ കൂലി: ₹${totalEarned}</span>
                                <span class="text-emerald-700 font-black">ബാക്കി കൊടുക്കാനുള്ളത്: ₹${balanceDue}</span>
                            </div>

                            <button id="save-${d.id}" class="w-full bg-slate-900 text-white mt-1 p-2.5 rounded-xl text-xs font-bold shadow-sm">ഹാജറും കണക്കുകളും സേവ് ചെയ്യുക</button>
                        </div>

                        <div class="flex gap-2">
                            <button id="edit-${d.id}" class="flex-1 bg-amber-100 p-2.5 rounded-xl text-xs font-bold text-amber-800">Edit Name/Wage</button>
                            <a href="https://wa.me/${cleanPhone}?text=നമസ്കാരം ${s.name},%0Aഈ ആഴ്ചത്തെ കണക്ക്:%0A- ആകെ പണിയെടുത്ത ദിവസങ്ങൾ: ${workedDays}%0A- ആകെ കൂലി: ₹${totalEarned}%0A- അഡ്വാൻസ്: ₹${advance}%0A- ഇനി കിട്ടാനുള്ള ബാക്കി തുക: ₹${balanceDue}" target="_blank" class="flex-1 bg-emerald-600 text-white p-2.5 text-center rounded-xl text-xs font-black shadow-sm">WhatsApp കണക്ക് അയക്കുക</a>
                        </div>
                    `;
                    list.appendChild(div);

                    // കണക്കുകൾ അപ്ഡേറ്റ് ചെയ്യാനും വരവ്-ചെലവ് പേജിലേക്ക് അയക്കാനുമുള്ള കോഡ്
                    document.getElementById(`save-${d.id}`).onclick = async () => {
                        const selectedDays = parseFloat(document.getElementById(`workDayType-${d.id}`).value) || 1;
                        const selectedSite = document.getElementById(`workSite-${d.id}`).value || "പ്രധാന സൈറ്റ്";
                        const currentTotalDays = parseFloat(document.getElementById(`days-${d.id}`).value) || 0;
                        
                        // പുതിയ ദിവസങ്ങൾ പഴയതിന്റെ കൂടെ കൂട്ടുന്നു
                        const newTotalDays = currentTotalDays; // അല്ലെങ്കിൽ നിലവിലെ ഇൻപുട്ട് ബോക്സിലുള്ള വാല്യൂ എടുക്കാം
                        const advance = parseFloat(document.getElementById(`adv-${d.id}`).value) || 0;
                        const earnedForThisEntry = selectedDays * dailyWage;

                        // 1. സ്റ്റാഫ് ഡാറ്റാബേസ് അപ്ഡേറ്റ് ചെയ്യുന്നു (ഇവിടെ ആകെ ദിവസങ്ങൾ മാനുവലായി മാറ്റിയതുകൂടി സേവ് ആകും)
                        const finalUpdatedDays = parseFloat(document.getElementById(`days-${d.id}`).value) || 0;
                        
                        await updateDoc(doc(db, 'staffs', d.id), {
                            workedDays: finalUpdatedDays,
                            advance: advance,
                            site: selectedSite
                        });

                        // 2. വരവ്-ചെലവ് (accounts) പേജിലേക്ക് ആ കൂലി തുക ചേർക്കുന്നു
                        await addDoc(collection(db, "accounts"), {
                            meshtriOwner: currentMeshtri,
                            name: s.name + " (കൂലി - " + selectedDays + " ദിവസം)",
                            site: selectedSite,
                            type: "wage",
                            payment: "cash",
                            amount: earnedForThisEntry,
                            date: new Date().toISOString().split('T')[0]
                        });

                        alert("കണക്കുകൾ വിജയകരമായി അപ്‌ഡേറ്റ് ചെയ്യുകയും വരവ്-ചെലവിലേക്ക് ചേർക്കുകയും ചെയ്തു!");
                    };

                    // ഡിലീറ്റ് ചെയ്യാനുള്ള കോഡ്
                    document.getElementById(`del-${d.id}`).onclick = () => {
                        if(confirm("ഡിലീറ്റ് ചെയ്യണമെന്ന് ഉറപ്പാണോ?")) {
                            deleteDoc(doc(db, 'staffs', d.id));
                        }
                    };
                    
                    // എഡിറ്റ് ചെയ്യാനുള്ള കോഡ്
                    document.getElementById(`edit-${d.id}`).onclick = () => {
                        const newName = prompt("പേര് മാറ്റുക:", s.name);
                        if(newName === null) return;
                        const newWage = prompt("പുതിയ കൂലി:", s.wage);
                        if(newWage === null) return;
                        updateDoc(doc(db, 'staffs', d.id), { name: newName, wage: parseFloat(newWage) || 0 });
                    };
                }
            });
        });
    </script>
</body>
</html>
