<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <h1 class="text-2xl font-black text-emerald-600 mb-4">ജീവനക്കാർ</h1>
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="text" id="siteName" placeholder="സൈറ്റ്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="number" id="dailyWage" placeholder="കൂലി" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="tel" id="phoneNumber" placeholder="ഫോൺ" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <button id="saveStaffBtn" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black">സേവ് ചെയ്യുക</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ഇവിടെ മേസ്തിരിയുടെ ശരിയായ Firebase Config ചേർക്കുക
        const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.appspot.com",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveStaffBtn').addEventListener('click', async () => {
            const name = document.getElementById('staffName').value;
            const site = document.getElementById('siteName').value;
            const wage = document.getElementById('dailyWage').value;
            const phone = document.getElementById('phoneNumber').value;

            try {
                await addDoc(collection(db, "staffs"), { name, site, wage, phone });
                alert("സേവ് ആയി!");
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("സേവ് ആയില്ല, കോൺസോൾ നോക്കുക!");
            }
        });
    </script>
</body>
</html>
