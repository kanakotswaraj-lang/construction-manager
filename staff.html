<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <a href="index.html" class="text-sm text-slate-600 mb-2 inline-block">← ഡാഷ്‌ബോർഡ്</a>
        <h1 class="text-2xl font-bold mb-6">ജീവനക്കാർ</h1>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="name" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="text" id="phone" placeholder="ഫോൺ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addStaff()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div class="mb-4">
            <input type="text" id="search" placeholder="പേര് തിരയുക..." onkeyup="filterStaff()" class="w-full p-3 border rounded-xl shadow-sm">
        </div>

        <div id="staffList" class="space-y-4">Loading...</div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
            measurementId: "G-J9Y5TW9D7T"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let staff = [];

        // ഫയർബേസിൽ നിന്ന് ഡാറ്റ എടുക്കാൻ
        async function loadStaff() {
            const querySnapshot = await getDocs(collection(db, "staff_entries"));
            staff = [];
            querySnapshot.forEach((doc) => {
                staff.push({ id: doc.id, ...doc.data() });
            });
            renderStaff();
        }

        async function addStaff() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            if(!name || !phone) return alert("വിവരങ്ങൾ നൽകുക!");
            
            await addDoc(collection(db, "staff_entries"), { name, phone, history: [] });
            location.reload();
        }

        window.addStaff = addStaff; // ഫങ്ഷൻ ഗ്ലോബൽ ആക്കാൻ

       function renderStaff() {
            let listElement = document.getElementById('staffList');
            listElement.innerHTML = staff.map((s, i) => {
                // history ഉണ്ടോ എന്ന് ഉറപ്പുവരുത്തുന്നു, അല്ലെങ്കിൽ ശൂന്യമായ ലിസ്റ്റ് നൽകുന്നു
                let history = s.history || [];
                let workAmount = history.filter(h => h.type === 'work').reduce((sum, h) => sum + (h.amount || 0), 0);
                let givenAmount = history.filter(h => h.type === 'given').reduce((sum, h) => sum + (h.amount || 0), 0);
                let balance = workAmount - givenAmount;
                
                return `
                <div class="staff-card bg-white p-4 rounded-xl border mb-3" data-name="${s.name || ''}">
                    <div class="cursor-pointer">
                        <p class="font-bold text-lg">${s.name || 'പേരില്ല'}</p>
                        <p class="text-gray-500 text-sm">${s.phone || ''}</p>
                        <p class="text-sm mt-1">ജോലി: ₹${workAmount} | നൽകിയത്: ₹${givenAmount}</p>
                        <p class="text-sm font-bold mt-1 ${balance > 0 ? 'text-red-600' : 'text-green-600'}">
                            നൽകാനുള്ളത്: ₹${balance}
                        </p>
                    </div>
                    <div class="flex gap-2 mt-3 items-center">
                        <button onclick="addEntry('${s.id}', 'work')" class="bg-blue-100 px-3 py-1.5 rounded-lg text-xs font-bold text-blue-700">ജോലി</button>
                        <button onclick="addEntry('${s.id}', 'given')" class="bg-green-100 px-3 py-1.5 rounded-lg text-xs font-bold text-green-700">നൽകിയത്</button>
                        <button onclick="sendWhatsApp('${s.name}', '${s.phone}', ${workAmount}, ${givenAmount}, ${balance})" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">WhatsApp</button>
                        <button onclick="deleteStaff('${s.id}')" class="text-red-500 text-xs ml-auto">നീക്കം</button>
                    </div>
                </div>`;
            }).join('');
        }
         // import സ്റ്റേറ്റ്‌മെന്റുകളിൽ updateDoc, deleteDoc, doc എന്നിവ കൂടി ചേർക്കുക
        
        // ജോലി/നൽകിയ തുക ആഡ് ചെയ്യാൻ
        window.addEntry = async function(id, type) {
            let amount = prompt(type === 'work' ? "ജോലിക്കൂലി തുക നൽകുക:" : "നൽകിയ തുക നൽകുക:");
            if(!amount) return;

            const staffRef = doc(db, "staff_entries", id);
            const staffSnap = await getDoc(staffRef);
            
            if (staffSnap.exists()) {
                let currentHistory = staffSnap.data().history || [];
                currentHistory.push({
                    type: type,
                    amount: parseInt(amount),
                    date: new Date().toLocaleDateString()
                });
                
                await updateDoc(staffRef, { history: currentHistory });
                loadStaff(); // ലിസ്റ്റ് പുതുക്കുന്നു
            }
        };

        // ജീവനക്കാരെ നീക്കം ചെയ്യാൻ
        window.deleteStaff = async function(id) {
            if(confirm('ഈ ജീവനക്കാരെ നീക്കം ചെയ്യണോ?')) {
                await deleteDoc(doc(db, "staff_entries", id));
                loadStaff(); // ലിസ്റ്റ് പുതുക്കുന്നു
            }
        };    
// വാട്‌സാപ്പിലേക്ക് കണക്ക് അയക്കാനുള്ള ഫങ്ഷൻ
        window.sendWhatsApp = function(name, phone, work, given, balance) {
            let cleanPhone = phone.replace(/\D/g, '');
            if(cleanPhone.length === 10) {
                cleanPhone = '91' + cleanPhone;
            }

            let message = `*സൈറ്റ് കണക്ക് വിവരങ്ങൾ*%0A%0A` +
                          `*പേര്:* ${name}%0A` +
                          `*ആകെ ജോലിക്കൂലി:* ₹${work}%0A` +
                          `*നൽകിയ തുക:* ₹${given}%0A` +
                          `*ബാക്കി നൽകാനുള്ളത്:* ₹${balance}%0A%0A` +
                          `_സൈറ്റ് മാനേജർ ആപ്പ് വഴി അയച്ചത്._`;

            window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
        };
        window.filterStaff = function() {
            let query = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.staff-card').forEach(item => {
                item.style.display = item.getAttribute('data-name').toLowerCase().includes(query) ? '' : 'none';
            });
        }

        loadStaff();
    </script>
</body>
</html>
