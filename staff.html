<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <h1 class="text-2xl font-black text-emerald-600 mb-4">ജീവനക്കാർ</h1>
            <input type="text" id="searchStaff" placeholder="പേര് സെർച്ച് ചെയ്യുക..." class="w-full p-4 bg-slate-100 rounded-2xl font-bold border">
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <h2 class="font-black text-lg mb-4 text-slate-700">പുതിയ ജീവനക്കാരൻ</h2>
            <div class="space-y-3">
                <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border font-bold">
                <input type="text" id="siteName" placeholder="ജോലി ചെയ്യുന്ന സൈറ്റ്" class="w-full p-3 bg-slate-50 rounded-xl border font-bold">
                <input type="number" id="dailyWage" placeholder="ദിവസക്കൂലി" class="w-full p-3 bg-slate-50 rounded-xl border font-bold">
                <button id="saveStaffBtn" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black">സേവ് ചെയ്യുക</button>
            </div>
        </div>
    </div>

    <script>
        // ലളിതമായ സ്ക്രിപ്റ്റ് മാത്രം ഇവിടെ ഉപയോഗിക്കുക
        document.getElementById('saveStaffBtn').addEventListener('click', () => {
            alert("ജീവനക്കാരനെ സേവ് ചെയ്യാൻ Firebase കണക്ട് ചെയ്യണം!");
        });
    </script>
</body>
</html>
