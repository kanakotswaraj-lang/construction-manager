<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }</style>
    <title>ജീവനക്കാർ - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-sky-600">ജീവനക്കാർ</h1>
            <a href="dashboard.html" class="font-bold bg-slate-100 px-4 py-2 rounded-xl text-sm">← മെയിൻ</a>
        </div>

        <!-- ജീവനക്കാരെ ചേർക്കുന്ന ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <input type="file" id="staffPhoto" class="hidden" accept="image/*">
            <label for="staffPhoto" class="block w-20 h-20 bg-slate-50 rounded-full mb-6 mx-auto flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200">
                <span class="text-[10px] text-slate-400 font-bold">ഫോട്ടോ</span>
            </label>
            <div class="space-y-4">
                <input type="text" id="staffName" placeholder="പേര്" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="staffWage" placeholder="ദിവസക്കൂലി (₹)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                    <input type="tel" id="staffPhone" placeholder="നമ്പർ" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border">
                </div>
                <button class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black">ജീവനക്കാരനെ ചേർക്കുക</button>
            </div>
        </div>

        <!-- ജീവനക്കാരന്റെ കാർഡ് (ഹിസ്റ്ററി & വാട്‌സാപ്പ് ഫീച്ചർ) -->
        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center font-black text-emerald-600">രാ</div>
                <div>
                    <h3 class="font-black text-slate-800">രാഘവൻ</h3>
                    <p class="text-xs font-bold text-slate-400">കൂലി: ₹1200 | അഡ്വാൻസ്: ₹0</p>
                </div>
            </div>

            <!-- ഹാജർ & പണം നൽകൽ -->
            <div class="space-y-3 border-t pt-4">
                <div class="flex gap-2">
                    <input type="date" class="bg-slate-50 p-2 rounded-xl text-xs font-bold w-full border">
                    <button class="bg-emerald-50 text-emerald-700 px-4 rounded-xl text-xs font-black">ഹാജർ</button>
                </div>
                <div class="flex gap-2">
                    <input type="date" class="bg-slate-50 p-2 rounded-xl text-xs font-bold w-full border">
                    <button class="bg-blue-50 text-blue-700 px-4 rounded-xl text-xs font-black">പണം നൽകി</button>
                </div>
            </div>

            <!-- ബട്ടണുകൾ -->
            <div class="flex gap-2 mt-4">
                <button class="flex-1 bg-slate-100 py-2 rounded-xl text-[10px] font-black">എഡിറ്റ്</button>
                <button class="flex-1 bg-orange-50 text-orange-600 py-2 rounded-xl text-[10px] font-black">ഹിസ്റ്ററി</button>
                <button onclick="sendToWhatsApp('രാഘവൻ', 1200)" class="flex-1 bg-green-50 text-green-700 py-2 rounded-xl text-[10px] font-black">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        function sendToWhatsApp(name, amount) {
            const message = `ഹലോ ${name}, നിങ്ങളുടെ ഈ ദിവസത്തെ കൂലി ₹${amount} ആണ്. - മേസ്തിരി പ്രോ`;
            const phone = "919876543210"; // ഇവിടെ ആ ജീവനക്കാരന്റെ നമ്പർ ഡൈനാമിക് ആയി കൊടുക്കാം
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
