<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-slate-800">ജീവനക്കാർ</h1>

        <!-- Add Staff -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="staffName" placeholder="ജീവനക്കാരന്റെ പേര്" class="w-full p-4 text-lg border rounded-xl mb-3">
            <input type="tel" id="staffPhone" placeholder="ഫോൺ നമ്പർ" class="w-full p-4 text-lg border rounded-xl mb-3">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold text-lg">ചേർക്കുക</button>
        </div>

        <div id="staffList" class="space-y-3"></div>
    </div>

    <script>
        function addStaff() {
            let name = document.getElementById('staffName').value;
            let phone = document.getElementById('staffPhone').value;
            if(!name || !phone) return alert("പേരും ഫോൺ നമ്പറും നൽകുക!");

            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            staff.push({name, phone});
            localStorage.setItem('staff', JSON.stringify(staff));
            
            document.getElementById('staffName').value = '';
            document.getElementById('staffPhone').value = '';
            displayStaff();
        }

        function displayStaff() {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            let list = document.getElementById('staffList');
            list.innerHTML = staff.map((s, index) => `
                <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg">${s.name}</p>
                        <p class="text-slate-600">${s.phone}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editStaff(${index})" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-bold">മാറ്റുക</button>
                        <button onclick="deleteStaff(${index})" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold">നീക്കം</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteStaff(index) {
            if(confirm('തീർച്ചയാണോ? ഈ ജീവനക്കാരനെ നീക്കം ചെയ്യട്ടെ?')) {
                let staff = JSON.parse(localStorage.getItem('staff') || '[]');
                staff.splice(index, 1);
                localStorage.setItem('staff', JSON.stringify(staff));
                displayStaff();
            }
        }

        function editStaff(index) {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            let newName = prompt("പുതിയ പേര് നൽകുക:", staff[index].name);
            let newPhone = prompt("പുതിയ ഫോൺ നമ്പർ നൽകുക:", staff[index].phone);
            
            if(newName && newPhone) {
                staff[index] = {name: newName, phone: newPhone};
                localStorage.setItem('staff', JSON.stringify(staff));
                displayStaff();
            }
        }

        displayStaff();
    </script>
</body>
</html>
