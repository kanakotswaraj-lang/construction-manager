<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }
        input, button { font-size: 16px !important; }
    </style>
    <title>ജീവനക്കാർ - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-sky-600">ജീവനക്കാർ</h1>
            <a href="dashboard.html" class="font-bold bg-slate-100 px-4 py-2 rounded-xl text-sm">← മെയിൻ</a>
        </div>

        <!-- ജീവനക്കാരെ ചേർക്കാൻ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <input type="file" id="staffPhoto" class="hidden" accept="image/*">
            <label for="staffPhoto" class="block w-24 h-24 bg-slate-50 rounded-full mb-6 mx-auto flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200">
                <span class="text-xs text-slate-400 font-bold">ഫോട്ടോ</span>
            </label>
            
            <!-- ജീവനക്കാരെ ചേർക്കുന്ന ഫോമിൽ ഒരു ഫോൺ നമ്പർ കൂടി ചേർക്കാം -->
<label class="text-[10px] font-black text-slate-400 uppercase px-2">ഫോൺ നമ്പർ</label>
<input type="tel" id="staffPhone" placeholder="നമ്പർ" class="w-full p-4 mb-3 mt-1 bg-slate-50 rounded-2xl font-bold border">

<!-- ലിസ്റ്റ് ഭാഗത്ത് എഡിറ്റ്, ഡിലീറ്റ്, ഹിസ്റ്ററി ബട്ടണുകൾ -->
<div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-slate-100 rounded-full"></div>
        <div>
            <h3 class="font-black text-slate-800">രാഘവൻ</h3>
            <p class="text-xs text-slate-500 font-bold">₹ 1200 / ദിവസം</p>
        </div>
    </div>
    <div class="flex gap-2">
        <button class="bg-blue-50 text-blue-600 p-2 rounded-xl text-xs font-black">എഡിറ്റ്</button>
        <button class="bg-orange-50 text-orange-600 p-2 rounded-xl text-xs font-black">ഹിസ്റ്ററി</button>
        <button class="bg-red-50 text-red-600 p-2 rounded-xl text-xs font-black">ഡിലീറ്റ്</button>
    </div>
</div>
            

        <!-- ലിസ്റ്റ് -->
        <div id="staffList" class="space-y-3">
            <p class="text-center text-slate-400 font-bold py-10">ജീവനക്കാരുടെ പട്ടിക ഇവിടെ കാണാം...</p>
        </div>
    </div>
</body>
</html>
