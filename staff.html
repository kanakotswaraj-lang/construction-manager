<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">ജീവനക്കാർ</h1>
        
        <!-- Search Bar -->
        <input type="text" id="searchInput" onkeyup="filterStaff()" placeholder="ജീവനക്കാരെ തിരയുക..." class="w-full p-3 border rounded-lg mb-4">
        
        <div id="staffList" class="space-y-2"></div>

        <div class="mt-8">
            <a href="index.html" class="block text-center text-blue-500 underline">തിരികെ ഡാഷ്ബോർഡിലേക്ക്</a>
        </div>
    </div>

    <script>
        function deleteStaff(index) {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            staff.splice(index, 1);
            localStorage.setItem('staff', JSON.stringify(staff));
            location.reload();
        }

        function filterStaff() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.querySelectorAll('.staff-item');
            items.forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(input) ? '' : 'none';
            });
        }

        function displayStaff() {
            let staff = JSON.parse(localStorage.getItem('staff') || '[]');
            let container = document.getElementById('staffList');
            container.innerHTML = staff.map((s, index) => `
                <div class='staff-item p-3 border rounded flex justify-between bg-white items-center'>
                    <span>${s.name}</span>
                    <button onclick="deleteStaff(${index})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                </div>`).join('');
        }
        displayStaff();
    </script>
</body>
</html>
