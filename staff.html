<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ - മാനേജ്‌മെന്റ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-slate-800">ജീവനക്കാർ</h1>

        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-4 border rounded-xl mb-3">
            <input type="tel" id="staffPhone" placeholder="WhatsApp നമ്പർ (91xxxxxx)" class="w-full p-4 border rounded-xl mb-3">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">ചേർക്കുക</button>
        </div>

        <div id="staffList" class="space-y-4"></div>
    </div>

    <script>
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');

        function addStaff() {
            let name = document.getElementById('staffName').value;
            let phone = document.getElementById('staffPhone').value;
            if(!name || !phone) return alert("വിവരങ്ങൾ നൽകുക!");
            staff.push({name, phone, history: []});
            saveAndDisplay();
        }

        function saveAndDisplay() {
            localStorage.setItem('staff', JSON.stringify(staff));
            let list = document.getElementById('staffList');
            list.innerHTML = staff.map((s, i) => {
                let totalGiven = s.history.filter(h => h.type === 'given').reduce((sum, h) => sum + h.amount, 0);
                let totalTaken = s.history.filter(h => h.type === 'taken').reduce((sum, h) => sum + h.amount, 0);
                
                return `
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-start">
                        <p class="font-bold text-lg">${s.name}</p>
                        <div class="flex gap-2">
                            <button onclick="editStaff(${i})" class="text-blue-500 text-xs font-bold">എഡിറ്റ്</button>
                            <button onclick="deleteStaff(${i})" class="text-red-500 text-xs font-bold">നീക്കം ചെയ്യുക</button>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500">നമ്പർ: ${s.phone}</p>
                    <div class="flex justify-between my-2 text-sm">
                        <span class="text-green-600">നൽകിയത്: ₹${totalGiven}</span>
                        <span class="text-red-600">വാങ്ങിയത്: ₹${totalTaken}</span>
                    </div>
                    <div class="mt-3 flex gap-2">
                        <button onclick="addEntry(${i}, 'given')" class="bg-green-100 text-green-700 px-3 py-1 rounded text-xs">നൽകി</button>
                        <button onclick="addEntry(${i}, 'taken')" class="bg-red-100 text-red-700 px-3 py-1 rounded text-xs">വാങ്ങി</button>
                        <a href="https://wa.me/${s.phone}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs">WhatsApp</a>
                    </div>
                    <div class="mt-3 text-xs text-slate-500">
                        ${s.history.map(h => `<p>${h.date}: ${h.type === 'given' ? 'നൽകി +' : 'വാങ്ങി -'} ₹${h.amount}</p>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function editStaff(i) {
            let newName = prompt("പുതിയ പേര്:", staff[i].name);
            let newPhone = prompt("പുതിയ ഫോൺ നമ്പർ:", staff[i].phone);
            if(newName && newPhone) {
                staff[i].name = newName;
                staff[i].phone = newPhone;
                saveAndDisplay();
            }
        }

        function addEntry(i, type) {
            let amount = prompt("തുക നൽകുക:");
            if(amount) {
                let date = new Date().toLocaleDateString('ml-IN');
                staff[i].history.push({date, amount: parseInt(amount), type});
                saveAndDisplay();
            }
        }

        function deleteStaff(i) {
            if(confirm('ഈ ജീവനക്കാരനെ നീക്കം ചെയ്യട്ടെ?')) {
                staff.splice(i, 1);
                saveAndDisplay();
            }
        }

        saveAndDisplay();
    </script>
</body>
</html>
