<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>നിർമ്മാണ മാനേജർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-slate-100">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-slate-800 mb-6 text-center">നിർമ്മാണ മാനേജർ</h1>
        
        <!-- ഇൻപുട്ട് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="text" id="siteName" placeholder="സൈറ്റ്" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="number" id="dailyWage" placeholder="കൂലി" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="tel" id="phoneNumber" placeholder="WhatsApp നമ്പർ (91...)" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="text" id="jobType" placeholder="ജോലി" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <input type="text" id="bankDetails" placeholder="ബാങ്ക് / GPay നമ്പർ" class="w-full p-3 bg-slate-50 rounded-xl border mb-2">
            <button id="saveStaffBtn" class="w-full bg-emerald-700 text-white p-4 rounded-xl font-black">സേവ് ചെയ്യുക</button>
        </div>

        <!-- സെർച്ച് ബാർ -->
        <input type="text" id="searchInput" placeholder="പേര് സെർച്ച് ചെയ്യുക..." class="w-full p-3 bg-white rounded-xl border mb-4 shadow-sm">

        <div id="staffList" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
const firebaseConfig = {
    apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
    authDomain: "mesthri-app.firebaseapp.com",
    projectId: "mesthri-app",
    storageBucket: "mesthri-app.appspot.com",
    messagingSenderId: "1060617901864",
    appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
};
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveStaffBtn').addEventListener('click', async () => {
            await addDoc(collection(db, "staffs"), {
                name: document.getElementById('staffName').value,
                site: document.getElementById('siteName').value,
                wage: document.getElementById('dailyWage').value,
                phone: document.getElementById('phoneNumber').value,
                job: document.getElementById('jobType').value,
                bank: document.getElementById('bankDetails').value
            });
            alert("വിവരങ്ങൾ സേവ് ആയി!");
        });

        // സെർച്ച് ഫങ്ഷൻ
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#staffList > div').forEach(div => {
                div.style.display = div.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        });

        // സ്റ്റാഫ് ലിസ്റ്റ് കാണിക്കുന്ന ഭാഗം
onSnapshot(collection(db, "staffs"), (snapshot) => {
    const list = document.getElementById('staffList');
    list.innerHTML = '';
    snapshot.forEach((d) => {
        const s = d.data();
        const div = document.createElement('div');
        div.className = "bg-white p-4 rounded-2xl border shadow-sm";
        div.innerHTML = `
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h3 class="font-bold text-lg">${s.name}</h3>
                    <p class="text-xs text-slate-500">${s.site} | ₹${s.wage}/ദിവസം</p>
                </div>
            </div>
            <div class="p-3 bg-slate-50 rounded-xl mb-3">
                <input type="text" id="site-${d.id}" placeholder="സൈറ്റ്" class="w-full p-2 border rounded mb-1 text-sm">
                <label class="flex items-center gap-2 mb-1 text-sm">
                    <input type="checkbox" id="attend-${d.id}" checked> ഹാജർ
                </label>
                <input type="number" id="pay-${d.id}" placeholder="ഇന്നത്തെ പെയ്‌മെന്റ്" class="w-full p-2 border rounded text-sm">
                <button id="save-${d.id}" class="w-full bg-blue-600 text-white mt-2 p-2 rounded-lg text-xs font-bold">വിവരങ്ങൾ അപ്‌ഡേറ്റ് ചെയ്യുക</button>
            </div>
        `;
        list.appendChild(div);

        // സേവ് ചെയ്യുമ്പോൾ വരുന്ന വിവരങ്ങൾ
        document.getElementById(`save-${d.id}`).onclick = async () => {
            const site = document.getElementById(`site-${d.id}`).value;
            const attended = document.getElementById(`attend-${d.id}`).checked;
            const payment = document.getElementById(`pay-${d.id}`).value;
            
            alert(`${s.name} - സൈറ്റ്: ${site}, ഹാജർ: ${attended ? 'ഉണ്ട്' : 'ഇല്ല'}, പെയ്‌മെന്റ്: ₹${payment} എന്ന് സേവ് ചെയ്തു.`);
        };
    });
});

    </script>
</body>
</html>
