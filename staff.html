<!-- staff.html-ലെ <input> ഭാഗം -->
<div class="space-y-4">
    <input type="text" id="staffName" placeholder="ജീവനക്കാരന്റെ പേര്" class="w-full p-4 bg-slate-100 rounded-xl">
    <input type="number" id="staffWage" placeholder="കൂലി (രൂപ)" class="w-full p-4 bg-slate-100 rounded-xl">
    <button onclick="saveStaff()" class="w-full bg-blue-500 text-white p-4 rounded-xl">ജീവനക്കാരനെ ചേർക്കുക</button>
</div>

<script>
    function saveStaff() {
        const name = document.getElementById('staffName').value;
        const wage = document.getElementById('staffWage').value;
        if(name && wage) {
            let staffList = JSON.parse(localStorage.getItem('staff') || '[]');
            staffList.push({ name: name, wage: wage });
            localStorage.setItem('staff', JSON.stringify(staffList));
            alert("ജീവനക്കാരനെ ചേർത്തു!");
            location.reload();
        }
    }
</script>
