<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>തൊഴിലാളി മാനേജർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">

    <div class="max-w-md mx-auto">
        
        <!-- ഹെഡർ -->
        <div class="bg-slate-900 p-4 rounded-2xl text-white mb-6 flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-xl font-black">തൊഴിലാളികൾ</h1>
                <p id="loggedInMeshtri" class="text-xs text-blue-400 font-bold mt-1">മേസ്തിരി: ലോഡിങ്...</p>
            </div>
            <a href="dashboard.html" class="bg-slate-800 text-xs px-3 py-2 rounded-xl text-slate-300 font-bold hover:bg-slate-700">ഡാഷ്‌ബോർഡ്</a>
        </div>

        <!-- പുതിയ തൊഴിലാളിയെ ചേർക്കാനുള്ള ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-lg mb-6 border border-slate-100">
            <h2 class="text-lg font-bold mb-4 text-slate-700">പുതിയ തൊഴിലാളിയെ ചേർക്കുക</h2>
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-base outline-none">
            
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="staffRole" class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
                    <option value="Helper">ഹെൽപ്പർ (Helper)</option>
                    <option value="Mason">മേസ്തിരി (Mason)</option>
                </select>
                <input type="number" id="dailyWage" placeholder="ഒരു ദിവസത്തെ കൂലി (₹)" class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
            </div>

            <button id="saveStaffBtn" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold text-base hover:bg-emerald-700 transition">തൊഴിലാളിയെ സേവ് ചെയ്യുക</button>
        </div>

        <!-- തൊഴിലാളികളുടെ ലിസ്റ്റ് കാണിക്കുന്ന സ്ഥലം -->
        <div id="staffList" class="space-y-4 pb-10"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const currentMeshtri = localStorage.getItem('userName') || "പൊതുമേസ്തിരി";
        document.getElementById('loggedInMeshtri').innerText = "സ്വാഗതം, " + currentMeshtri;

        // പുതിയ തൊഴിലാളിയെ സേവ് ചെയ്യാൻ
        document.getElementById('saveStaffBtn').onclick = async () => {
            const name = document.getElementById('staffName').value.trim();
            const role = document.getElementById('staffRole').value;
            const wage = parseFloat(document.getElementById('dailyWage').value) || 0;

            if (!name) return alert("പേര് നൽകുക!");

            await addDoc(collection(db, "staffs"), {
                meshtriOwner: currentMeshtri,
                name: name,
                role: role,
                dailyWage: wage,
                workedDays: 0,
                advance: 0,
                site: "പ്രധാന സൈറ്റ്"
            });

            document.getElementById('staffName').value = '';
            document.getElementById('dailyWage').value = '';
            alert("തൊഴിലാളിയെ വിജയകരമായി ചേർത്തു!");
        };

        // തൊഴിലാളികളുടെ ലിസ്റ്റ് ലൈവ് ആയി ലോഡ് ചെയ്യുന്നു
        onSnapshot(query(collection(db, "staffs")), (snapshot) => {
            const list = document.getElementById('staffList');
            list.innerHTML = '';

            snapshot.forEach(docSnap => {
                const s = docSnap.data();
                const d = { id: docSnap.id, ...s };

                if (s.meshtriOwner === currentMeshtri) {
                    let workedDays = s.workedDays !== undefined ? s.workedDays : 1;
                    let advance = s.advance !== undefined ? s.advance : 0;
                    let siteName = s.site || "പ്രധാന സൈറ്റ്";
                    let attendanceStatus = "present"; // ഡിഫോൾട്ട് ആയി വന്നു എന്ന് വെക്കുന്നു

                    let totalWage = workedDays * s.dailyWage;
                    let balanceToPay = totalWage - advance;

                    let card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-3xl shadow-md border border-slate-100 relative";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-black text-lg text-slate-800">${s.name} <span class="text-xs font-normal text-slate-500">(${s.role})</span></h3>
                                <p class="text-xs text-slate-500 mt-0.5">സൈറ്റ്: <span id="siteText-${d.id}" class="font-bold text-slate-700">${siteName}</span> | കൂലി: ₹${s.dailyWage}/ദിവസം</p>
                            </div>
                            <button id="del-${d.id}" class="text-red-500 text-xs font-bold bg-red-50 px-2.5 py-1.5 rounded-xl hover:bg-red-100">Delete</button>
                        </div>

                        <!-- ഹാജർ ബട്ടണുകൾ -->
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <button id="presBtn-${d.id}" class="p-2.5 rounded-xl text-xs font-bold transition bg-emerald-500 text-white shadow-sm">വന്നു (Present)</button>
                            <button id="absBtn-${d.id}" class="p-2.5 rounded-xl text-xs font-bold transition bg-slate-100 text-slate-600">അവധി (Absent)</button>
                        </div>

                        <div class="space-y-3 mb-4">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">ഇന്നത്തെ സൈറ്റ്</label>
                                <input type="text" id="workSite-${d.id}" value="${siteName}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none">
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">പണിയുടെ അളവ്</label>
                                    <select id="workDayType-${d.id}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none">
                                        <option value="1" ${workedDays === 1 ? 'selected' : ''}>ഫുൾ ഡേ (1)</option>
                                        <option value="0.5" ${workedDays === 0.5 ? 'selected' : ''}>ഹാഫ് ഡേ (0.5)</option>
                                        <option value="1.5" ${workedDays === 1.5 ? 'selected' : ''}>ഓവർടൈം (1.5)</option>
                                        <option value="2" ${workedDays === 2 ? 'selected' : ''}>ഇരട്ടി (2)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">വാങ്ങിയ അഡ്വാൻസ് (₹)</label>
                                    <input type="number" id="adv-${d.id}" value="${advance}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none">
                                </div>
                            </div>
                        </div>

                        <!-- കണക്കുകൾ കാർഡിൽ കാണിക്കാൻ -->
                        <div class="bg-blue-50/50 p-3.5 rounded-2xl border border-blue-100 mb-4 flex justify-between items-center text-xs">
                            <div>
                                <p class="text-slate-500">ആകെ കൂലി:</p>
                                <p id="totWage-${d.id}" class="font-bold text-emerald-700 text-base">₹${totalWage}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-slate-500">ബാക്കി കൊടുക്കാനുള്ളത്:</p>
                                <p id="balPay-${d.id}" class="font-bold text-slate-800 text-base">₹${balanceToPay}</p>
                            </div>
                        </div>

                        <button id="save-${d.id}" class="w-full bg-slate-900 text-white p-3.5 rounded-xl font-bold text-sm hover:bg-slate-800 transition shadow-md">ഹാജറും കണക്കുകളും സേവ് ചെയ്യുക</button>
                    `;

                    list.appendChild(card);

                    // ലൊക്കൽ വേരിയബിളുകൾ
                    let currentDays = workedDays;
                    const presBtn = document.getElementById(`presBtn-${d.id}`);
                    const absBtn = document.getElementById(`absBtn-${d.id}`);
                    const dayTypeSelect = document.getElementById(`workDayType-${d.id}`);
                    const advInput = document.getElementById(`adv-${d.id}`);
                    const totWageEl = document.getElementById(`totWage-${d.id}`);
                    const balPayEl = document.getElementById(`balPay-${d.id}`);

                    // തുക കണക്കാക്കി അപ്ഡേറ്റ് ചെയ്യുന്ന ഫംഗ്ഷൻ
                    function updateCalculations() {
                        const days = attendanceStatus === "present" ? (parseFloat(dayTypeSelect.value) || 0) : 0;
                        const adv = parseFloat(advInput.value) || 0;
                        const tWage = days * s.dailyWage;
                        const bPay = tWage - adv;

                        totWageEl.innerText = "₹" + tWage;
                        balPayEl.innerText = "₹" + bPay;
                    }

                    // വന്നത് ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ
                    presBtn.onclick = () => {
                        attendanceStatus = "present";
                        presBtn.className = "p-2.5 rounded-xl text-xs font-bold transition bg-emerald-500 text-white shadow-sm";
                        absBtn.className = "p-2.5 rounded-xl text-xs font-bold transition bg-slate-100 text-slate-600";
                        dayTypeSelect.disabled = false;
                        updateCalculations();
                    };

                    // അവധി ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ
                    absBtn.onclick = () => {
                        attendanceStatus = "absent";
                        absBtn.className = "p-2.5 rounded-xl text-xs font-bold transition bg-red-500 text-white shadow-sm";
                        presBtn.className = "p-2.5 rounded-xl text-xs font-bold transition bg-slate-100 text-slate-600";
                        dayTypeSelect.disabled = true;
                        totWageEl.innerText = "₹0";
                        balPayEl.innerText = "₹" + (0 - (parseFloat(advInput.value) || 0));
                    };

                    dayTypeSelect.onchange = updateCalculations;
                    advInput.oninput = updateCalculations;

                    // സേവ് ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ (കൂലിയും അഡ്വാൻസും Accounts പേജിലേക്ക് പോകും)
                    document.getElementById(`save-${d.id}`).onclick = async () => {
                        const selectedDays = attendanceStatus === "present" ? (parseFloat(dayTypeSelect.value) || 1) : 0;
                        const selectedSite = document.getElementById(`workSite-${d.id}`).value.trim() || "പ്രധാന സൈറ്റ്";
                        const finalAdv = parseFloat(advInput.value) || 0;
                        const earnedForThisEntry = selectedDays * s.dailyWage;
                        const currentDate = new Date().toISOString().split('T')[0];

                        // 1. വന്നാണെങ്കിൽ കൂലി തുക വരവ്-ചെലവിലേക്ക് കയറും
                        if (attendanceStatus === "present" && earnedForThisEntry > 0) {
                            await addDoc(collection(db, "accounts"), {
                                meshtriOwner: currentMeshtri,
                                name: s.name + " (കൂലി - " + selectedDays + " ദിവസം)",
                                site: selectedSite,
                                type: "wage",
                                payment: "cash",
                                amount: earnedForThisEntry,
                                date: currentDate
                            });
                        }

                        // 2. അഡ്വാൻസ് തുക ഉണ്ടെങ്കിൽ അതും വരവ്-ചെലവിലേക്ക് ചെലവായി കയറും
                        if (finalAdv > 0) {
                            await addDoc(collection(db, "accounts"), {
                                meshtriOwner: currentMeshtri,
                                name: s.name + " (അഡ്വാൻസ്)",
                                site: selectedSite,
                                type: "other",
                                payment: "cash",
                                amount: finalAdv,
                                date: currentDate
                            });
                        }

                        // 3. സ്റ്റാഫ് ഡാറ്റാബേസ് അപ്ഡേറ്റ് ചെയ്യുന്നു
                        await updateDoc(doc(db, 'staffs', d.id), {
                            workedDays: selectedDays,
                            advance: finalAdv,
                            site: selectedSite
                        });

                        alert("കണക്കുകൾ വിജയകരമായി സേവ് ആയി!");
                    };

                    // തൊഴിലാളിയെ ഡിലീറ്റ് ചെയ്യാൻ
                    document.getElementById(`del-${d.id}`).onclick = async () => {
                        if (confirm(`${s.name}-നെ ഡിലീറ്റ് ചെയ്യണോ?`)) {
                            await deleteDoc(doc(db, 'staffs', d.id));
                        }
                    };
                }
            });
        });
    </script>
</body>
</html>
