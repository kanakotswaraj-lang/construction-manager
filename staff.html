<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">ജീവനക്കാർ</h1>

        <!-- Add Staff -->
        <div class="bg-white p-4 rounded-xl shadow border mb-4">
            <input type="text" id="staffName" placeholder="ജീവനക്കാരന്റെ പേര്" class="w-full p-2 border rounded mb-2">
            <input type="tel" id="staffPhone" placeholder="ഫോൺ നമ്പർ" class="w-full p-2 border rounded mb-2">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-2 rounded font-bold">ചേർക്കുക</button>
        </div>

        <!-- Export/Import -->
        <div class="flex gap-2 mb-4">
            <button onclick="exportData()" class="flex-1 bg-blue-600 text-white p-2 rounded text-sm">ഡാറ്റ എക്‌സ്‌പോർട്ട് (Export)</button>
            <label class="flex-1 bg-emerald-600 text-white p-2 rounded text-sm text-center cursor-pointer">
                ഡാറ്റ ഇംപോർട്ട് (Import)
                <input type="file" id="importFile" onchange="importData(event)" class="hidden">
            </label>
        </div>
    </div>

    <script>
        function exportData() {
            let data = localStorage.getItem('staff');
            if(!data) return alert("ഡാറ്റ ലഭ്യമല്ല!");
            let a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = 'backup.json';
            a.click();
        }

        function importData(event) {
            let reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('staff', e.target.result);
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }

        function displayStaff() {
            // നിങ്ങളുടെ നിലവിലുള്ള displayStaff ഫംഗ്‌ഷൻ ഇവിടെ ഉണ്ടാവണം
        }
        displayStaff();
    </script>
</body>
</html>
