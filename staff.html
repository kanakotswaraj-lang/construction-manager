<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ജീവനക്കാർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">ജീവനക്കാർ</h1>
        <div class="bg-white p-5 rounded-2xl shadow-sm border mb-6">
            <input type="text" id="staffName" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2">
            <input type="tel" id="staffPhone" placeholder="WhatsApp നമ്പർ" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ചേർക്കുക</button>
        </div>
        <div id="staffList" class="space-y-4"></div>
    </div>

    <script>
        let staff = JSON.parse(localStorage.getItem('staff') || '[]');
        function addStaff() {
            let name = document.getElementById('staffName').value;
            let phone = document.getElementById('staffPhone').value;
            if(!name) return;
            staff.push({name, phone, history: []});
            saveAndDisplay();
        }
        function saveAndDisplay() {
            localStorage.setItem('staff', JSON.stringify(staff));
            let list = document.getElementById('staffList');
            list.innerHTML = staff.map((s, i) => `
                <div class="bg-white p-4 rounded-xl border">
                    <div class="flex justify-between font-bold">${s.name} <button onclick="deleteStaff(${i})" class="text-red-500 text-xs">നീക്കം</button></div>
                    <p class="text-sm text-gray-500">${s.phone}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="addEntry(${i}, 'taken')" class="bg-blue-100 p-2 rounded text-xs">കൂലി (വാങ്ങി)</button>
                        <button onclick="addEntry(${i}, 'given')" class="bg-green-100 p-2 rounded text-xs">നൽകിയത്</button>
                    </div>
                </div>
            `).join('');
        }
        function addEntry(i, type) {
            let amount = prompt("തുക നൽകുക:");
            if(amount) {
                staff[i].history.push({type, amount: parseInt(amount), date: new Date().toLocaleDateString()});
                saveAndDisplay();
            }
        }
        function deleteStaff(i) { if(confirm('നീക്കം ചെയ്യണോ?')) { staff.splice(i, 1); saveAndDisplay(); } }
        saveAndDisplay();
    </script>
</body>
</html>
