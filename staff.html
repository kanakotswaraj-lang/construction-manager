<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }</style>
    <title>മേസ്തിരി പ്രോ - സ്റ്റാഫ് മാനേജ്മെന്റ്</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ & സെർച്ച് ബാർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <h1 class="text-2xl font-black text-emerald-600 mb-4">ജീവനക്കാർ</h1>
            <input type="text" placeholder="പേര് സെർച്ച് ചെയ്യുക..." class="w-full p-4 bg-slate-100 rounded-2xl font-bold">
        </div>

        <!-- പുതിയ ജീവനക്കാരനെ ചേർക്കാൻ (ഫോട്ടോ അടക്കം) -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
            <input type="file" id="staffPhoto" class="hidden" accept="image/*">
            <label for="staffPhoto" class="block w-20 h-20 bg-slate-50 rounded-full mb-6 mx-auto flex items-center justify-center cursor-pointer border-2 border-dashed">ഫോട്ടോ</label>
            <div class="space-y-3">
                <input type="text" placeholder="പേര്" class="w-full p-3 bg-slate-50 rounded-xl border">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" placeholder="ദിവസക്കൂലി" class="w-full p-3 bg-slate-50 rounded-xl border">
                    <input type="tel" placeholder="നമ്പർ" class="w-full p-3 bg-slate-50 rounded-xl border">
                </div>
                <button class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">ജീവനക്കാരനെ ചേർക്കുക</button>
            </div>
        </div>

        <!-- ജീവനക്കാരന്റെ കാർഡ് (സമ്മറി & നോട്ട്സ്) -->
        <div class="bg-white p-5 rounded-3xl border shadow-sm">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center font-black">രാ</div>
                <div>
                    <h3 class="font-bold">രാഘവൻ</h3>
                    <p class="text-xs text-slate-500">ആകെ കൊടുത്തത്: ₹5000 | ബാലൻസ്: ₹1200</p>
                </div>
            </div>

            <!-- ഹാജർ & പണം (തീയതി & നോട്ട്സ്) -->
            <div class="space-y-2 border-t pt-3">
                <input type="date" class="w-full p-2 bg-slate-50 rounded-xl text-xs">
                <input type="text" placeholder="പണിയുടെ വിശേഷം (നോട്ട്)" class="w-full p-2 bg-slate-50 rounded-xl text-xs border">
                <div class="flex gap-2">
                    <button class="flex-1 bg-emerald-50 text-emerald-700 py-2 rounded-xl text-xs font-bold">ഹാജർ</button>
                    <button class="flex-1 bg-blue-50 text-blue-700 py-2 rounded-xl text-xs font-bold">പണം നൽകി</button>
                </div>
            </div>

            <!-- ബട്ടണുകൾ (PDF & WhatsApp) -->
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button class="bg-orange-50 text-orange-600 py-2 rounded-xl text-xs font-bold">ഹിസ്റ്ററി</button>
                <button onclick="downloadPDF()" class="bg-purple-50 text-purple-700 py-2 rounded-xl text-xs font-bold">PDF ഡൗൺലോഡ്</button>
                <button class="bg-green-50 text-green-700 py-2 rounded-xl text-xs font-bold col-span-2">WhatsApp കണക്ക് അയക്കുക</button>
            </div>
        </div>
    </div>

    <script>
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("ജീവനക്കാരന്റെ കണക്ക് റിപ്പോർട്ട്", 10, 10);
            doc.text("പേര്: രാഘവൻ", 10, 20);
            doc.save("Raghavan_Report.pdf");
        }
    </script>
</body>
</html>
