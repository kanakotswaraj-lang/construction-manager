<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manjari', sans-serif; background-color: #f8fafc; }</style>
    <title>ജീവനക്കാർ - മേസ്തിരി പ്രോ</title>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <!-- ഹെഡർ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-900">ജീവനക്കാർ</h1>
            <a href="dashboard.html" class="text-xs font-bold bg-slate-100 px-4 py-2 rounded-xl">← മെയിൻ പേജ്</a>
        </div>

        <!-- ജീവനക്കാരെ ചേർക്കാൻ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <input type="file" id="staffPhoto" class="hidden" accept="image/*">
            <label for="staffPhoto" class="block w-20 h-20 bg-slate-100 rounded-full mb-4 mx-auto flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-300">
                <span class="text-[10px] text-slate-400 font-bold">ഫോട്ടോ</span>
            </label>
            <div class="space-y-3">
                <input type="text" id="staffName" placeholder="പേര്" class="w-full p-4 bg-slate-50 rounded-xl font-bold">
                <input type="number" id="staffWage" placeholder="ദിവസക്കൂലി (₹)" class="w-full p-4 bg-slate-50 rounded-xl font-bold">
                <button id="addStaffBtn" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black">ജീവനക്കാരനെ ചേർക്കുക</button>
            </div>
        </div>

        <!-- ലിസ്റ്റ് -->
        <div id="staffList" class="space-y-3">
            <!-- ലോഡ് ആകുമ്പോൾ ഇവിടെ ലിസ്റ്റ് വരും -->
        </div>
    </div>
</body>
</html>
