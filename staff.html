<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ജീവനക്കാരുടെ കണക്ക്</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-md mx-auto">
        <!-- ലോഗിൻ ഹെഡറും പ്രൊഫൈൽ ഐക്കണും -->
        <div id="userHeader" class="bg-slate-800 text-white p-3 rounded-2xl shadow-sm mb-4 flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <div id="userAvatar" class="w-7 h-7 bg-yellow-400 text-slate-900 rounded-full flex items-center justify-center font-black text-sm uppercase">
                    ..
                </div>
                <span class="text-xs font-bold">മേസ്ത്രി: <span id="displayUser" class="text-yellow-400">ലോഡ് ചെയ്യുന്നു...</span></span>
            </div>
            <a href="dashboard.html" class="text-[10px] bg-blue-600 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition">മെയിൻ പേജ്</a>
        </div>

        <h1 class="text-2xl font-black mb-4 text-center text-slate-800">ജീവനക്കാർ</h1>
        
        <!-- പുതിയ ജീവനക്കാരെ ചേർക്കാൻ -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4 border-slate-200">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">പുതിയ തൊഴിലാളിയെ ചേർക്കുക</h3>
            <input type="text" id="name" placeholder="പേര്" class="w-full p-3 border rounded-xl mb-2 focus:border-blue-500 outline-none">
            <input type="text" id="phone" placeholder="ഫോൺ നമ്പർ (ഉദാ: 9876543210)" class="w-full p-3 border rounded-xl mb-3 focus:border-blue-500 outline-none">
            <button onclick="addStaff()" class="w-full bg-slate-900 text-white p-3.5 rounded-xl font-bold shadow hover:bg-slate-800 transition">ചേർക്കുക</button>
        </div>

        <div id="staffList" class="space-y-3"></div>
    </div>

    <!-- വിവരങ്ങൾ ചേർക്കാനുള്ള മോഡൽ വിൻഡോ (Popup) -->
    <div id="entryModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-slate-800">വിവരങ്ങൾ ചേർക്കുക</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">വിശദാംശങ്ങൾ</label>
                    <input type="text" id="modalDesc" placeholder="ഉദാ: കോൺക്രീറ്റ് പണി, അഡ്വാൻസ്" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">തീയതി തിരഞ്ഞെടുക്കുക</label>
                    <input type="date" id="modalDate" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">തുക</label>
                    <input type="number" id="modalAmount" placeholder="തുക ₹" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold">ഒഴിവാക്കുക</button>
                <button onclick="saveModalEntry()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">സേവ് ചെയ്യുക</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
        measurementId: "G-J9Y5TW9D7T"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let staffListGlobal = [];
    let currentUserId = "";
    
    let tempActiveId = "";
    let tempActiveType = "";

    // ലോഗിൻ പരിശോധിക്കുന്നു
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
            const userName = user.email.split('@')[0];
            document.getElementById("displayUser").innerText = userName;
            
            const firstLetter = userName.charAt(0).toUpperCase();
            document.getElementById("userAvatar").innerText = firstLetter;

            loadStaff();
        } else {
            window.location.href = "login.html";
        }
    });

    function loadStaff() {
        const staffRef = ref(db, 'staff/' + currentUserId);
        onValue(staffRef, (snapshot) => {
            const data = snapshot.val() || {};
            staffListGlobal = Object.entries(data);
            renderStaff();
        });
    }

    window.addStaff = function() {
        let name = document.getElementById('name').value.trim();
        let phone = document.getElementById('phone').value.trim();
        if(!name || !phone) return alert("ദയവായി വിവരങ്ങൾ നൽകുക!");
        
        const staffRef = ref(db, 'staff/' + currentUserId);
        push(staffRef, { 
            name: name, 
            phone: phone, 
            workAmount: 0,
            givenAmount: 0,
            history: "" // ആദ്യ ഘട്ടത്തിൽ ഹിസ്റ്ററി ഇല്ല
        }).then(() => {
            document.getElementById('name').value = "";
            document.getElementById('phone').value = "";
            alert("തൊഴിലാളിയെ വിജയകരമായി ചേർത്തു!");
        });
    }

    function renderStaff() {
        let listElement = document.getElementById('staffList');
        if(!listElement) return;
        
        if(staffListGlobal.length === 0) {
            listElement.innerHTML = `<p class="text-xs text-slate-400 text-center py-6 bg-white rounded-3xl border">തൊഴിലാളികൾ ആരുമില്ല. പുതിയ ആളുകളെ മുകളിൽ ചേർക്കാം!</p>`;
            return;
        }

        listElement.innerHTML = staffListGlobal.map(([key, s]) => {
            let workAmount = Number(s.workAmount || 0);
            let givenAmount = Number(s.givenAmount || 0);
            let balance = workAmount - givenAmount;
            
            return `
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm mb-3">
                <p class="font-black text-lg text-slate-800">${s.name || 'പേരില്ല'}</p>
                <p class="text-slate-400 text-xs mb-3 font-bold">📞 ${s.phone || 'നമ്പർ നൽകിയിട്ടില്ല'}</p>
                <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-3 rounded-2xl mb-4 border border-slate-100">
                    <div><p class="text-[9px] text-slate-400 font-bold uppercase">ആകെ കൂലി</p><p class="font-black text-sm text-slate-700">₹${workAmount}</p></div>
                    <div><p class="text-[9px] text-slate-400 font-bold uppercase">നൽകിയത്</p><p class="font-black text-sm text-green-600">₹${givenAmount}</p></div>
                    <div><p class="text-[9px] text-slate-400 font-bold uppercase">ബാക്കി നൽകാൻ</p><p class="font-black text-sm text-red-600">₹${balance}</p></div>
                </div>
                
                <div class="flex gap-2 items-center flex-wrap">
                    <button onclick="openEntryModal('${key}', 'work')" class="flex-1 bg-blue-100 hover:bg-blue-200 py-2.5 rounded-xl text-xs font-bold text-blue-700 transition">പണി കൂട്ടി</button>
                    <button onclick="openEntryModal('${key}', 'given')" class="flex-1 bg-green-100 hover:bg-green-200 py-2.5 rounded-xl text-xs font-bold text-green-700 transition">പണം നൽകി</button>
                    <button onclick="showHistory('${key}')" class="bg-yellow-100 hover:bg-yellow-200 px-3.5 py-2.5 rounded-xl text-xs font-bold text-yellow-700 transition">ഹിസ്റ്ററി</button>
                    <button onclick="sendWhatsApp('${s.name}', '${s.phone}', ${workAmount}, ${givenAmount}, ${balance})" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3.5 py-2.5 rounded-xl text-xs font-bold transition">WhatsApp</button>
                    <button onclick="deleteStaff('${key}')" class="bg-red-50 hover:bg-red-100 text-red-600 p-2.5 rounded-xl text-xs ml-auto transition">Delete</button>
                </div>
            </div>`;
        }).join('');
    }

    // മോഡൽ തുറക്കുക
    window.openEntryModal = function(id, type) {
        tempActiveId = id;
        tempActiveType = type;
        
        document.getElementById("modalTitle").innerText = type === 'work' ? "ജോലി തുക ചേർക്കുക" : "ശമ്പളം നൽകിയത് രേഖപ്പെടുത്തുക";
        document.getElementById("modalDesc").value = type === 'work' ? "പണിക്കൂലി" : "അഡ്വാൻസ്";
        document.getElementById("modalAmount").value = "";
        document.getElementById("modalDate").value = new Date().toISOString().split('T')[0];
        
        document.getElementById("entryModal").classList.remove("hidden");
    };

    window.closeModal = function() {
        document.getElementById("entryModal").classList.add("hidden");
    };

    // തീയതിയും തുകകളും സേവ് ചെയ്യുക
    window.saveModalEntry = function() {
        let desc = document.getElementById("modalDesc").value.trim();
        let selectedDate = document.getElementById("modalDate").value;
        let amount = Number(document.getElementById("modalAmount").value);

        if(!desc || !selectedDate || !amount) {
            alert("എല്ലാ വിവരങ്ങളും കൃത്യമായി പൂരിപ്പിക്കുക!");
            return;
        }

        // കണ്ടെത്തിയ ജീവനക്കാരന്റെ വിവരങ്ങൾ എടുക്കുന്നു
        const staffObj = staffListGlobal.find(([key]) => key === tempActiveId);
        if (staffObj) {
            const sData = staffObj[1];
            
            let currentWork = Number(sData.workAmount || 0);
            let currentGiven = Number(sData.givenAmount || 0);
            let historyText = sData.history || "";

            // കൂലി മാറ്റങ്ങൾ കണക്കാക്കുന്നു
            if (tempActiveType === 'work') {
                currentWork += amount;
            } else {
                currentGiven += amount;
            }

            let dateParts = selectedDate.split('-');
            let formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

            // ഹിസ്റ്ററി ടെക്സ്റ്റിലേക്ക് പുതിയ ഇടപാട് ചേർക്കുന്നു
            let typeLabel = tempActiveType === 'work' ? 'കൂലി' : 'നൽകിയത്';
            let newHistoryEntry = `📅 ${formattedDate} | ${typeLabel}: ₹${amount} (${desc})\n`;
            historyText = newHistoryEntry + historyText;

            // ഫയർബേസ് അപ്‌ഡേറ്റ് ചെയ്യൽ
            const targetRef = ref(db, `staff/${currentUserId}/${tempActiveId}`);
            update(targetRef, {
                workAmount: currentWork,
                givenAmount: currentGiven,
                history: historyText
            }).then(() => {
                closeModal();
            });
        }
    };

    // ഹിസ്റ്ററി കാണിക്കൽ
    window.showHistory = function(key) {
        const staffObj = staffListGlobal.find(([id]) => id === key);
        if (staffObj) {
            const s = staffObj[1];
            let msg = `📄 ഹിസ്റ്ററി (${s.name}):\n\n`;
            if(!s.history || s.history.trim() === "") {
                msg += "ഇടപാടുകൾ ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല.";
            } else {
                msg += s.history;
            }
            alert(msg);
        }
    };

    // ഡിലീറ്റ് ചെയ്യൽ
    window.deleteStaff = function(key) {
        if(confirm('ഈ ജീവനക്കാരന്റെ അക്കൗണ്ട് പൂർണ്ണമായി ഒഴിവാക്കണോ?')) {
            remove(ref(db, `staff/${currentUserId}/${key}`));
        }
    };    

    // വാട്സാപ്പ് സന്ദേശം
    window.sendWhatsApp = function(name, phone, work, given, balance) {
        let cleanPhone = phone.replace(/\D/g, '');
        if(cleanPhone.length === 10) cleanPhone = '91' + cleanPhone;
        let message = `*സൈറ്റ് കണക്ക് വിവരങ്ങൾ*%0A%0A*പേര്:* ${name}%0A*ആകെ ജോലിക്കൂലി:* ₹${work}%0A*നൽകിയ തുക:* ₹${given}%0A*ബാക്കി നൽകാനുള്ളത്:* ₹${balance}%0A%0A_സൈറ്റ് മാനേജർ ആപ്പ് വഴി അയച്ചത്._`;
        window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
    };
</script>
</body>
</html>
