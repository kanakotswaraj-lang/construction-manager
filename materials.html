<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>മെറ്റീരിയൽസ് മാനേജ്മെന്റ്</title>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <a href="dashboard.html" class="text-sm font-bold text-slate-500 mb-4 block">← തിരികെ ഡാഷ്ബോർഡിലേക്ക്</a>
        
        <h1 class="text-2xl font-black text-slate-800 mb-6">മെറ്റീരിയൽസ്</h1>
        
        <!-- മെറ്റീരിയൽസ് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-8 space-y-3">
            <input type="text" placeholder="മെറ്റീരിയൽ പേര്" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" placeholder="അളവ് (Qty)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold">
                <input type="text" placeholder="യൂണിറ്റ് (ചാക്ക്/ടൺ)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold">
            </div>
            <input type="number" placeholder="ആകെ വില (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold">
            <input type="tel" placeholder="സപ്ലയർ ഫോൺ നമ്പർ" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold">
            <button class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black">പുതിയ മെറ്റീരിയൽ ചേർക്കുക</button>
        </div>

        <!-- ലിസ്റ്റ് വിത്ത് ആക്ഷൻ ബട്ടൺസ് -->
        <section class="space-y-4">
            <h2 class="font-black text-slate-800 mb-2">സ്റ്റോക്ക് നിലവാരം</h2>
            
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <p class="font-black text-slate-800 text-lg">സിമന്റ്</p>
                    <a href="tel:9876543210" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-black text-[10px]">വിളിക്കുക</a>
                </div>
                <p class="text-[12px] text-slate-500 font-bold mb-3">അളവ്: 45 ചാക്ക് | വില: ₹18,000</p>
                
                <div class="flex gap-2">
                    <button class="flex-1 bg-emerald-600 text-white py-2 rounded-xl font-black text-xs">ഉപയോഗിച്ചു (-)</button>
                    <button class="bg-slate-100 px-4 py-2 rounded-xl font-black text-xs">ബിൽ</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
