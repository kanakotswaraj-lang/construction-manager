<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700;900&display=swap" rel="stylesheet">
    <title>മെറ്റീരിയൽസ് മാനേജ്മെന്റ്</title>
    <style>
        body { font-family: 'Manjari', sans-serif; }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-100 to-slate-200 min-h-screen pb-12 p-4">
    <div class="max-w-md mx-auto">
        
        <!-- ഹെഡർ ബോക്സ് -->
        <div class="mt-2 p-5 bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 rounded-3xl text-white mb-6 flex justify-between items-center shadow-xl border border-slate-800">
            <div>
                <h1 class="text-xl font-black">മെറ്റീരിയൽസ് & സ്റ്റോക്ക്</h1>
                <p id="loggedInMeshtri" class="text-xs text-blue-400 font-bold mt-1">സ്വാഗതം, ലോഡിങ്...</p>
            </div>
            <a href="dashboard.html" class="bg-slate-800/80 hover:bg-slate-800 text-xs px-3.5 py-2.5 rounded-xl text-slate-300 font-bold transition shadow-sm border border-slate-700">ഡാഷ്‌ബോർഡ്</a>
        </div>
        
        <!-- ആകെ തുക കാണിക്കുന്ന ബോക്സ് -->
        <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white p-6 rounded-3xl shadow-lg mb-6 text-center border border-slate-700">
            <p class="text-[11px] opacity-75 uppercase tracking-widest font-black text-slate-300">ആകെ മെറ്റീരിയൽ ചെലവ്</p>
            <h2 id="totalMaterialCost" class="text-3xl font-black mt-1 text-emerald-400">₹0</h2>
        </div>

        <!-- സൈറ്റ് പേര് വെച്ച് ഫിൽട്ടർ ചെയ്യാനുള്ള ബോക്സ് -->
        <div class="bg-white p-4 rounded-3xl shadow-sm mb-6 border border-slate-200/80 no-print">
            <label class="block text-xs font-black text-slate-600 mb-2 uppercase tracking-wide">സൈറ്റ് പേര് വെച്ച് തിരയുക</label>
            <input type="text" id="filterSite" placeholder="സൈറ്റിന്റെ പേര് നൽകുക..." oninput="filterMaterials()" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-slate-900 outline-none font-bold">
        </div>
        
        <!-- മെറ്റീരിയൽസ് ഫോം -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/80 mb-6 space-y-3.5 no-print">
            <h2 class="text-base font-black text-slate-800">പുതിയ മെറ്റീരിയൽ / സ്റ്റോക്ക് ചേർക്കുക</h2>
            
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">തീയതി</label>
                <input type="date" id="matDate" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            </div>
            
            <input type="text" id="matName" placeholder="മെറ്റീരിയൽ പേര് (ഉദാ: സിമന്റ് / കമ്പി / മെറ്റൽ)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            <input type="text" id="matSite" placeholder="സ്ഥലം/സൈറ്റ് പേര് (ഉദാ: Edumba)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="matQty" placeholder="വാങ്ങിയ അളവ്" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
                <input type="number" id="matUsed" placeholder="ഉപയോഗിച്ചത് (ഓപ്ഷണൽ)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            </div>

            <input type="text" id="matUnit" placeholder="യൂണിറ്റ് (ചാക്ക് / ടൺ / കിലോ / എണ്ണം)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            <input type="number" id="matPrice" placeholder="ആകെ വില (₹)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            <input type="tel" id="matPhone" placeholder="സപ്ലയർ ഫോൺ നമ്പർ" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-sm outline-none focus:ring-2 focus:ring-slate-900">
            
            <!-- ബിൽ ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യാനുള്ള ഫീച്ചർ -->
            <div>
                <label class="block text-[11px] font-black text-slate-600 mb-1">ബില്ലിന്റെ ഫോട്ടോ (ചിത്രം തിരഞ്ഞെടുക്കുക)</label>
                <input type="file" id="matBillPhoto" accept="image/*" class="w-full p-3 bg-slate-50 rounded-2xl border border-slate-200 font-bold text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-slate-900 file:text-white hover:file:bg-slate-800">
            </div>

            <button id="saveBtn" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-slate-800 transition shadow-md text-sm mt-2">വിവരങ്ങൾ സേവ് ചെയ്യുക</button>
        </div>

        <!-- PDF ഡൗൺലോഡ് ബട്ടൺ -->
        <button onclick="window.print()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black mb-6 hover:bg-blue-700 transition no-print shadow-md text-sm">PDF റിപ്പോർട്ട് ഡൗൺലോഡ് ചെയ്യുക</button>

        <!-- ലിസ്റ്റ് വിത്ത് ആക്ഷൻ ബട്ടൺസ് -->
        <section class="space-y-4 pb-12">
            <h2 class="font-black text-slate-800 text-base mb-2">സ്റ്റോക്ക് നിലവാരവും ബില്ലുകളും</h2>
            <div id="materialList" class="space-y-4">
                <!-- ഡാറ്റ ഇവിടെ ഫയർബേസിൽ നിന്നും ലോഡ് ആകും -->
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const currentMeshtri = localStorage.getItem('userName') || "മേസ്തിരി";
        document.getElementById('loggedInMeshtri').innerText = "സ്വാഗതം, " + currentMeshtri;

        document.getElementById('matDate').valueAsDate = new Date();

        let editId = null;
        let existingPhotoUrl = "";

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 700;
                        const MAX_HEIGHT = 700;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('matName').value.trim();
            const site = document.getElementById('matSite').value.trim();
            
            if (!name) return alert("മെറ്റീരിയൽ പേര് നൽകുക!");
            if (!site) return alert("സൈറ്റിന്റെ പേര് നൽകുക!");

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "സേവ് ആകുന്നുണ്ട്, കാത്തിരിക്കൂ...";
            saveBtn.disabled = true;

            let billPhotoUrl = existingPhotoUrl;
            const fileInput = document.getElementById('matBillPhoto');
            if (fileInput.files && fileInput.files[0]) {
                try {
                    billPhotoUrl = await compressImage(fileInput.files[0]);
                } catch (e) {
                    console.error("Image compression error", e);
                }
            }

            const data = {
                meshtriOwner: currentMeshtri,
                date: document.getElementById('matDate').value,
                name: name,
                site: site,
                qty: parseFloat(document.getElementById('matQty').value) || 0,
                used: parseFloat(document.getElementById('matUsed').value) || 0,
                unit: document.getElementById('matUnit').value.trim(),
                price: parseFloat(document.getElementById('matPrice').value) || 0,
                phone: document.getElementById('matPhone').value.trim(),
                billPhoto: billPhotoUrl
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, "materials", editId), data);
                    editId = null;
                    existingPhotoUrl = "";
                    saveBtn.innerText = "വിവരങ്ങൾ സേവ് ചെയ്യുക";
                } else {
                    await addDoc(collection(db, "materials"), data);
                    saveBtn.innerText = "വിവരങ്ങൾ സേവ് ചെയ്യുക";
                }

                saveBtn.disabled = false;
                document.getElementById('matName').value = '';
                document.getElementById('matSite').value = '';
                document.getElementById('matQty').value = '';
                document.getElementById('matUsed').value = '';
                document.getElementById('matUnit').value = '';
                document.getElementById('matPrice').value = '';
                document.getElementById('matPhone').value = '';
                document.getElementById('matBillPhoto').value = '';
                existingPhotoUrl = "";
                alert("വിവരങ്ങൾ വിജയകരമായി സേവ് ചെയ്തു!");
            } catch (error) {
                saveBtn.disabled = false;
                saveBtn.innerText = "വിവരങ്ങൾ സേവ് ചെയ്യുക";
                alert("സേവ് ചെയ്യുന്നതിൽ ചെറിയ തടസ്സമുണ്ടായി. വീണ്ടും ശ്രമിക്കുക.");
                console.error(error);
            }
        };

        onSnapshot(query(collection(db, "materials"), orderBy("date", "desc")), (snapshot) => {
            const list = document.getElementById('materialList');
            list.innerHTML = '';
            let totalCost = 0;
            
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                
                if (d.meshtriOwner === currentMeshtri) {
                    totalCost += parseFloat(d.price) || 0;
                    
                    const totalQty = parseFloat(d.qty) || 0;
                    const usedQty = parseFloat(d.used) || 0;
                    const remainingQty = totalQty - usedQty;

                    let photoSection = '';
                    if (d.billPhoto) {
                        photoSection = `
                            <div class="mb-3">
                                <p class="text-[11px] font-black text-slate-500 mb-1">ബിൽ ഫോട്ടോ:</p>
                                <a href="${d.billPhoto}" target="_blank">
                                    <img src="${d.billPhoto}" class="w-24 h-24 object-cover rounded-xl border border-slate-200 shadow-sm hover:opacity-95">
                                </a>
                            </div>
                        `;
                    }

                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-200/80 shadow-sm material-item" data-site="${(d.site || '').toLowerCase()}">
                            <div class="flex justify-between items-start mb-1">
                                <p class="font-black text-slate-800 text-lg">${d.name}</p>
                                <a href="tel:${d.phone}" class="bg-blue-50 text-blue-600 px-3.5 py-1.5 rounded-xl font-black text-xs no-print shadow-sm">വിളിക്കുക</a>
                            </div>
                            <p class="text-xs text-slate-400 font-bold mb-3">
                                ${d.date || ''} ${d.site ? '• ' + d.site : ''}
                            </p>
                            
                            <div class="bg-slate-50 p-4 rounded-2xl mb-3 border border-slate-100">
                                <div class="flex justify-between text-xs font-bold text-slate-500 mb-1">
                                    <span>വാങ്ങിയത്: ${totalQty} ${d.unit || ''}</span>
                                    <span>ഉപയോഗിച്ചത്: ${usedQty} ${d.unit || ''}</span>
                                </div>
                                <div class="text-sm font-black text-emerald-700">
                                    ബാക്കി സ്റ്റോക്ക്: ${remainingQty} ${d.unit || ''}
                                </div>
                            </div>

                            ${photoSection}
                            
                            <p class="text-xs font-black text-slate-700 mb-4 bg-slate-100/70 p-2.5 rounded-xl inline-block">ആകെ വില: ₹${d.price}</p>
                            
                            <div class="flex gap-2.5 no-print">
                                <button onclick="window.editMat('${docSnap.id}', '${d.date || ''}', '${d.name}', '${d.site || ''}', ${totalQty}, ${usedQty}, '${d.unit || ''}', ${d.price}, '${d.phone}', '${d.billPhoto || ''}')" class="flex-1 bg-amber-500 text-white py-3 rounded-2xl font-black text-xs hover:bg-amber-600 transition shadow-sm">എഡിറ്റ്</button>
                                <button onclick="window.delMat('${docSnap.id}')" class="bg-red-50 text-red-600 px-4 py-3 rounded-2xl font-black text-xs hover:bg-red-100 transition shadow-sm">ഡിലീറ്റ്</button>
                            </div>
                        </div>`;
                }
            });

            document.getElementById('totalMaterialCost').innerText = "₹" + totalCost;
        });

        window.filterMaterials = () => {
            const searchTerm = document.getElementById('filterSite').value.toLowerCase();
            const items = document.querySelectorAll('.material-item');

            items.forEach(item => {
                const siteName = item.getAttribute('data-site');
                if (siteName.includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        };

        window.editMat = (id, date, name, site, qty, used, unit, price, phone, billPhoto) => {
            editId = id;
            existingPhotoUrl = billPhoto;
            document.getElementById('matDate').value = date;
            document.getElementById('matName').value = name;
            document.getElementById('matSite').value = site;
            document.getElementById('matQty').value = qty;
            document.getElementById('matUsed').value = used;
            document.getElementById('matUnit').value = unit;
            document.getElementById('matPrice').value = price;
            document.getElementById('matPhone').value = phone;
            document.getElementById('saveBtn').innerText = "അപ്ഡേറ്റ് ചെയ്യുക";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.delMat = async (id) => {
            if (confirm("ഈ വിവരങ്ങൾ ഡിലീറ്റ് ചെയ്യണോ?")) {
                await deleteDoc(doc(db, "materials", id));
            }
        };
    </script>
</body>
</html>
