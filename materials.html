<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>മെറ്റീരിയൽസ് മാനേജ്മെന്റ്</title>
    <style>
        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4 no-print">
            <a href="dashboard.html" class="text-sm font-bold text-slate-500">← തിരികെ ഡാഷ്ബോർഡിലേക്ക്</a>
            <p id="loggedInMeshtri" class="text-xs text-blue-600 font-bold">സ്വാഗതം, ലോഡിങ്...</p>
        </div>
        
        <h1 class="text-2xl font-black text-slate-800 mb-4">മെറ്റീരിയൽസ് & സ്റ്റോക്ക്</h1>
        
        <!-- ആകെ തുക കാണിക്കുന്ന ബോക്സ് -->
        <div class="bg-slate-900 text-white p-4 rounded-2xl shadow-md mb-6 text-center">
            <p class="text-[10px] opacity-80 uppercase tracking-widest">ആകെ മെറ്റീരിയൽ ചെലവ്</p>
            <h2 id="totalMaterialCost" class="text-2xl font-bold">₹0</h2>
        </div>

        <!-- സൈറ്റ് പേര് വെച്ച് ഫിൽട്ടർ ചെയ്യാനുള്ള ബോക്സ് -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-100 no-print">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">സൈറ്റ് പേര് വെച്ച് തിരയുക</label>
            <input type="text" id="filterSite" placeholder="സൈറ്റിന്റെ പേര് നൽകുക..." oninput="filterMaterials()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-base focus:ring-2 focus:ring-slate-900 outline-none font-bold">
        </div>
        
        <!-- മെറ്റീരിയൽസ് ഫോം (ഉപയോഗിച്ച അളവ് ഉൾപ്പെടെ) -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6 space-y-3 no-print">
            <h2 class="text-base font-bold text-slate-700">പുതിയ മെറ്റീരിയൽ ചേർക്കുക</h2>
            
            <input type="date" id="matDate" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            <input type="text" id="matName" placeholder="മെറ്റീരിയൽ പേര് (ഉദാ: സിമന്റ്)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            <input type="text" id="matSite" placeholder="സ്ഥലം/സൈറ്റ്" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="matQty" placeholder="വാങ്ങിയ അളവ് (Total Qty)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
                <input type="number" id="matUsed" placeholder="ഉപയോഗിച്ചത് (Used Qty)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            </div>

            <input type="text" id="matUnit" placeholder="യൂണിറ്റ് (ചാക്ക്/ടൺ/എണ്ണം)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            <input type="number" id="matPrice" placeholder="ആകെ വില (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            <input type="tel" id="matPhone" placeholder="സപ്ലയർ ഫോൺ നമ്പർ" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold outline-none focus:ring-2 focus:ring-slate-900">
            
            <button id="saveBtn" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black hover:bg-slate-800 transition">പുതിയ മെറ്റീരിയൽ ചേർക്കുക</button>
        </div>

        <!-- PDF ഡൗൺലോഡ് ബട്ടൺ -->
        <button onclick="window.print()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold mb-6 hover:bg-blue-700 transition no-print shadow-md">PDF റിപ്പോർട്ട് ഡൗൺലോഡ് ചെയ്യുക</button>

        <!-- ലിസ്റ്റ് വിത്ത് ആക്ഷൻ ബട്ടൺസ് -->
        <section class="space-y-4 pb-10">
            <h2 class="font-black text-slate-800 mb-2">സ്റ്റോക്ക് നിലവാരം (ബാക്കി കണക്ക്)</h2>
            <div id="materialList" class="space-y-3">
                <!-- ഡാറ്റ ഇവിടെ ഫയർബേസിൽ നിന്നും ലോഡ് ആകും -->
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d352218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const currentMeshtri = localStorage.getItem('userName') || "പൊതുമേസ്തിരി";
        document.getElementById('loggedInMeshtri').innerText = "സ്വാഗതം, " + currentMeshtri;

        let editId = null;

        // സേവ് / അപ്ഡേറ്റ് ഫങ്ഷൻ
        document.getElementById('saveBtn').onclick = async () => {
            const data = {
                meshtriOwner: currentMeshtri,
                date: document.getElementById('matDate').value,
                name: document.getElementById('matName').value,
                site: document.getElementById('matSite').value,
                qty: parseFloat(document.getElementById('matQty').value) || 0,
                used: parseFloat(document.getElementById('matUsed').value) || 0,
                unit: document.getElementById('matUnit').value,
                price: parseFloat(document.getElementById('matPrice').value) || 0,
                phone: document.getElementById('matPhone').value
            };

            if (!data.name) return alert("മെറ്റീരിയൽ പേര് നൽകുക!");

            if (editId) {
                await updateDoc(doc(db, "materials", editId), data);
                editId = null;
                document.getElementById('saveBtn').innerText = "പുതിയ മെറ്റീരിയൽ ചേർക്കുക";
            } else {
                await addDoc(collection(db, "materials"), data);
            }

            // ഫോം ക്ലിയർ ചെയ്യുന്നു
            document.getElementById('matDate').value = '';
            document.getElementById('matName').value = '';
            document.getElementById('matSite').value = '';
            document.getElementById('matQty').value = '';
            document.getElementById('matUsed').value = '';
            document.getElementById('matUnit').value = '';
            document.getElementById('matPrice').value = '';
            document.getElementById('matPhone').value = '';
            alert("വിവരങ്ങൾ സേവ് ആയി!");
        };

        // റിയൽ ടൈം ഡാറ്റ ഫെച്ച് ചെയ്ത് കാണിക്കാൻ
        onSnapshot(query(collection(db, "materials"), orderBy("date", "desc")), (snapshot) => {
            const list = document.getElementById('materialList');
            list.innerHTML = '';
            let totalCost = 0;
            
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                
                if (d.meshtriOwner === currentMeshtri) {
                    totalCost += parseFloat(d.price) || 0;
                    
                    // ബാക്കി സ്റ്റോക്ക് കണക്കാക്കുന്നു (വാങ്ങിയത് - ഉപയോഗിച്ചത്)
                    const totalQty = parseFloat(d.qty) || 0;
                    const usedQty = parseFloat(d.used) || 0;
                    const remainingQty = totalQty - usedQty;

                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl border shadow-sm material-item" data-site="${(d.site || '').toLowerCase()}">
                            <div class="flex justify-between items-start mb-1">
                                <p class="font-black text-slate-800 text-lg">${d.name}</p>
                                <a href="tel:${d.phone}" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-black text-[10px] no-print">വിളിക്കുക</a>
                            </div>
                            <p class="text-xs text-slate-500 font-bold mb-2">
                                ${d.date || ''} ${d.site ? '• ' + d.site : ''}
                            </p>
                            <div class="bg-slate-50 p-3 rounded-xl mb-3 border border-slate-100">
                                <div class="flex justify-between text-xs font-bold text-slate-600 mb-1">
                                    <span>ആകെ വാങ്ങിയത്: ${totalQty} ${d.unit}</span>
                                    <span>ഉപയോഗിച്ചത്: ${usedQty} ${d.unit}</span>
                                </div>
                                <div class="text-sm font-black text-emerald-700">
                                    ബാക്കി സ്റ്റോക്ക്: ${remainingQty} ${d.unit}
                                </div>
                            </div>
                            <p class="text-[13px] text-slate-700 font-bold mb-3">ആകെ വില: ₹${d.price}</p>
                            
                            <div class="flex gap-2 no-print">
                                <button onclick="window.editMat('${docSnap.id}', '${d.date || ''}', '${d.name}', '${d.site || ''}', ${totalQty}, ${usedQty}, '${d.unit}', ${d.price}, '${d.phone}')" class="flex-1 bg-amber-500 text-white py-2 rounded-xl font-black text-xs">എഡിറ്റ്</button>
                                <button onclick="window.delMat('${docSnap.id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl font-black text-xs">ഡിലീറ്റ്</button>
                            </div>
                        </div>`;
                }
            });

            document.getElementById('totalMaterialCost').innerText = "₹" + totalCost;
        });

        // സൈറ്റ് വെച്ച് ഫിൽട്ടർ ചെയ്യുന്ന ഫങ്ഷൻ
        window.filterMaterials = () => {
            const searchTerm = document.getElementById('filterSite').value.toLowerCase();
            const items = document.querySelectorAll('.material-item');

            items.forEach(item => {
                const siteName = item.getAttribute('data-site');
                if (siteName.includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        };

        // എഡിറ്റ് ചെയ്യാനുള്ള ഫങ്ഷൻ
        window.editMat = (id, date, name, site, qty, used, unit, price, phone) => {
            editId = id;
            document.getElementById('matDate').value = date;
            document.getElementById('matName').value = name;
            document.getElementById('matSite').value = site;
            document.getElementById('matQty').value = qty;
            document.getElementById('matUsed').value = used;
            document.getElementById('matUnit').value = unit;
            document.getElementById('matPrice').value = price;
            document.getElementById('matPhone').value = phone;
            document.getElementById('saveBtn').innerText = "അപ്ഡേറ്റ് ചെയ്യുക";
            window.scrollTo(0, 0);
        };

        // ഡിലീറ്റ് ചെയ്യാനുള്ള ഫങ്ഷൻ
        window.delMat = async (id) => {
            if (confirm("ഡിലീറ്റ് ചെയ്യണോ?")) {
                await deleteDoc(doc(db, "materials", id));
            }
        };
    </script>
</body>
</html>
