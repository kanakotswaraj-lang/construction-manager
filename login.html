<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ലോഗിൻ - മേസ്തിരി സൈറ്റ് മാനേജർ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts അഴകുള്ള അക്ഷരങ്ങൾക്ക് വേണ്ടി -->
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center min-h-screen p-4">

    <!-- പ്രധാന കാർഡ് (ഗ്ലാസ് ലുക്ക് ഡിസൈൻ) -->
    <div class="bg-white/95 backdrop-blur-md p-8 rounded-[2.5rem] shadow-2xl border border-white/20 w-full max-w-sm transform transition duration-500 hover:scale-[1.01]">
        
        <!-- ആപ്പ് ലോഗോ ഐക്കൺ അനിമേഷൻ -->
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
        </div>

        <h2 class="text-3xl font-black mb-2 text-center bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent tracking-tight">സെറ്റ് മാനേജർ</h2>
        <p class="text-slate-400 text-xs mb-8 text-center font-bold uppercase tracking-wider">മേസ്ത്രി ഡിജിറ്റൽ ഡയറി</p>
        
        <!-- ഇൻപുട്ട് ബോക്സുകൾ (Modern & Colorful Focus) -->
        <div class="space-y-4 mb-6">
            <div>
                <label class="text-[11px] text-slate-500 font-bold ml-1 uppercase">ഇമെയിൽ വിലാസം</label>
                <input type="email" id="email" placeholder="name@example.com" autocomplete="off" 
                       class="w-full mt-1 p-4 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-sans text-sm bg-slate-50/50">
            </div>
            
            <div>
                <label class="text-[11px] text-slate-500 font-bold ml-1 uppercase">പാസ്‌വേഡ്</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="off" 
                       class="w-full mt-1 p-4 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-sans text-sm bg-slate-50/50">
            </div>
        </div>
        
        <!-- തിളങ്ങുന്ന ലോഗിൻ ബട്ടൺ -->
        <button id="btnLogin" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 rounded-2xl font-black text-base shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 active:scale-[0.99] transition-all mb-6">
            ലോഗിൻ ചെയ്യുക
        </button>
        
        <!-- രജിസ്ട്രേഷൻ ലിങ്ക് -->
        <div class="text-center">
            <p class="text-sm text-slate-500 font-medium">
                പുതിയ അക്കൗണ്ട് വേണോ? 
                <a href="signup.html" class="text-blue-600 font-black hover:underline ml-1">ഇവിടെ രജിസ്റ്റർ ചെയ്യുക</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("btnLogin").addEventListener("click", () => {
            const btn = document.getElementById("btnLogin");
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert("ദയവായി ഇമെയിലും പാസ്‌വേർഡും കൃത്യമായി ടൈപ്പ് ചെയ്യുക!");
                return;
            }

            // ബട്ടൺ ലോഡിംഗ് സ്റ്റേറ്റ്
            btn.innerText = "ലോഗിൻ ചെയ്യുന്നു...";
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { 
                    window.location.href = "dashboard.html"; 
                })
                .catch((error) => { 
                    btn.innerText = "ലോഗിൻ ചെയ്യുക";
                    btn.disabled = false;
                    alert("ലോഗിൻ പരാജയപ്പെട്ടു: ഇമെയിലും പാസ്‌വേർഡും പരിശോധിക്കുക."); 
                    console.error(error.message);
                });
        });
    </script>
</body>
</html>
