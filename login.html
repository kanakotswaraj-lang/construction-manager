<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ലോഗിൻ / രജിസ്ട്രേഷൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-3 sm:p-4">

    <!-- ബോക്സിന്റെ വലിപ്പം മൊബൈൽ സ്ക്രീനിൽ നന്നായി കാണാൻ w-full ഉം max-w-lg ഉം നൽകിയിരിക്കുന്നു -->
    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-lg border-t-4 border-blue-500">
        <!-- ഹെഡിംഗ് -->
        <div class="text-center mb-6">
            <h1 class="text-3xl sm:text-4xl font-black text-blue-900">മേസ്തിരി ആപ്പ്</h1>
            <p id="formTitle" class="text-blue-500 font-bold text-lg mt-2">ലോഗിൻ ചെയ്യുക</p>
        </div>

        <!-- ലോഗിൻ / രജിസ്ട്രേഷൻ ഫോം -->
        <div class="space-y-4">
            <div>
                <label class="block text-base font-bold text-gray-700 mb-1">യൂസർനെയിം (പേര്)</label>
                <input type="text" id="username" placeholder="നിങ്ങളുടെ പേര് നൽകുക" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>

            <!-- രജിസ്റ്റർ ചെയ്യുമ്പോൾ മാത്രം കാണുന്ന ഫോൺ നമ്പർ ബോക്സ് -->
            <div id="phoneDiv" class="hidden">
                <label class="block text-base font-bold text-gray-700 mb-1">ഫോൺ നമ്പർ</label>
                <input type="tel" id="phone" placeholder="10 അക്ക ഫോൺ നമ്പർ" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-base font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <input type="password" id="password" placeholder="കുറഞ്ഞത് 6 അക്കങ്ങൾ നൽകുക" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1 font-bold">ശ്രദ്ധിക്കുക: പാസ്‌വേർഡിൽ കുറഞ്ഞത് 6 അക്കങ്ങളോ അക്ഷരങ്ങളോ ഉണ്ടായിരിക്കണം.</p>
            </div>
        </div>

        <!-- ആക്ഷൻ ബട്ടൺ -->
        <button id="btnAction" class="w-full mt-6 bg-blue-600 text-white p-4 rounded-xl font-black text-xl hover:bg-blue-700 transition shadow-lg">
            ലോഗിൻ ചെയ്യുക
        </button>

        <button id="btnForgot" class="w-full mt-4 text-gray-500 font-bold text-base hover:text-blue-600 underline block text-center">
            പാസ്‌വേർഡ് മറന്നുപോയോ?
        </button>

        <!-- പേജ് മാറാനുള്ള ലിങ്ക് -->
        <p class="text-center mt-6 text-gray-600 font-bold text-base">
            <span id="toggleText">അക്കൗണ്ട് ഇല്ലെങ്കിൽ?</span> 
            <a href="#" id="toggleBtn" class="text-blue-600 underline ml-1">പുതിയതായി രജിസ്റ്റർ ചെയ്യുക</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;

        const toggleBtn = document.getElementById("toggleBtn");
        const formTitle = document.getElementById("formTitle");
        const phoneDiv = document.getElementById("phoneDiv");
        const btnAction = document.getElementById("btnAction");
        const btnForgot = document.getElementById("btnForgot");
        const toggleText = document.getElementById("toggleText");

        toggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.innerText = "ലോഗിൻ ചെയ്യുക";
                phoneDiv.classList.add("hidden");
                btnAction.innerText = "ലോഗിൻ ചെയ്യുക";
                btnForgot.style.display = "block";
                toggleText.innerText = "അക്കൗണ്ട് ഇല്ലെങ്കിൽ?";
                toggleBtn.innerText = "പുതിയതായി രജിസ്റ്റർ ചെയ്യുക";
            } else {
                formTitle.innerText = "പുതിയ രജിസ്ട്രേഷൻ";
                phoneDiv.classList.remove("hidden");
                btnAction.innerText = "രജിസ്റ്റർ ചെയ്യുക";
                btnForgot.style.display = "none";
                toggleText.innerText = "പഴയ അക്കൗണ്ട് ഉണ്ടോ?";
                toggleBtn.innerText = "ലോഗിൻ ചെയ്യുക";
            }
        });

        btnAction.addEventListener("click", async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!user || !pass) {
                return alert("ദയവായി യൂസർനെയിമും പാസ്‌വേർഡും നൽകുക!");
            }

            if (!isLoginMode && pass.length < 6) {
                return alert("പാസ്‌വേർഡിന് കുറഞ്ഞത് 6 അക്കങ്ങളോ അക്ഷരങ്ങളോ ഉണ്ടായിരിക്കണം!");
            }

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, `${user}@mesthri.com`, pass)
                    .then(() => {
                        localStorage.setItem('userName', user);
                        window.location.href = "dashboard.html";
                    })
                    .catch(() => alert("ലോഗിൻ പരാജയപ്പെട്ടു! യൂസർനെയിമോ പാസ്‌വേർഡോ തെറ്റാണ്."));
            } else {
                if (!phone) {
                    return alert("ദയവായി ഫോൺ നമ്പർ കൂടി നൽകുക!");
                }

                try {
                    await createUserWithEmailAndPassword(auth, `${user}@mesthri.com`, pass);
                    
                    await setDoc(doc(db, "users", user), {
                        username: user,
                        phone: phone,
                        password: pass
                    });

                    const webAppUrl = "https://script.google.com/macros/s/AKfycbznevcjdsSz7JgWrKeyaO2gOnxnrd-8-rMMiycABRruqFJQ_hfz4Ac79aLqyvnqf09FXg/exec";
                    fetch(webAppUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: user, phone: phone })
                    }).catch(err => console.log(err));

                    alert("വിജയകരമായി രജിസ്റ്റർ ചെയ്തു!");
                    localStorage.setItem('userName', user);
                    window.location.href = "dashboard.html";

                } catch (error) {
                    alert("രജിസ്ട്രേഷൻ പരാജയപ്പെട്ടു! ഈ യൂസർനെയിം നേരത്തെ ഉണ്ടാകാം അല്ലെങ്കിൽ പാസ്‌വേർഡ് ചെറുതാണ്.");
                }
            }
        });

        document.getElementById("btnForgot").addEventListener("click", async () => {
            const user = document.getElementById('username').value.trim();
            if(!user) return alert("ആദ്യം യൂസർനെയിം ബോക്സിൽ നിങ്ങളുടെ പേര് നൽകുക!");

            const docRef = doc(db, "users", user);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                alert("നിങ്ങളുടെ പാസ്‌വേർഡ്: " + data.password);
            } else {
                alert("ഈ യൂസർനെയിം നിലവിലില്ല!");
            }
        });
    </script>
</body>
</html>
