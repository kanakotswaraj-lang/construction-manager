<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ലോഗിൻ - മെസ്ത്രി ആപ്പ്</title>
    <!-- Firebase SDK-കൾ -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>

    <h2>മെസ്ത്രി ആപ്പിലേക്ക് സ്വാഗതം</h2>
    
    <!-- ലോഗിൻ ബട്ടൺ -->
    <button onclick="googleLogin()">ഗൂഗിൾ വഴി ലോഗിൻ ചെയ്യുക</button>

  <script>
    // ... firebaseConfig-ന് ശേഷം ...
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ഉപയോക്താവ് ലോഗിൻ ചെയ്തിട്ടുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
    auth.onAuthStateChanged((user) => {
        if (user) {
            // ലോഗിൻ ചെയ്തിട്ടുണ്ടെങ്കിൽ ഡാഷ്ബോർഡിലേക്ക് അയക്കുക
            window.location.href = "dashboard.html";
        }
    });

    // ലോഗിൻ ഫംഗ്ഷൻ
    function googleLogin() {
        auth.signInWithPopup(provider)
        .then((result) => {
            window.location.href = "dashboard.html";
        })
        .catch((error) => {
            alert("ലോഗിൻ പരാജയപ്പെട്ടു: " + error.message);
        });
    }
</script>
</body>
</html>
