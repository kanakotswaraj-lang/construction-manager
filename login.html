<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ലോഗിൻ - മെസ്ത്രി ആപ്പ്</title>
    <style>
        /* ലോഗിൻ പേജിന്റെ ഭംഗി കൂട്ടാനുള്ള സ്റ്റൈലുകൾ */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; margin-bottom: 20px; }
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 6px;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { background-color: #357ae8; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>മെസ്ത്രി ആപ്പ്</h2>
        <button id="loginBtn">ഗൂഗിൾ വഴി ലോഗിൻ ചെയ്യുക</button>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
   import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
        authDomain: "mesthri-app.firebaseapp.com",
        projectId: "mesthri-app",
        storageBucket: "mesthri-app.firebasestorage.app",
        messagingSenderId: "1060617901864",
        appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
        measurementId: "G-J9Y5TW9D7T"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ലോഗിൻ ബട്ടൺ പ്രവർത്തിപ്പിക്കാനുള്ള കോഡ്
    document.getElementById("loginBtn").addEventListener("click", () => {
    signInWithPopup(auth, provider)
    .then((result) => {
        // ലോഗിൻ വിജയിച്ചാൽ നേരെ ഡാഷ്‌ബോർഡിലേക്ക്
        window.location.replace("dashboard.html");
    })
    .catch((error) => {
        console.error("ലോഗിൻ പരാജയപ്പെട്ടു:", error);
        alert("ലോഗിൻ പരാജയപ്പെട്ടു: " + error.message);
    });
});
</script>
</body>
</html>
