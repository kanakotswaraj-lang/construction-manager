<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ലോഗിൻ - മേസ്തിരി ആപ്പ്</title>
    <!-- CSS ഇവിടെയുണ്ട് -->
</head>
<body>
    <!-- നിങ്ങളുടെ ലോഗിൻ ബട്ടണുകൾ ഇവിടെയുണ്ട് -->
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
          authDomain: "mesthri-app.firebaseapp.com",
          projectId: "mesthri-app",
          storageBucket: "mesthri-app.firebasestorage.app",
          messagingSenderId: "1060617901864",
          appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
          measurementId: "G-J9Y5TW9D7T"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // ഗൂഗിൾ ലോഗിൻ ഫംഗ്‌ഷൻ
        function googleSignIn() {
            auth.signInWithPopup(provider)
            .then((result) => {
                alert("സ്വാഗതം, " + result.user.displayName + "!");
                window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
                alert("ലോഗിൻ പരാജയപ്പെട്ടു: " + error.message);
                console.log(error);
            });
        }

        // ലോഗ് ഔട്ട് ഫംഗ്‌ഷൻ
        function userSignOut() {
            auth.signOut().then(() => {
                alert("നിങ്ങൾ വിജയകരമായി ലോഗ് ഔട്ട് ആയി!");
            });
        }
    </script>
</body>
</html>
