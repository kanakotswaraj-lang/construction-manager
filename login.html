<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ലോഗിൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-blue-500">
        <!-- ഹെഡിംഗ് മാറ്റങ്ങൾ വരുത്തിയത് ഇവിടെയാണ് -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-900">മേസ്തിരി ആപ്പ്</h1>
            <p class="text-blue-500 font-bold mt-2">സൈറ്റ് മാനേജർ ഡിജിറ്റൽ ഡയറി</p>
        </div>

        <!-- ഇൻപുട്ട് ബോക്സുകൾ -->
        <div class="space-y-4">
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">യൂസർനെയിം</label>
                <input type="text" id="username" placeholder="നിങ്ങളുടെ പേര് നൽകുക" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <input type="password" id="password" placeholder="പാസ്‌വേർഡ്" 
                       class="w-full p-4 text-lg border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
        </div>

        <button id="btnLogin" class="w-full mt-6 bg-blue-600 text-white p-4 rounded-xl font-black text-xl hover:bg-blue-700 transition shadow-lg">
            ലോഗിൻ ചെയ്യുക
        </button>

        <button id="btnForgot" class="w-full mt-4 text-gray-500 font-bold hover:text-blue-600 underline">
            പാസ്‌വേർഡ് മറന്നുപോയോ?
        </button>

        <p class="text-center mt-6 text-gray-600 font-bold">
            പുതിയ അക്കൗണ്ട് വേണോ? <a href="signup.html" class="text-blue-600">രജിസ്റ്റർ ചെയ്യുക</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        
        document.getElementById("btnLogin").addEventListener("click", async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert("വിവരങ്ങൾ നൽകുക!");
            
            signInWithEmailAndPassword(auth, `${user}@mesthri.com`, pass)
                .then(() => {
                    // ലോഗിൻ ചെയ്യുമ്പോൾ പേര് സേവ് ചെയ്യുന്നു
                    localStorage.setItem('userName', user); 
                    // ഡാഷ്‌ബോർഡിലേക്ക് പോകുന്നു
                    window.location.href = "dashboard.html";
                })
                .catch(() => alert("ലോഗിൻ പരാജയപ്പെട്ടു!"));
        });

        document.getElementById("btnForgot").addEventListener("click", async () => {
            const user = document.getElementById('username').value.trim();
            if(!user) return alert("ആദ്യം യൂസർനെയിം ബോക്സിൽ നിങ്ങളുടെ പേര് നൽകുക!");

            const docRef = doc(db, "users", user);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const answer = prompt(`രഹസ്യ ചോദ്യം: ${data.securityQuestion}\n\nഉത്തരം നൽകുക:`);
                if (answer === data.securityAnswer) {
                    alert("നിങ്ങളുടെ പാസ്‌വേർഡ്: " + data.password);
                } else {
                    alert("ഉത്തരം തെറ്റാണ്!");
                }
            } else {
                alert("ഈ യൂസർനെയിം നിലവിലില്ല!");
            }
        });
    </script>
</body>
</html>
