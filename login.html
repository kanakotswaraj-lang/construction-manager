<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ലോഗിൻ - മേസ്തിരി ആപ്പ്</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; margin: 10px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>മേസ്തിരി ആപ്പിലേക്ക് സ്വാഗതം</h2>
    <input type="text" id="phone" placeholder="ഫോൺ നമ്പർ (+91...)">
    <br>
    <button onclick="sendOTP()">OTP അയക്കുക</button>
    <div id="recaptcha-container"></div>

    <script>
        function sendOTP() {
            const phoneNumber = document.getElementById('phone').value;
            alert(phoneNumber + " എന്ന നമ്പറിലേക്ക് OTP അയക്കാൻ തയ്യാറെടുക്കുന്നു...");
            // ഇവിടെയാണ് നമ്മൾ പിന്നീട് Firebase കോഡ് ചേർക്കുക
        }
    </script>
</body>
</html>
