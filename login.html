<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
      authDomain: "mesthri-app.firebaseapp.com",
      projectId: "mesthri-app",
      storageBucket: "mesthri-app.firebasestorage.app",
      messagingSenderId: "1060617901864",
      appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
      measurementId: "G-J9Y5TW9D7T"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // reCAPTCHA വെരിഫിക്കേഷൻ സെറ്റ് ചെയ്യുന്നു
    window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    }, auth);

    window.sendOTP = function() {
        const phoneNumber = document.getElementById('phone').value;
        const appVerifier = window.recaptchaVerifier;

        signInWithPhoneNumber(auth, phoneNumber, appVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                alert("OTP അയച്ചു! ദയവായി OTP നൽകുക.");
                // ഇവിടെ നമുക്ക് OTP എന്റർ ചെയ്യാൻ ഒരു ബോക്സ് കൂടി ഉണ്ടാക്കാം
            }).catch((error) => {
                alert("തെറ്റ് സംഭവിച്ചു: " + error.message);
            });
    }
</script>
