<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ലോഗിൻ - മേസ്തിരി ആപ്പ്</title>
</head>
<body>
    <h2>മേസ്തിരി ആപ്പിലേക്ക് സ്വാഗതം</h2>
    
    <div id="login-form">
        <input type="text" id="phone" placeholder="ഫോൺ നമ്പർ (+91...)">
        <button onclick="sendOTP()">OTP അയക്കുക</button>
    </div>

    <div id="otp-form" style="display:none;">
        <input type="text" id="otp" placeholder="OTP നൽകുക">
        <button onclick="verifyOTP()">OTP പരിശോധിക്കുക</button>
    </div>

    <div id="recaptcha-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
          authDomain: "mesthri-app.firebaseapp.com",
          projectId: "mesthri-app",
          storageBucket: "mesthri-app.firebasestorage.app",
          messagingSenderId: "1060617901864",
          appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d",
          measurementId: "G-J9Y5TW9D7T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' }, auth);

        window.sendOTP = function() {
            const phoneNumber = document.getElementById('phone').value;
            signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('otp-form').style.display = 'block';
                    alert("OTP അയച്ചു!");
                }).catch((error) => { alert("തെറ്റ് സംഭവിച്ചു: " + error.message); });
        }

        window.verifyOTP = function() {
            const code = document.getElementById('otp').value;
            window.confirmationResult.confirm(code).then((result) => {
                alert("ലോഗിൻ വിജയിച്ചു!");
                window.location.href = "index.html"; // ലോഗിൻ കഴിഞ്ഞാൽ ആപ്പിലേക്ക് പോകും
            }).catch((error) => { alert("OTP തെറ്റാണ്!"); });
        }
    </script>
</body>
</html>
