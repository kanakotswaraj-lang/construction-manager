<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>രജിസ്ട്രേഷൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-blue-500">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-900">പുതിയ അക്കൗണ്ട്</h1>
            <p class="text-blue-500 font-bold mt-1">മേസ്തിരി രജിസ്ട്രേഷൻ</p>
        </div>

        <div class="space-y-3">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">മേസ്തിരിയുടെ പേര് (Username)</label>
                <input type="text" id="signupUsername" placeholder="നിങ്ങളുടെ പേര് നൽകുക" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ഇമെയിൽ വിലാസം</label>
                <input type="email" id="signupEmail" placeholder="email@example.com" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">പുതിയ പാസ്‌വേർഡ്</label>
                <input type="password" id="signupPassword" placeholder="ആപ്പിനായുള്ള പാസ്‌വേർഡ്" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
            </div>
        </div>

        <button id="btnSignup" class="w-full mt-5 bg-blue-600 text-white p-3.5 rounded-xl font-black text-lg hover:bg-blue-700 transition shadow-lg">
            അക്കൗണ്ട് നിർമ്മിക്കുക
        </button>

        <p class="text-center mt-4 text-gray-600 font-bold text-sm">
            ഇതിനകം അക്കൗണ്ട് ഉണ്ടോ? <a href="index.html" class="text-blue-600">ലോഗിൻ ചെയ്യുക</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("btnSignup").addEventListener("click", async () => {
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();

            if(!username || !email || !password) {
                return alert("എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക!");
            }

            try {
                // ഫയർബേസ് ഓതന്റിക്കേഷനിൽ ഇമെയിലും പാസ്‌വേർഡും ഉപയോഗിച്ച് അക്കൗണ്ട് ഉണ്ടാക്കുന്നു
                await createUserWithEmailAndPassword(auth, email, password);

                // ഡാറ്റാബേസിൽ യൂസറുടെ പേര് സേവ് ചെയ്യുന്നു
                await setDoc(doc(db, "users", username), {
                    username: username,
                    email: email
                });

                alert("അക്കൗണ്ട് വിജയകരമായി നിർമ്മിച്ചു!");
                window.location.href = "index.html";
            } catch (error) {
                alert("രജിസ്ട്രേഷൻ പരാജയപ്പെട്ടു: " + error.message);
            }
        });
    </script>
</body>
</html>
