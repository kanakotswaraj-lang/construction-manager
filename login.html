<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>രജിസ്ട്രേഷൻ - മേസ്തിരി ആപ്പ്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manjari', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-cyan-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-4 border-green-500">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-900">മേസ്തിരി ആപ്പ്</h1>
            <p class="text-green-600 font-bold mt-1">പുതിയ അക്കൗണ്ട് നിർമ്മിക്കുക</p>
        </div>

        <div class="space-y-3.5">
            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">യൂസർനെയിം (പേര്)</label>
                <input type="text" id="regUser" placeholder="നിങ്ങളുടെ പേര് നൽകുക" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">പാസ്‌വേർഡ്</label>
                <input type="password" id="regPass" placeholder="പാസ്‌വേർഡ് നൽകുക" 
                       class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
            </div>

            <!-- പാസ്‌വേർഡ് റിക്കവറിക്കുള്ള രഹസ്യ ചോദ്യവും ഉത്തരവും നൽകുന്ന കള്ളികൾ -->
            <div class="bg-amber-50 p-3.5 rounded-2xl border-2 border-amber-200 space-y-3">
                <p class="text-xs font-black text-amber-900 text-center">പാസ്‌വേർഡ് റിക്കവറിക്കായി ഒരു ചോദ്യം ചേർക്കുക</p>
                
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">രഹസ്യ ചോദ്യം (ഉദാ: നിങ്ങളുടെ പ്രിയപ്പെട്ട മൃതം ഏത്?)</label>
                    <input type="text" id="regSecQuestion" placeholder="ചോദ്യം ഇവിടെ എഴുതുക" 
                           class="w-full p-2.5 bg-white border-2 border-gray-200 rounded-xl outline-none focus:border-amber-500 font-bold text-xs">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">ഉത്തരം</label>
                    <input type="text" id="regSecAnswer" placeholder="ഉത്തരം ഇവിടെ എഴുതുക" 
                           class="w-full p-2.5 bg-white border-2 border-gray-200 rounded-xl outline-none focus:border-amber-500 font-bold text-xs">
                </div>
            </div>

            <button id="btnRegister" class="w-full mt-2 bg-green-600 text-white p-3.5 rounded-xl font-black text-base hover:bg-green-700 transition shadow-lg">
                അക്കൗണ്ട് ക്രിയേറ്റ് ചെയ്യുക
            </button>

            <p class="text-center mt-4 text-sm text-gray-600 font-bold">
                ഇതുവരെ അക്കൗണ്ട് ഉണ്ടോ? <a href="login.html" class="text-blue-600 hover:underline">ലോഗിൻ ചെയ്യുക</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.firebasestorage.app",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bd6d35221d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("btnRegister").addEventListener("click", async () => {
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value.trim();
            const secQ = document.getElementById('regSecQuestion').value.trim();
            const secA = document.getElementById('regSecAnswer').value.trim();

            if(!user || !pass || !secQ || !secA) {
                return alert("ദയവായി എല്ലാ വിവരങ്ങളും (ചോദ്യവും ഉത്തരവും അടക്കം) പൂരിപ്പിക്കുക!");
            }

            try {
                // ഫയർബേസ് ഓതന്റിക്കേഷനിൽ അക്കൗണ്ട് ഉണ്ടാക്കുന്നു
                await createUserWithEmailAndPassword(auth, `${user}@mesthri.com`, pass);
                
                // ഫയർസ്റ്റോറിൽ യൂസറുടെ പാസ്‌വേർഡും സുരക്ഷാ ചോദ്യവും സേവ് ചെയ്യുന്നു
                await setDoc(doc(db, "users", user), {
                    username: user,
                    password: pass,
                    securityQuestion: secQ,
                    securityAnswer: secA
                });

                alert("അക്കൗണ്ട് വിജയകരമായി നിർമ്മിച്ചു!");
                window.location.href = "login.html";
            } catch (error) {
                alert("രജിസ്ട്രേഷൻ പരാജയപ്പെട്ടു: " + error.message);
            }
        });
    </script>
</body>
</html>
