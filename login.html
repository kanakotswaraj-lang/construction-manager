<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ലോഗിൻ - മെസ്ത്രി ആപ്പ്</title>
</head>
<body>

    <h2>മെസ്ത്രി ആപ്പിലേക്ക് സ്വാഗതം</h2>
    <button id="loginBtn">ഗൂഗിൾ വഴി ലോഗിൻ ചെയ്യുക</button>

    <script type="module">
        // Firebase-ൽ നിന്ന് ആവശ്യമായ ഫംഗ്ഷനുകൾ ഇമ്പോർട്ട് ചെയ്യുക
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // കോൺഫിഗറേഷൻ
        const firebaseConfig = {apiKey: "AIzaSyAJw47JuihhalCFvFAyrX_beM0iZZ0XltA",
           
            authDomain: "mesthri-app.firebaseapp.com",
            projectId: "mesthri-app",
            storageBucket: "mesthri-app.appspot.com",
            messagingSenderId: "1060617901864",
            appId: "1:1060617901864:web:5ffb9378cf36bb0d352218"
        };

        // Firebase Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ബട്ടൺ ക്ലിക്ക് ചെയ്യുമ്പോൾ
        document.getElementById("loginBtn").addEventListener("click", () => {
            signInWithPopup(auth, provider)
            .then((result) => {
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                alert("ലോഗിൻ പരാജയപ്പെട്ടു: " + error.message);
            });
        });
    </script>
</body>
</html>
